// ═══════ ORG CHART VISUALIZATION ═══════
function _orgCountNodes(nodes) {
  let c = nodes ? nodes.length : 0;
  if (nodes) for (const n of nodes) if (n.children?.length) c += _orgCountNodes(n.children);
  return c;
}
function _orgCountDesc(nodes) {
  let c = 0;
  if (!nodes) return 0;
  for (const n of nodes) { c++; if (n.children?.length) c += _orgCountDesc(n.children); }
  return c;
}

function setOrgDepth(d) { S.orgMaxDepth = d; S.orgExpanded = new Set(); S.orgFocusNid = null; renderTab(); }
function orgCollapseAll() { S.orgExpanded = new Set(); S.orgFocusNid = null; renderTab(); orgFit(); }
function orgToggleNode(nid) {
  if (!S.orgExpanded) S.orgExpanded = new Set();
  if (S.orgExpanded.has(nid)) {
    // Collapsing: focus on the parent node
    S.orgExpanded.delete(nid);
    S.orgFocusNid = S._orgParentOf ? S._orgParentOf[nid] : null;
  } else {
    // Expanding: focus on this node's subtree
    S.orgExpanded.add(nid);
    S.orgFocusNid = nid;
  }
  renderTab();
}

function renderOrgChart(container) {
  const sys = S.systems.find(s => s.id === S.selSys);
  if (!sys) return;
  if (!S.orgExpanded) S.orgExpanded = new Set();

  const totalNodes = _orgCountNodes(sys.children) + 1;

  // Default: show first 1 level, user can expand further
  if (S.orgMaxDepth === undefined || S.orgMaxDepth === null) {
    S.orgMaxDepth = 1;
  }
  const maxD = S.orgMaxDepth;

  const root = { name: sys.name, partNo: "", children: sys.children, _isRoot: true, id: 'org-root' };
  // Yukarıdan aşağıya layout: x = yatay konum, y = derinlik * satır yüksekliği
  const nodeW = 200, nodeH = 64, gapX = 20, gapY = 68;
  const positions = [];
  const parentMap = {};
  let maxX = 0, maxY = 0;

  function layoutTree(node, depth, parentNid) {
    const nid = node.id || ('org-' + positions.length);
    node._oid = nid;
    if (parentNid) parentMap[nid] = parentNid;
    const manuallyExpanded = S.orgExpanded.has(nid);
    const atLimit = depth >= maxD && node.children?.length > 0 && !manuallyExpanded;
    const y = depth * (nodeH + gapY);
    if (y + nodeH > maxY) maxY = y + nodeH;

    if (!node.children?.length || atLimit) {
      const x = maxX; maxX += nodeW + gapX;
      positions.push({ node, nid, parentNid, x, y, w: nodeW, h: nodeH, collapsed: atLimit, descCount: atLimit ? _orgCountDesc(node.children) : 0 });
      return { mid: x + nodeW / 2, left: x, right: x + nodeW };
    }
    const cp = node.children.map(c => layoutTree(c, depth + 1, nid));
    const left = Math.min(...cp.map(c => c.left)), right = Math.max(...cp.map(c => c.right));
    const cx = (left + right) / 2 - nodeW / 2;
    positions.push({ node, nid, parentNid, x: cx, y, w: nodeW, h: nodeH, childMids: cp.map(c => c.mid), childY: y + nodeH, collapsed: false, descCount: 0, canCollapse: manuallyExpanded });
    return { mid: cx + nodeW / 2, left, right };
  }
  layoutTree(root, 0, null);
  S._orgParentOf = parentMap;
  window._orgPositions = positions;

  const renderedNodes = positions.length;
  const pad = 60;
  const svgW = maxX + pad * 2, svgH = maxY + pad * 2 + gapY;

  // Derinlik renk paleti — her seviye için dolgu ve kontur rengi
  const DEPTH_COLORS = [
    {fill:'#1e1b4b',stroke:'#818cf8'},  // 0 - kök (indigo)
    {fill:'#1a2744',stroke:'#38bdf8'},  // 1 - mavi
    {fill:'#14342b',stroke:'#34d399'},  // 2 - yeşil
    {fill:'#2d1b4e',stroke:'#a78bfa'},  // 3 - mor
    {fill:'#1e3a2f',stroke:'#6ee7b7'},  // 4 - açık yeşil
    {fill:'#312010',stroke:'#fbbf24'},  // 5 - turuncu
    {fill:'#1e2d40',stroke:'#60a5fa'},  // 6 - açık mavi
    {fill:'#3b1f28',stroke:'#f87171'},  // 7 - kırmızı
    {fill:'#1f3040',stroke:'#7dd3fc'},  // 8
    {fill:'#2a2010',stroke:'#fcd34d'},  // 9
  ];
  function depthColor(d) { return DEPTH_COLORS[d % DEPTH_COLORS.length]; }

  // Derinlik hesabı: nid → depth (positions'dan)
  const nidDepth = {};
  positions.forEach(p => { const d = Math.round(p.y / (nodeH + gapY)); nidDepth[p.nid] = d; });

  let inner = '';
  inner += `<defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowHover"><feGaussianBlur stdDeviation="6" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>`;

  // Edges — yukarıdan aşağıya, derinlik renkli
  for (const p of positions) {
    if (p.childMids) {
      const d = nidDepth[p.nid] || 0;
      const ec = depthColor(d+1).stroke;
      const fx = p.x + p.w / 2, fy = p.y + p.h;  // çıkış: alt orta
      const my = p.childY + (gapY / 2) - (gapY / 4); // yatay hat y konumu
      const edgeNid = p.nid;
      // Ebeveynden yatay hatta dikey çizgi
      inner += `<path class="org-edge" data-pnid="${edgeNid}" d="M${fx},${fy} V${my}" fill="none" stroke="${ec}" stroke-width="1.5" opacity="0.5"/>`;
      // Yatay hat: tüm çocukları birleştiren
      if (p.childMids.length > 1) {
        const leftX = Math.min(...p.childMids), rightX = Math.max(...p.childMids);
        inner += `<line class="org-edge" data-pnid="${edgeNid}" x1="${leftX}" y1="${my}" x2="${rightX}" y2="${my}" stroke="${ec}" stroke-width="1.5" opacity="0.5"/>`;
      }
      // Yatay hattan her çocuğa dikey çizgi
      for (const mid of p.childMids) {
        inner += `<path class="org-edge" data-pnid="${edgeNid}" d="M${mid},${my} V${p.childY}" fill="none" stroke="${ec}" stroke-width="1.5" opacity="0.5"/>`;
      }
    }
  }

  // Nodes
  for (const p of positions) {
    const isR = p.node._isRoot;
    if (p.collapsed) {
      // Collapsed node — draggable
      inner += `<g id="orgn-${p.nid}" class="org-node org-node-draggable" data-nid="${p.nid}" style="cursor:grab">
        <rect class="org-node-rect" data-nid="${p.nid}" x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" rx="10" fill="#151520" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.85"/>
        <rect x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" rx="10" fill="transparent" data-nid="${p.nid}"/>
        <text x="${p.x+p.w/2}" y="${p.y+18}" text-anchor="middle" fill="#9090c0" font-size="11" font-weight="600" font-family="IBM Plex Sans,sans-serif" pointer-events="none">${truncate(p.node.name,22)}</text>
        <text x="${p.x+p.w/2}" y="${p.y+34}" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="700" font-family="IBM Plex Sans,sans-serif" pointer-events="none">▶ ${p.descCount} parça</text>
        <text x="${p.x+p.w/2}" y="${p.y+49}" text-anchor="middle" fill="#5555aa" font-size="9" font-family="IBM Plex Sans,sans-serif" pointer-events="none">tıkla: aç / sürükle: taşı</text>
      </g>`;
    } else {
      const d = nidDepth[p.nid] || 0;
      const dc = depthColor(d);
      const fill = isR ? 'url(#rootGrad)' : dc.fill;
      const stroke = isR ? '#818cf8' : p.canCollapse ? '#10b981' : dc.stroke;
      const tc = '#e5e3df';
      const sc = dc.stroke;
      const sc2 = dc.stroke + '99';
      const descCount = _orgCountDesc(p.node.children);
      const tooltip = `${p.node.name}${p.node.partNo?' | '+p.node.partNo:''}${descCount?' | '+descCount+' alt parça':''}${p.node.qty>1?' | ×'+p.node.qty:''}`;
      const isDraggable = !isR;
      inner += `<g id="orgn-${p.nid}" class="org-node${isDraggable?' org-node-draggable':''}" data-nid="${p.nid}" style="cursor:${isDraggable?'grab':'default'}"
        onmouseenter="orgHoverNode('${p.nid}',true,'${tooltip.replace(/'/g,'&#39;')}')"
        onmouseleave="orgHoverNode('${p.nid}',false,'')">`;
      inner += `<rect class="org-node-rect" data-nid="${p.nid}" x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" rx="8" fill="${fill}" stroke="${stroke}" stroke-width="1.5" ${isR?'filter="url(#glow)"':''}/>`;
      const hasPN = !!p.node.partNo;
      const hasQty = true;
      // Dikey yerleşim: ad + parça no + adet satırına göre ortala
      const lineCount = 1 + (hasPN ? 1 : 0) + (hasQty ? 1 : 0);
      const totalH = lineCount * 16;
      const startY = p.y + (p.h - totalH) / 2 + 12;
      inner += `<text x="${p.x+p.w/2}" y="${startY}" text-anchor="middle" fill="${tc}" font-size="12" font-weight="600" font-family="IBM Plex Sans,sans-serif" pointer-events="none">${truncate(p.node.name,22)}</text>`;
      if (hasPN) inner += `<text x="${p.x+p.w/2}" y="${startY+16}" text-anchor="middle" fill="${sc}" font-size="10" font-family="JetBrains Mono,monospace" pointer-events="none">${p.node.partNo}</text>`;
      if (hasQty) {
        const qtyY = startY + (hasPN ? 32 : 16);
        const qtyColor = (p.node.qty||1) > 1 ? '#f59e0b' : '#6b7280';
        const qtyBg = (p.node.qty||1) > 1 ? '#f59e0b28' : '#6b728018';
        inner += `<rect x="${p.x+12}" y="${qtyY-11}" width="${p.w-24}" height="15" rx="4" fill="${qtyBg}" pointer-events="none"/>`;
        inner += `<text x="${p.x+p.w/2}" y="${qtyY}" text-anchor="middle" fill="${qtyColor}" font-size="11" font-weight="700" font-family="JetBrains Mono,monospace" pointer-events="none">×${p.node.qty||1} adet</text>`;
      }
      if (p.canCollapse && !hasQty) {
        inner += `<text x="${p.x+p.w/2}" y="${p.y+p.h-4}" text-anchor="middle" fill="#10b981" font-size="8" font-family="IBM Plex Sans,sans-serif" pointer-events="none">kapat</text>`;
      }
      inner += `</g>`;
    }
  }

  const depthOpts = [...Array.from({length:21},(_,i)=>i+1),99].map(d => {
    const lbl = d===99?'Tümü':`${d}`;
    const act = maxD===d?'background:var(--ac);color:#fff;border-color:var(--ac)':'';
    return `<button class="viz-btn" style="min-width:24px;padding:3px 5px;font-size:10px;${act}" onclick="setOrgDepth(${d})">${lbl}</button>`;
  }).join('');

  container.innerHTML = `<div class="viz-container" id="orgVizC">
    <svg id="orgSvg" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <g id="orgG">${inner}</g>
    </svg>
    <div style="position:absolute;top:12px;left:12px;background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:10px;color:var(--tx3);z-index:10;display:flex;flex-direction:column;gap:6px">
      <div>🖱 Scroll: Zoom &nbsp;|&nbsp; Sürükle: Gezin &nbsp;|&nbsp; Düğüme tıkla: aç/kapat</div>
      <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
        <span style="color:var(--tx4)">Tüm derinlik:</span>
        ${depthOpts}
      </div>
      <div style="color:var(--tx4);font-size:9px">${renderedNodes} gösteriliyor / ${totalNodes} toplam</div>
    </div>
    <div style="position:absolute;bottom:12px;right:12px;display:flex;gap:4px;z-index:10">
      <button class="viz-btn" onclick="orgCollapseAll()" title="Tüm açık dalları kapat">✕ Tümünü Kapat</button>
      <button class="viz-btn" onclick="orgZoom(1.3)">＋</button>
      <button class="viz-btn" onclick="orgZoom(0.7)">−</button>
      <button class="viz-btn" onclick="orgFit()">Sığdır</button>
    </div>
  </div>`;

  // Preserve pan/zoom if we already had a view, otherwise init
  const prevViz = window._orgViz;
  window._orgViz = {
    scale: prevViz ? prevViz.scale : 1,
    tx: prevViz ? prevViz.tx : 0,
    ty: prevViz ? prevViz.ty : 0,
    dragging: false, lastX: 0, lastY: 0, svgW, svgH
  };

  if (S.orgFocusNid) {
    _orgZoomToSubtree(S.orgFocusNid, positions);
    S.orgFocusNid = null;
  } else if (!prevViz) {
    orgFit();
  } else {
    applyOrgTransform();
  }

  // Re-apply search highlights after re-render
  if (S.orgSearchHits?.length) {
    requestAnimationFrame(() => _orgHighlightApply());
  }

  // Tooltip elementi
  if (!document.getElementById('orgTooltip')) {
    const tt = document.createElement('div');
    tt.id = 'orgTooltip';
    tt.style.cssText = 'position:fixed;background:#1e1e2a;border:1px solid #3a3a55;border-radius:7px;padding:6px 10px;font-size:11px;color:#e5e3df;pointer-events:none;z-index:9999;display:none;max-width:260px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.5)';
    document.body.appendChild(tt);
  }

  window.orgHoverNode = function(nid, enter, tooltipText) {
    const svg = document.getElementById('orgSvg'); if (!svg) return;
    const tt = document.getElementById('orgTooltip');

    if (!enter) {
      // Tüm node'ları normale döndür
      svg.querySelectorAll('.org-node-rect').forEach(el => {
        el.style.opacity = ''; el.style.filter = '';
      });
      svg.querySelectorAll('.org-edge').forEach(el => {
        el.style.opacity = '0.5'; el.style.strokeWidth = '';
      });
      if (tt) tt.style.display = 'none';
      return;
    }

    // Hover tooltip
    if (tt && tooltipText) {
      tt.textContent = tooltipText;
      tt.style.display = 'block';
      document.addEventListener('mousemove', _orgMoveTooltip);
    }

    // Ata zincirini bul (nid → kök)
    const ancestors = new Set();
    let cur = nid;
    while (cur) { ancestors.add(cur); cur = S._orgParentOf?.[cur]; }

    // Tüm node'ları soluklaştır, ata zincirini parlat
    svg.querySelectorAll('.org-node-rect').forEach(el => {
      const n = el.dataset.nid;
      if (ancestors.has(n)) {
        el.style.opacity = '1';
        el.style.filter = 'url(#glowHover)';
      } else {
        el.style.opacity = '0.2';
        el.style.filter = '';
      }
    });

    // Edge'leri de ata zincirine göre vurgula
    svg.querySelectorAll('.org-edge').forEach(el => {
      const pnid = el.dataset.pnid;
      if (ancestors.has(pnid)) {
        el.style.opacity = '1';
        el.style.strokeWidth = '2.5';
      } else {
        el.style.opacity = '0.08';
      }
    });
  };

  function _orgMoveTooltip(e) {
    const tt = document.getElementById('orgTooltip'); if (!tt) return;
    if (tt.style.display === 'none') { document.removeEventListener('mousemove', _orgMoveTooltip); return; }
    tt.style.left = (e.clientX + 14) + 'px';
    tt.style.top = (e.clientY - 10) + 'px';
  }

  const svg = document.getElementById('orgSvg');
  svg.addEventListener('wheel', function(e) {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 0.88;
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const v = window._orgViz;
    const newScale = Math.max(0.05, Math.min(5, v.scale * factor));
    v.tx = mx - (mx - v.tx) * (newScale / v.scale);
    v.ty = my - (my - v.ty) * (newScale / v.scale);
    v.scale = newScale;
    applyOrgTransform();
  }, { passive: false });

  // Middle-click: collapse subtree + adjust depth
  svg.addEventListener('mousedown', function(e) {
    if (e.button === 1) {
      e.preventDefault();
      const nid = _orgNidAt(e.clientX, e.clientY);
      if (nid && nid !== 'org-root') { orgCollapseSubtree(nid); }
      return;
    }
  });

  // Right-click on org node: context menu
  svg.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    const nid = _orgNidAt(e.clientX, e.clientY);
    if (!nid || nid === 'org-root') return;
    showOrgNodeCtxMenu(e, nid);
  });

  // Smart mousedown: node drag vs canvas pan
  svg.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    const nid = _orgNidAt(e.clientX, e.clientY);
    if (nid && nid !== 'org-root') {
      // Start as drag candidate — actual drag activates after threshold
      S.orgDragCandidate = {nid, startX: e.clientX, startY: e.clientY};
      e.stopPropagation();
    } else {
      const v = window._orgViz; v.dragging = true; v.lastX = e.clientX; v.lastY = e.clientY;
      svg.style.cursor = 'grabbing';
    }
  });

  // Library drag onto org chart
  svg.addEventListener('dragover', function(e) {
    if (S.libDragId) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; }
  });
  svg.addEventListener('drop', function(e) {
    e.preventDefault();
    const dragKey = S.libDragId || e.dataTransfer.getData('text/plain');
    if (!dragKey || (!dragKey.startsWith('lib:') && !dragKey.startsWith('bom:'))) return;
    S.libDragId = null;
    const nid = _orgNidAt(e.clientX, e.clientY);
    _orgLibDrop(dragKey, nid);
  });

  // Install global handlers only once
  if (!window._orgHandlersInstalled) {
    window._orgHandlersInstalled = true;
    window.addEventListener('mousemove', function(e) {
      // Canvas pan
      const v = window._orgViz;
      if (v && v.dragging) {
        v.tx += e.clientX - v.lastX; v.ty += e.clientY - v.lastY;
        v.lastX = e.clientX; v.lastY = e.clientY;
        applyOrgTransform(); return;
      }
      // Node drag
      if (S.orgDragCandidate) {
        const dx = e.clientX - S.orgDragCandidate.startX;
        const dy = e.clientY - S.orgDragCandidate.startY;
        if (!S.orgDragId && Math.sqrt(dx*dx+dy*dy) > 6) {
          S.orgDragId = S.orgDragCandidate.nid;
          _orgNodeDragStart(S.orgDragId);
        }
        if (S.orgDragId) _orgNodeDragMove(e);
      }
    });
    window.addEventListener('mouseup', function(e) {
      const v = window._orgViz; if (v) v.dragging = false;
      const svg = document.getElementById('orgSvg'); if (svg) svg.style.cursor = 'grab';
      if (window._orgDashRAF) { cancelAnimationFrame(window._orgDashRAF); window._orgDashRAF = null; }
      const pe = document.getElementById('org-preview-edge'); if(pe) pe.remove();
      if (S.orgDragId) _orgNodeDragEnd(e);
      else if (S.orgDragCandidate) {
        // It was a click, not a drag — open right panel + handle toggle
        const nid = S.orgDragCandidate.nid;
        S.orgDragCandidate = null;
        const pos = (window._orgPositions||[]).find(p=>p.nid===nid);
        if (pos && (pos.collapsed || pos.canCollapse)) orgToggleNode(nid);
        // Open detail panel for the clicked node
        S.selNode = nid;
        showNodeRP(nid);
      }
      S.orgDragCandidate = null;
    });
  }
  svg.style.cursor = 'grab';
}

// ═══════ ORG CHART DRAG & DROP ═══════

// Find data-nid at screen coords (walks up from elementFromPoint)
function _orgNidAt(cx, cy) {
  // Geçici olarak ghost ve preview edge'i gizle
  const ghost = document.getElementById('orgDragGhost');
  const pe = document.getElementById('org-preview-edge');
  if (ghost) ghost.style.display = 'none';
  if (pe) pe.style.display = 'none';
  let el = document.elementFromPoint(cx, cy);
  if (ghost) ghost.style.display = '';
  if (pe) pe.style.display = '';
  while (el && el.tagName !== 'svg') {
    if (el.dataset && el.dataset.nid) return el.dataset.nid;
    el = el.parentElement;
  }
  return null;
}

// Get/create ghost div
function _orgGhost() {
  let g = document.getElementById('orgDragGhost');
  if (!g) { g = document.createElement('div'); g.id = 'orgDragGhost'; document.body.appendChild(g); }
  return g;
}

function _orgNodeDragStart(nid) {
  const pos = (window._orgPositions||[]).find(p=>p.nid===nid); if(!pos) return;
  const ghost = _orgGhost();
  ghost.textContent = '⠿ ' + (pos.node.name||'');
  ghost.style.display = 'block';
  const el = document.getElementById('orgn-'+nid);
  if (el) el.style.opacity = '0.35';
  S.orgDropTarget = null; S.orgDropMode = null;

  // Kalıcı preview edge elemanını oluştur
  const old = document.getElementById('org-preview-edge');
  if (old) old.remove();
  const orgG = document.getElementById('orgG');
  if (orgG) {
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.id = 'org-preview-edge';
    g.setAttribute('pointer-events','none');
    g.style.display = 'none';
    g.innerHTML = `
      <path id="org-pe-path" fill="none" stroke-width="3.5" stroke-dasharray="9,5" stroke-linecap="round" opacity="0.95"/>
      <circle id="org-pe-end" r="7" opacity="0.9"/>
      <circle id="org-pe-start" r="4" opacity="0.7"/>`;
    orgG.appendChild(g);
  }

  // Tek RAF döngüsü — drag boyunca devam eder
  window._orgDashOffset = 0;
  if (window._orgDashRAF) cancelAnimationFrame(window._orgDashRAF);
  function dashLoop() {
    window._orgDashOffset = (window._orgDashOffset || 0) - 1;
    const p = document.getElementById('org-pe-path');
    if (p) p.setAttribute('stroke-dashoffset', window._orgDashOffset);
    if (S.orgDragId) window._orgDashRAF = requestAnimationFrame(dashLoop);
    else window._orgDashRAF = null;
  }
  window._orgDashRAF = requestAnimationFrame(dashLoop);
}

// dropMode: 'into' | 'before' | 'after'
function _orgDropMode(nid, clientY) {
  const pos = (window._orgPositions||[]).find(p=>p.nid===nid); if (!pos) return 'into';
  const v = window._orgViz || {scale:1,tx:0,ty:0};
  // Convert SVG coords to screen
  const svgEl = document.getElementById('orgSvg'); if (!svgEl) return 'into';
  const svgRect = svgEl.getBoundingClientRect();
  const nodeScreenTop = svgRect.top + (pos.y * v.scale + v.ty);
  const nodeScreenBot = nodeScreenTop + pos.h * v.scale;
  const zone = (nodeScreenBot - nodeScreenTop) * 0.28;
  if (clientY < nodeScreenTop + zone) return 'before';
  if (clientY > nodeScreenBot - zone) return 'after';
  return 'into';
}

function _orgNodeDragMove(e) {
  const ghost = _orgGhost();
  ghost.style.left = e.clientX + 'px';
  ghost.style.top = (e.clientY - 36) + 'px';

  const nid = _orgNidAt(e.clientX, e.clientY);
  const validTarget = nid && nid !== S.orgDragId && nid !== 'org-root' && !_orgIsDescendant(nid, S.orgDragId);
  const mode = validTarget ? _orgDropMode(nid, e.clientY) : null;
  const modeChanged = mode !== S.orgDropMode || nid !== S.orgDropTarget;

  if (modeChanged) {
    if (S.orgDropTarget) _orgSetDropHighlight(S.orgDropTarget, false);
    S.orgDropTarget = validTarget ? nid : null;
    S.orgDropMode = mode;
    if (S.orgDropTarget) _orgSetDropHighlight(S.orgDropTarget, true, mode);
  }
  // Preview edge her mousemove'da güncelle
  _orgUpdatePreviewEdge(validTarget ? nid : null, mode);

  // Ghost label
  const dragPos = (window._orgPositions||[]).find(p=>p.nid===S.orgDragId);
  const dragName = dragPos?.node?.name || '';
  if (validTarget) {
    const targetPos = (window._orgPositions||[]).find(p=>p.nid===nid);
    const targetName = targetPos?.node?.name || '';
    const modeLabel = mode==='into' ? 'altına ekle' : mode==='before' ? 'önüne ekle (kardeş)' : 'arkasına ekle (kardeş)';
    const modeColor = mode==='into' ? '#34d399' : '#60a5fa';
    ghost.innerHTML = `<span style="opacity:.7">${dragName}</span> <span style="color:${modeColor};margin:0 4px">→</span> <b>${targetName}</b> <span style="color:${modeColor};font-size:9px;margin-left:4px">${modeLabel}</span>`;
    ghost.style.borderColor = modeColor;
    ghost.style.background = mode==='into' ? '#0a1f14' : '#0d1a2e';
    ghost.style.color = '#e5e3df';
    ghost.style.boxShadow = `0 0 16px ${modeColor}55,0 4px 20px rgba(0,0,0,.6)`;
  } else {
    ghost.textContent = '⠿ ' + dragName;
    ghost.style.borderColor = '#6366f1';
    ghost.style.background = '#1e1b4b';
    ghost.style.color = '#9090c0';
    ghost.style.boxShadow = '0 4px 20px rgba(0,0,0,.6)';
  }
}

// Preview edge: sadece path geometrisini güncelle (element dragStart'ta bir kez oluşturuldu)
function _orgUpdatePreviewEdge(targetNid, mode) {
  const g = document.getElementById('org-preview-edge');
  if (!g) return;

  if (!targetNid || !S.orgDragId) {
    g.style.display = 'none';
    return;
  }

  const dragPos = (window._orgPositions||[]).find(p=>p.nid===S.orgDragId);
  const targetPos = (window._orgPositions||[]).find(p=>p.nid===targetNid);
  if (!dragPos || !targetPos) { g.style.display='none'; return; }

  let x1, y1, x2, y2;
  if (mode === 'into') {
    x1 = dragPos.x + dragPos.w/2;  y1 = dragPos.y + dragPos.h;
    x2 = targetPos.x + targetPos.w/2; y2 = targetPos.y;
  } else if (mode === 'before') {
    x1 = dragPos.x + dragPos.w/2;  y1 = dragPos.y;
    x2 = targetPos.x + targetPos.w/2; y2 = targetPos.y - 6;
  } else {
    x1 = dragPos.x + dragPos.w/2;  y1 = dragPos.y + dragPos.h;
    x2 = targetPos.x + targetPos.w/2; y2 = targetPos.y + targetPos.h + 6;
  }

  const color = mode === 'into' ? '#34d399' : '#60a5fa';
  const my = (y1 + y2) / 2;

  const path = document.getElementById('org-pe-path');
  const endC = document.getElementById('org-pe-end');
  const startC = document.getElementById('org-pe-start');

  if (path) {
    path.setAttribute('d', `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
    path.setAttribute('stroke', color);
  }
  if (endC)   { endC.setAttribute('cx',x2); endC.setAttribute('cy',y2); endC.setAttribute('fill',color); }
  if (startC) { startC.setAttribute('cx',x1); startC.setAttribute('cy',y1); startC.setAttribute('fill',color); }

  g.style.display = '';
}

function _orgSetDropHighlight(nid, on, mode='into') {
  const g = document.getElementById('orgn-'+nid); if (!g) return;
  const rect = g.querySelector('.org-node-rect'); if (!rect) return;
  const oldOverlay = document.getElementById('org-drop-overlay-'+nid);
  if (oldOverlay) oldOverlay.remove();

  if (on) {
    rect.setAttribute('data-orig-stroke', rect.getAttribute('stroke'));
    rect.setAttribute('data-orig-sw', rect.getAttribute('stroke-width')||'1.5');
    const color = mode==='into' ? '#34d399' : '#60a5fa';
    rect.setAttribute('stroke', color);
    rect.setAttribute('stroke-width', '3');
    rect.style.filter = 'url(#glowHover)';

    const x = parseFloat(rect.getAttribute('x')), y = parseFloat(rect.getAttribute('y'));
    const w = parseFloat(rect.getAttribute('width')), h = parseFloat(rect.getAttribute('height'));
    const rx = parseFloat(rect.getAttribute('rx')||'8');
    const overlay = document.createElementNS('http://www.w3.org/2000/svg','g');
    overlay.id = 'org-drop-overlay-'+nid;
    overlay.style.pointerEvents = 'none';
    const orgG = document.getElementById('orgG'); if (!orgG) return;

    if (mode === 'into') {
      // Yeşil dolgu + ＋ ikonu + pulse
      overlay.innerHTML = `
        <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" fill="rgba(52,211,153,0.18)" stroke="none">
          <animate attributeName="opacity" values="0.4;0.9;0.4" dur="0.9s" repeatCount="indefinite"/>
        </rect>
        <text x="${x+w/2}" y="${y+h/2+6}" text-anchor="middle" fill="#34d399" font-size="22" font-weight="700" font-family="IBM Plex Sans,sans-serif">＋</text>`;
    } else {
      // Kardeş modu: mavi çizgi — üstte veya altta
      const lineY = mode==='before' ? y+3 : y+h-3;
      overlay.innerHTML = `
        <line x1="${x+8}" y1="${lineY}" x2="${x+w-8}" y2="${lineY}" stroke="#60a5fa" stroke-width="3" stroke-linecap="round">
          <animate attributeName="opacity" values="0.5;1;0.5" dur="0.7s" repeatCount="indefinite"/>
        </line>
        <circle cx="${x+8}" cy="${lineY}" r="4" fill="#60a5fa"/>
        <circle cx="${x+w-8}" cy="${lineY}" r="4" fill="#60a5fa"/>

  } else {
    const origStroke = rect.getAttribute('data-orig-stroke');
    const origSw = rect.getAttribute('data-orig-sw')||'1.5';
    if (origStroke) rect.setAttribute('stroke', origStroke);
    rect.setAttribute('stroke-width', origSw);
    rect.style.filter = '';
  }
}

function _orgIsDescendant(possibleDescNid, ancestorNid) {
  // Check if possibleDescNid is a descendant of ancestorNid using _orgParentOf
  let cur = possibleDescNid;
  while (cur) {
    if (cur === ancestorNid) return true;
    cur = S._orgParentOf?.[cur];
  }
  return false;
}

async function _orgNodeDragEnd(e) {
  const dragId = S.orgDragId;
  const dropTarget = S.orgDropTarget;
  const dropMode = S.orgDropMode || 'into';
  S.orgDragId = null; S.orgDragCandidate = null; S.orgDropTarget = null; S.orgDropMode = null;

  // RAF durdur
  if (window._orgDashRAF) { cancelAnimationFrame(window._orgDashRAF); window._orgDashRAF = null; }
  // Temizlik
  const ghost = document.getElementById('orgDragGhost');
  if (ghost) ghost.style.display = 'none';
  const dragEl = document.getElementById('orgn-'+dragId);
  if (dragEl) dragEl.style.opacity = '';
  if (dropTarget) _orgSetDropHighlight(dropTarget, false);
  document.querySelectorAll('[id^="org-drop-overlay-"]').forEach(el=>el.remove());
  const pe = document.getElementById('org-preview-edge'); if(pe) pe.remove();

  if (!dropTarget || !dragId) return;

  const dragPos = (window._orgPositions||[]).find(p=>p.nid===dragId);
  const dropPos = (window._orgPositions||[]).find(p=>p.nid===dropTarget);
  if (!dragPos || !dropPos) return;

  const realDragId = dragPos.node.id;
  const realDropId = dropPos.node.id;
  if (!realDragId || !realDropId) return;

  const sys = S.systems.find(s=>s.id===S.selSys); if(!sys) return;
  const dragNode = find(sys.children, realDragId); if(!dragNode) return;
  const isDescendant = (node, pid) => { if(node.id===pid)return true; if(node.children)for(const c of node.children){if(isDescendant(c,pid))return true}; return false; };
  if (isDescendant(dragNode, realDropId)) { toast("Kendi altına taşınamaz","error"); return; }

  rm(sys.children, realDragId);

  if (dropMode === 'into') {
    // Alt eleman olarak ekle
    const target = find(sys.children, realDropId) || (sys.id===realDropId ? sys : null);
    if (!target) return;
    if (!target.children) target.children = [];
    target.children.push(dragNode);
    addRev("Org taşındı", `${dragNode.name} → ${target.name} altına`);
    toast(`"${dragNode.name}" → "${target.name}" altına eklendi`);
  } else {
    // Kardeş olarak ekle — önüne veya arkasına
    function insertSibling(nodes) {
      for (let i=0; i<nodes.length; i++) {
        if (nodes[i].id === realDropId) {
          const insertIdx = dropMode==='before' ? i : i+1;
          nodes.splice(insertIdx, 0, dragNode);
          return true;
        }
        if (nodes[i].children?.length && insertSibling(nodes[i].children)) return true;
      }
      return false;
    }
    insertSibling(sys.children);
    const label = dropMode==='before' ? 'önüne' : 'arkasına';
    addRev("Org taşındı", `${dragNode.name} ↔ ${dropPos.node.name} ${label}`);
    toast(`"${dragNode.name}" → "${dropPos.node.name}" ${label} eklendi`);
  }

  await persist(); renderMain();
}

// Library / BOM-search drop onto org chart node
async function _orgLibDrop(dragKey, targetNid) {
  const sys = S.systems.find(s=>s.id===S.selSys); if(!sys) return;
  // Find target node
  const pos = (window._orgPositions||[]).find(p=>p.nid===targetNid);
  const realTargetId = pos?.node?.id;
  const target = realTargetId ? (find(sys.children, realTargetId)||(sys.id===realTargetId?sys:null)) : sys;
  if (!target) { toast("Hedef bulunamadı","error"); return; }

  let srcNode;
  if (dragKey.startsWith('lib:')) {
    const item = S.library.find(l=>l.id===dragKey.slice(4)); if(!item) return;
    srcNode = _libItemToNode(item);
  } else if (dragKey.startsWith('bom:')) {
    let f=null; for(const s of S.systems){f=find(s.children,dragKey.slice(4));if(f)break} if(!f)return;
    srcNode = _deepCopyNode(f);
  } else return;

  if (!target.children) target.children = [];
  target.children.push(srcNode);
  _expandAll(srcNode);
  const childCount = srcNode.children?.length||0;
  addRev("Org'a kütüphaneden eklendi", `${srcNode.name} → ${target.name}`);
  await persist(); renderMain(); toast(`"${srcNode.name}" org chart'a eklendi${childCount?' ('+childCount+' alt parça ile)':''}`);
}

function applyOrgTransform() {
  const g = document.getElementById('orgG'); if (!g) return;
  const v = window._orgViz;
  g.setAttribute('transform', `translate(${v.tx},${v.ty}) scale(${v.scale})`);
}

function orgZoom(factor) {
  const v = window._orgViz; if (!v) return;
  const svg = document.getElementById('orgSvg'); if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const newScale = Math.max(0.1, Math.min(5, v.scale * factor));
  v.tx = cx - (cx - v.tx) * (newScale / v.scale);
  v.ty = cy - (cy - v.ty) * (newScale / v.scale);
  v.scale = newScale;
  applyOrgTransform();
}

function orgFit() {
  const v = window._orgViz; if (!v) return;
  const svg = document.getElementById('orgSvg'); if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const scaleX = rect.width / (v.svgW + 100), scaleY = rect.height / (v.svgH + 100);
  v.scale = Math.min(scaleX, scaleY, 1.2);
  v.tx = (rect.width - v.svgW * v.scale) / 2;
  v.ty = (rect.height - v.svgH * v.scale) / 2 + 20;
  applyOrgTransform();
}

function _orgZoomToSubtree(focusNid, positions) {
  const v = window._orgViz; if (!v) return;
  const svg = document.getElementById('orgSvg'); if (!svg) return;

  // Build nid→position map and children map
  const posMap = {};
  positions.forEach(p => posMap[p.nid] = p);
  const childrenOf = {};
  positions.forEach(p => {
    if (p.parentNid) {
      if (!childrenOf[p.parentNid]) childrenOf[p.parentNid] = [];
      childrenOf[p.parentNid].push(p.nid);
    }
  });

  // Collect all positions in the subtree rooted at focusNid
  const subtree = [];
  const walk = nid => {
    if (posMap[nid]) subtree.push(posMap[nid]);
    (childrenOf[nid] || []).forEach(walk);
  };
  walk(focusNid);

  if (!subtree.length) { applyOrgTransform(); return; }

  // Bounding box of subtree with padding
  const pad = 60;
  const minX = Math.min(...subtree.map(p => p.x)) - pad;
  const maxX = Math.max(...subtree.map(p => p.x + p.w)) + pad;
  const minY = Math.min(...subtree.map(p => p.y)) - pad;
  const maxY = Math.max(...subtree.map(p => p.y + p.h)) + pad;
  const bW = maxX - minX, bH = maxY - minY;

  const rect = svg.getBoundingClientRect();
  const sx = rect.width / bW, sy = rect.height / bH;
  v.scale = Math.min(sx, sy, 1.6); // max zoom 1.6x so labels are readable
  v.tx = rect.width / 2 - (minX + bW / 2) * v.scale;
  v.ty = rect.height / 2 - (minY + bH / 2) * v.scale;
  applyOrgTransform();
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

// ═══════ ORG CHART SEARCH ═══════
let _orgSearchTimer = null;
S.orgSearch = ''; S.orgSearchHits = []; S.orgSearchIdx = 0;

// Pre-built parent map for fast ancestor lookup (rebuilt when BOM changes)
let _orgParentMapCache = null; // id → parentId
let _orgParentMapSysId = null;

function _getOrgParentMap(sys) {
  if (_orgParentMapSysId === sys.id && _orgParentMapCache) return _orgParentMapCache;
  const map = {};
  const walk = (nodes, parentId) => {
    for (const n of nodes) {
      if (n.id) map[n.id] = parentId;
      if (n.children?.length) walk(n.children, n.id);
    }
  };
  walk(sys.children, 'org-root');
  _orgParentMapCache = map;
  _orgParentMapSysId = sys.id;
  return map;
}

function _getAncestors(id, parentMap) {
  const ancestors = [];
  let cur = parentMap[id];
  while (cur && cur !== 'org-root') { ancestors.push(cur); cur = parentMap[cur]; }
  if (cur === 'org-root') ancestors.push('org-root');
  return ancestors;
}

const ORG_SEARCH_MAX_EXPAND = 30; // max hits that trigger full re-render with expansion

function orgSearchInput(q) {
  S.orgSearch = q;
  if (_orgSearchTimer) clearTimeout(_orgSearchTimer);
  if (!q || q.length < 2) {
    S.orgSearchHits = []; S.orgSearchIdx = 0;
    _orgHighlightApply(); _updateOrgSearchInfo(); return;
  }
  _orgSearchTimer = setTimeout(() => _doOrgSearch(q), 350);
}

function _doOrgSearch(q) {
  const sys = S.systems.find(s => s.id === S.selSys); if (!sys) return;
  const ql = q.toLowerCase();
  const parentMap = _getOrgParentMap(sys);

  // Fast walk: no array spreading, just collect hit IDs
  const hitIds = [];
  const walk = (nodes) => {
    for (const n of nodes) {
      if ((n.name||'').toLowerCase().includes(ql)
        || (n.partNo||'').toLowerCase().includes(ql)) {
        hitIds.push(n.id);
      }
      if (n.children?.length) walk(n.children);
    }
  };
  if ((sys.name||'').toLowerCase().includes(ql)) hitIds.push('org-root');
  walk(sys.children);

  if (hitIds.length === 0) {
    S.orgSearchHits = []; S.orgSearchIdx = 0;
    _orgHighlightApply(); _updateOrgSearchInfo(); return;
  }

  if (!S.orgExpanded) S.orgExpanded = new Set();

  // Always expand ancestors, but cap at ORG_SEARCH_MAX_EXPAND to avoid freeze
  const visibleHitIds = hitIds.slice(0, ORG_SEARCH_MAX_EXPAND);
  S._orgSearchTotalHits = hitIds.length; // for info display

  let needRerender = false;
  visibleHitIds.forEach(id => {
    _getAncestors(id, parentMap).forEach(aid => {
      if (!S.orgExpanded.has(aid)) { S.orgExpanded.add(aid); needRerender = true; }
    });
  });

  const afterRender = () => {
    const positions = window._orgPositions || [];
    const idToNid = {};
    positions.forEach(p => { if (p.node.id) idToNid[p.node.id] = p.nid; });
    idToNid['org-root'] = 'org-root';
    S.orgSearchHits = visibleHitIds.map(id => idToNid[id] || id).filter(Boolean);
    S.orgSearchIdx = 0;
    _orgHighlightApply();
    _updateOrgSearchInfo();
    if (S.orgSearchHits.length > 0) _orgZoomToHits(S.orgSearchHits);
  };

  if (needRerender) { renderTab(); requestAnimationFrame(afterRender); }
  else afterRender();
}

function _orgHighlightApply() {
  // Remove old highlights
  document.querySelectorAll('#orgG .org-hit').forEach(el => {
    el.querySelector('rect')?.setAttribute('stroke', el.dataset.origStroke || '#2e2e34');
    el.classList.remove('org-hit');
  });
  document.querySelectorAll('#orgG .org-hit-cur').forEach(el => el.classList.remove('org-hit-cur'));

  if (!S.orgSearchHits?.length) return;
  const hitSet = new Set(S.orgSearchHits);
  const curId = S.orgSearchHits[S.orgSearchIdx];

  document.querySelectorAll('#orgG [data-nid]').forEach(el => {
    const nid = el.dataset.nid;
    if (hitSet.has(nid)) {
      el.classList.add('org-hit');
      const rect = el.querySelector('rect');
      if (rect) { el.dataset.origStroke = rect.getAttribute('stroke'); rect.setAttribute('stroke', nid === curId ? '#f59e0b' : '#10b981'); rect.setAttribute('stroke-width', '2.5'); }
    }
  });
}

function _updateOrgSearchInfo() {
  const el = document.getElementById('orgSearchInfo'); if (!el) return;
  if (!S.orgSearchHits?.length) {
    el.textContent = S.orgSearch?.length >= 2 ? 'Sonuç yok' : '';
  } else {
    const total = S._orgSearchTotalHits || S.orgSearchHits.length;
    const suffix = total > S.orgSearchHits.length ? ` (toplam ${total})` : '';
    el.textContent = `${S.orgSearchIdx+1}/${S.orgSearchHits.length}${suffix}`;
  }
}

function _orgZoomToHits(hits) {
  if (!window._orgViz) return;
  const positions = window._orgPositions; if (!positions) return;
  const hitSet = new Set(hits);
  const sub = positions.filter(p => hitSet.has(p.nid));
  if (!sub.length) return;
  const pad = 80;
  const minX = Math.min(...sub.map(p=>p.x))-pad, maxX = Math.max(...sub.map(p=>p.x+p.w))+pad;
  const minY = Math.min(...sub.map(p=>p.y))-pad, maxY = Math.max(...sub.map(p=>p.y+p.h))+pad;
  const bW = maxX-minX, bH = maxY-minY;
  const svg = document.getElementById('orgSvg'); if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const v = window._orgViz;
  v.scale = Math.min(rect.width/bW, rect.height/bH, 1.8);
  v.tx = rect.width/2 - (minX+bW/2)*v.scale;
  v.ty = rect.height/2 - (minY+bH/2)*v.scale;
  applyOrgTransform();
}

function orgSearchNav(dir) {
  if (!S.orgSearchHits?.length) return;
  S.orgSearchIdx = (S.orgSearchIdx + dir + S.orgSearchHits.length) % S.orgSearchHits.length;
  _orgHighlightApply(); _updateOrgSearchInfo();
  const positions = window._orgPositions; if (!positions) return;
  const curId = S.orgSearchHits[S.orgSearchIdx];
  const p = positions.find(p => p.nid === curId);
  if (!p) return;
  const svg = document.getElementById('orgSvg'); if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const v = window._orgViz;
  const pad = 120;
  v.scale = Math.min(rect.width/(p.w+pad*2), rect.height/(p.h+pad*2), 1.8);
  v.tx = rect.width/2 - (p.x+p.w/2)*v.scale;
  v.ty = rect.height/2 - (p.y+p.h/2)*v.scale;
  applyOrgTransform();
}

function orgSearchKeyNav(e) {
  if (e.key==='Enter') { e.preventDefault(); orgSearchNav(e.shiftKey?-1:1); }
  if (e.key==='Escape') orgSearchClear();
}

function orgSearchClear() {
  S.orgSearch=''; S.orgSearchHits=[]; S.orgSearchIdx=0;
  _orgHighlightApply(); renderToolbar();
}

// ═══════ FORCE GRAPH VISUALIZATION ═══════
const GRAPH_SVG_LIMIT = 250; // above this → canvas mode
const depthColors = ['#6366f1', '#10b981', '#f59e0b', '#ec4899', '#3b82f6', '#8b5cf6'];

function renderForceGraph(container) {
  const sys = S.systems.find(s => s.id === S.selSys);
  if (!sys) return;

  // Collect all nodes
  const allNodes = [], allLinks = [];
  function walk(node, parentId, depth) {
    const id = node.id || ('n-' + allNodes.length);
    node._fid = id;
    allNodes.push({ id, name: node.name, partNo: node.partNo, depth, qty: node.qty, children: node.children });
    if (parentId) allLinks.push({ source: parentId, target: id });
    if (node.children) node.children.forEach(c => walk(c, id, depth + 1));
  }
  const rootId = 'root-' + sys.id;
  allNodes.push({ id: rootId, name: sys.name, partNo: '', depth: 0, qty: 1, children: sys.children });
  sys.children.forEach(c => walk(c, rootId, 1));

  if (allNodes.length <= GRAPH_SVG_LIMIT) {
    _renderForceGraphSVG(container, allNodes, allLinks);
  } else {
    _renderForceGraphCanvas(container, allNodes, allLinks);
  }
}

// ── Small graph: SVG force simulation (unchanged logic, optimized iterations) ──
function _renderForceGraphSVG(container, nodes, links) {
  // Give nodes initial positions
  nodes.forEach(n => { n.x = 500 + (Math.random()-0.5)*400; n.y = 400 + (Math.random()-0.5)*300; n.vx=0; n.vy=0; });

  // Build lookup map for link resolve
  const byId = {}; nodes.forEach(n => byId[n.id] = n);

  const iters = Math.min(300, Math.max(80, 15000 / nodes.length));
  for (let iter = 0; iter < iters; iter++) {
    // Repulsion (O(n²) but n is small here)
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        let dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y;
        let d=Math.sqrt(dx*dx+dy*dy)||1, f=1200/(d*d);
        let fx=dx/d*f, fy=dy/d*f;
        nodes[i].vx-=fx; nodes[i].vy-=fy; nodes[j].vx+=fx; nodes[j].vy+=fy;
      }
    }
    for (const l of links) {
      const s=byId[l.source], t=byId[l.target]; if(!s||!t) continue;
      let dx=t.x-s.x, dy=t.y-s.y, d=Math.sqrt(dx*dx+dy*dy)||1, f=(d-120)*0.015;
      s.vx+=dx/d*f; s.vy+=dy/d*f; t.vx-=dx/d*f; t.vy-=dy/d*f;
    }
    for (const n of nodes) {
      n.vx+=(500-n.x)*0.001; n.vy+=(400-n.y)*0.001;
      n.vx*=0.85; n.vy*=0.85; n.x+=n.vx; n.y+=n.vy;
    }
  }

  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for(const n of nodes){if(n.x<minX)minX=n.x;if(n.x>maxX)maxX=n.x;if(n.y<minY)minY=n.y;if(n.y>maxY)maxY=n.y}
  const gW=maxX-minX+200, gH=maxY-minY+200;

  let inner=`<defs><filter id="glow2"><feGaussianBlur stdDeviation="5" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowhead" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#444"/></marker></defs>`;

  const byId2={}; nodes.forEach(n=>byId2[n.id]=n);
  for(const l of links){const s=byId2[l.source],t=byId2[l.target];if(!s||!t)continue;inner+=`<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>`;}
  for(const n of nodes){
    const r=n.depth===0?32:Math.max(14,22-n.depth*3);
    const col=depthColors[n.depth%depthColors.length];
    inner+=`<circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${col}" opacity="0.9" stroke="${col}" stroke-width="3" stroke-opacity="0.25" ${n.depth===0?'filter="url(#glow2)"':''}/>`;
    inner+=`<text x="${n.x}" y="${n.y+r+16}" text-anchor="middle" fill="#aaa" font-size="${n.depth===0?13:11}" font-weight="500" font-family="IBM Plex Sans,sans-serif">${truncate(n.name,20)}</text>`;
    if(n.partNo) inner+=`<text x="${n.x}" y="${n.y+r+30}" text-anchor="middle" fill="#666" font-size="9" font-family="JetBrains Mono,monospace">${n.partNo}</text>`;
  }

  container.innerHTML=`<div class="viz-container" id="graphVizC">
    <svg id="graphSvg" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><g id="graphG">${inner}</g></svg>
    <div class="viz-legend" style="position:absolute;bottom:12px;left:12px">
      <div style="font-weight:600;margin-bottom:4px;color:#aaa">Seviye</div>
      ${depthColors.slice(0,4).map((c,i)=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px"><div style="width:8px;height:8px;border-radius:50%;background:${c}"></div><span>${['Sistem','Alt Sistem','Bileşen','Parça'][i]}</span></div>`).join('')}
    </div>
    <div style="position:absolute;bottom:12px;right:12px;display:flex;gap:4px;z-index:10">
      <button class="viz-btn" onclick="graphZoom(1.3)">＋</button>
      <button class="viz-btn" onclick="graphZoom(0.7)">−</button>
      <button class="viz-btn" onclick="graphFit()">Sığdır</button>
    </div>
    <div style="position:absolute;top:12px;left:12px;background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:10px;color:var(--tx3);z-index:10">
      🖱 Scroll: Zoom &nbsp;|&nbsp; Sürükle: Gezin &nbsp;|&nbsp; ${nodes.length} düğüm
    </div>
  </div>`;

  window._graphViz={scale:1,tx:0,ty:0,dragging:false,lastX:0,lastY:0,gW,gH,cX:(minX+maxX)/2,cY:(minY+maxY)/2};
  graphFit();
  _attachGraphEvents(document.getElementById('graphSvg'), false);
}

// ── Large graph: Canvas-based radial clustered view ──
function _renderForceGraphCanvas(container, allNodes, allLinks) {
  // Build cluster nodes: group by depth 0-2, aggregate deeper nodes into their depth-2 ancestor
  const MAX_SHOW_DEPTH = 2;
  const clusterNodes = allNodes.filter(n => n.depth <= MAX_SHOW_DEPTH);
  const clusterLinks = allLinks.filter(l => {
    const sn = allNodes.find(n=>n.id===l.source), tn = allNodes.find(n=>n.id===l.target);
    return sn && tn && sn.depth <= MAX_SHOW_DEPTH && tn.depth <= MAX_SHOW_DEPTH;
  });

  // Count hidden descendants for each cluster node
  const descCount = {};
  clusterNodes.forEach(n => { descCount[n.id] = 0; });
  allNodes.forEach(n => {
    if (n.depth <= MAX_SHOW_DEPTH) return;
    // Find its deepest ancestor within MAX_SHOW_DEPTH
    // We'll do this by walking allLinks upward
    // Quick approach: mark ancestors during walk
  });
  // Better: count via tree walk
  function countHidden(node, depth) {
    if (!node.children) return 0;
    let cnt = 0;
    for (const c of node.children) {
      if (depth + 1 > MAX_SHOW_DEPTH) { cnt++; cnt += countHidden(c, depth+1); }
      else cnt += countHidden(c, depth+1);
    }
    return cnt;
  }
  clusterNodes.forEach(n => { descCount[n.id] = countHidden(n, n.depth); });

  // Radial layout by depth
  const CX = 600, CY = 450;
  const radii = [0, 200, 420];
  const byDepth = [[], [], []];
  clusterNodes.forEach(n => byDepth[Math.min(n.depth, MAX_SHOW_DEPTH)].push(n));

  byDepth[0].forEach(n => { n.cx = CX; n.cy = CY; });
  byDepth[1].forEach((n, i, arr) => {
    const angle = (2 * Math.PI * i / arr.length) - Math.PI/2;
    n.cx = CX + radii[1] * Math.cos(angle);
    n.cy = CY + radii[1] * Math.sin(angle);
  });
  byDepth[2].forEach((n, i, arr) => {
    const angle = (2 * Math.PI * i / arr.length) - Math.PI/2;
    n.cx = CX + radii[2] * Math.cos(angle);
    n.cy = CY + radii[2] * Math.sin(angle);
  });

  // Find bounds
  let minX=CX-500, maxX=CX+500, minY=CY-500, maxY=CY+500;
  clusterNodes.forEach(n=>{if(n.cx-60<minX)minX=n.cx-60;if(n.cx+60>maxX)maxX=n.cx+60;if(n.cy-60<minY)minY=n.cy-60;if(n.cy+60>maxY)maxY=n.cy+60;});
  const gW=maxX-minX+100, gH=maxY-minY+100;

  const hiddenCount = allNodes.length - clusterNodes.length;

  container.innerHTML=`<div class="viz-container" id="graphVizC" style="position:relative">
    <canvas id="graphCanvas" style="width:100%;height:100%;display:block"></canvas>
    <div style="position:absolute;top:12px;left:12px;background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:10px;color:var(--tx3);z-index:10;max-width:260px">
      <div style="margin-bottom:4px">🖱 Scroll: Zoom &nbsp;|&nbsp; Sürükle: Gezin</div>
      <div style="color:var(--warn);margin-bottom:3px">⚡ Büyük BOM: ${allNodes.length} düğüm</div>
      <div style="color:var(--tx4)">İlk ${MAX_SHOW_DEPTH+1} seviye gösteriliyor. Gizlenen: <b style="color:var(--ac2)">${hiddenCount}</b> parça</div>
    </div>
    <div class="viz-legend" style="position:absolute;bottom:12px;left:12px">
      <div style="font-weight:600;margin-bottom:4px;color:#aaa">Seviye</div>
      ${depthColors.slice(0,MAX_SHOW_DEPTH+1).map((c,i)=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px"><div style="width:8px;height:8px;border-radius:50%;background:${c}"></div><span>${['Sistem','Alt Sistem','Bileşen'][i]}</span></div>`).join('')}
      <div style="display:flex;align-items:center;gap:5px;margin-top:4px;padding-top:4px;border-top:1px solid #333"><div style="width:8px;height:8px;border-radius:50%;border:2px dashed #555"></div><span style="color:#555">Gizlenen parçalar</span></div>
    </div>
    <div style="position:absolute;bottom:12px;right:12px;display:flex;gap:4px;z-index:10">
      <button class="viz-btn" onclick="graphZoom(1.3)">＋</button>
      <button class="viz-btn" onclick="graphZoom(0.7)">−</button>
      <button class="viz-btn" onclick="graphFit()">Sığdır</button>
    </div>
  </div>`;

  const canvas = document.getElementById('graphCanvas');
  const vizC = document.getElementById('graphVizC');
  const dpr = window.devicePixelRatio || 1;

  function resizeCanvas() {
    const rect = vizC.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    drawGraph();
  }

  window._graphViz = { scale:1, tx:0, ty:0, dragging:false, lastX:0, lastY:0, gW, gH, cX:(minX+maxX)/2, cY:(minY+maxY)/2 };
  window._graphCanvas = { canvas, clusterNodes, clusterLinks, descCount, dpr };

  function drawGraph() {
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const v = window._graphViz;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.scale(dpr * v.scale, dpr * v.scale);
    ctx.translate(v.tx / v.scale, v.ty / v.scale);

    // Draw edges
    ctx.globalAlpha = 0.35;
    for (const l of clusterLinks) {
      const sn = clusterNodes.find(n=>n.id===l.source), tn = clusterNodes.find(n=>n.id===l.target);
      if (!sn || !tn) continue;
      ctx.beginPath();
      ctx.moveTo(sn.cx, sn.cy);
      ctx.lineTo(tn.cx, tn.cy);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Draw nodes
    for (const n of clusterNodes) {
      const r = n.depth===0 ? 36 : n.depth===1 ? 24 : 18;
      const col = depthColors[n.depth % depthColors.length];
      const dc = descCount[n.id] || 0;

      // Glow for root
      if (n.depth === 0) {
        ctx.beginPath(); ctx.arc(n.cx, n.cy, r+10, 0, 2*Math.PI);
        ctx.fillStyle = col+'30'; ctx.fill();
      }

      // Circle
      ctx.beginPath(); ctx.arc(n.cx, n.cy, r, 0, 2*Math.PI);
      ctx.fillStyle = col + 'dd'; ctx.fill();
      ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();

      // Descendant badge (dashed ring + count)
      if (dc > 0) {
        ctx.beginPath(); ctx.arc(n.cx, n.cy, r+8, 0, 2*Math.PI);
        ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
        ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
        // Badge
        const bx=n.cx+r*0.7, by=n.cy-r*0.7;
        ctx.beginPath(); ctx.arc(bx, by, 12, 0, 2*Math.PI);
        ctx.fillStyle = '#1e1e2e'; ctx.fill();
        ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.fillStyle = '#a5b4fc'; ctx.font = '600 9px JetBrains Mono, monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const badge = dc>999?Math.round(dc/1000)+'k':String(dc);
        ctx.fillText(badge, bx, by);
      }

      // Label
      const label = n.name.length>22 ? n.name.slice(0,21)+'…' : n.name;
      ctx.fillStyle = '#ccc'; ctx.font = `${n.depth===0?'700 13':'500 10'}px IBM Plex Sans, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(label, n.cx, n.cy + r + 6);
      if (n.partNo) {
        ctx.fillStyle = '#666'; ctx.font = '9px JetBrains Mono, monospace';
        ctx.fillText(n.partNo, n.cx, n.cy + r + 20);
      }
    }
    ctx.restore();
  }

  window._graphDraw = drawGraph;
  requestAnimationFrame(resizeCanvas);

  // Zoom/pan events on canvas
  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 0.88;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left), my = (e.clientY - rect.top);
    const v = window._graphViz;
    const ns = Math.max(0.05, Math.min(8, v.scale * factor));
    v.tx = mx - (mx - v.tx) * (ns / v.scale);
    v.ty = my - (my - v.ty) * (ns / v.scale);
    v.scale = ns;
    drawGraph();
  }, { passive: false });

  canvas.addEventListener('mousedown', function(e) {
    if(e.button!==0) return;
    const v=window._graphViz; v.dragging=true; v.lastX=e.clientX; v.lastY=e.clientY;
    canvas.style.cursor='grabbing';
  });
  window.addEventListener('mousemove', function(e) {
    const v=window._graphViz; if(!v||!v.dragging) return;
    v.tx+=e.clientX-v.lastX; v.ty+=e.clientY-v.lastY;
    v.lastX=e.clientX; v.lastY=e.clientY;
    if(window._graphDraw) window._graphDraw();
  });
  window.addEventListener('mouseup', function() {
    const v=window._graphViz; if(v) v.dragging=false;
    const c=document.getElementById('graphCanvas'); if(c) c.style.cursor='grab';
  });
  canvas.style.cursor='grab';

  _setupGraphFitForCanvas(gW, gH, (minX+maxX)/2, (minY+maxY)/2);
}

function _setupGraphFitForCanvas(gW, gH, cX, cY) {
  window._graphViz.gW = gW; window._graphViz.gH = gH;
  window._graphViz.cX = cX; window._graphViz.cY = cY;
  graphFit();
}

function _attachGraphEvents(svg, isSvg) {
  if (!svg) return;
  svg.addEventListener('wheel', function(e) {
    e.preventDefault();
    const factor=e.deltaY<0?1.12:0.88, rect=svg.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top, v=window._graphViz;
    const ns=Math.max(0.05,Math.min(8,v.scale*factor));
    v.tx=mx-(mx-v.tx)*(ns/v.scale); v.ty=my-(my-v.ty)*(ns/v.scale); v.scale=ns;
    applyGraphTransform();
  }, {passive:false});
  svg.addEventListener('mousedown', function(e) {
    if(e.button!==0) return;
    const v=window._graphViz; v.dragging=true; v.lastX=e.clientX; v.lastY=e.clientY;
    svg.style.cursor='grabbing';
  });
  window.addEventListener('mousemove', function(e) {
    const v=window._graphViz; if(!v||!v.dragging) return;
    v.tx+=e.clientX-v.lastX; v.ty+=e.clientY-v.lastY; v.lastX=e.clientX; v.lastY=e.clientY;
    applyGraphTransform();
  });
  window.addEventListener('mouseup', function() {
    const v=window._graphViz; if(v) v.dragging=false;
    const s=document.getElementById('graphSvg'); if(s) s.style.cursor='grab';
  });
  svg.style.cursor='grab';
}

function applyGraphTransform() {
  const g = document.getElementById('graphG'); if (!g) return;
  const v = window._graphViz;
  g.setAttribute('transform', `translate(${v.tx},${v.ty}) scale(${v.scale})`);
}

function graphZoom(factor) {
  const v = window._graphViz; if (!v) return;
  const canvas = document.getElementById('graphCanvas');
  const svg = document.getElementById('graphSvg');
  const el = canvas || svg; if (!el) return;
  const rect = el.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const ns = Math.max(0.05, Math.min(8, v.scale * factor));
  v.tx = cx - (cx - v.tx) * (ns / v.scale); v.ty = cy - (cy - v.ty) * (ns / v.scale); v.scale = ns;
  if (canvas && window._graphDraw) window._graphDraw();
  else applyGraphTransform();
}

function graphFit() {
  const v = window._graphViz; if (!v) return;
  const canvas = document.getElementById('graphCanvas');
  const svg = document.getElementById('graphSvg');
  const el = canvas || svg; if (!el) return;
  const rect = el.getBoundingClientRect();
  const sx = rect.width / (v.gW + 80), sy = rect.height / (v.gH + 80);
  v.scale = Math.min(sx, sy, 1.5);
  v.tx = rect.width / 2 - v.cX * v.scale;
  v.ty = rect.height / 2 - v.cY * v.scale;
  if (canvas && window._graphDraw) window._graphDraw();
  else applyGraphTransform();
}

// Duplicate a node (with all children, new IDs)
async function duplicateNode(id){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  const n=find(sys.children,id);if(!n)return;
  function deepCopy(node){
    const copy={...node,id:gid(),name:node.name+' (Kopya)',children:[]};
    if(node.children?.length)copy.children=node.children.map(deepCopy);
    return copy;
  }
  const copy=deepCopy(n);
  // Insert after original in parent
  const insertAfter=(nodes)=>{for(let i=0;i<nodes.length;i++){if(nodes[i].id===id){nodes.splice(i+1,0,copy);return true}if(nodes[i].children?.length&&insertAfter(nodes[i].children))return true}return false};
  insertAfter(sys.children);
  addRev("Kopyalandı",`${n.name}`);
  await persist();renderMain();toast(`"${n.name}" kopyalandı`);
}

// ═══════ INDENT / OUTDENT ═══════
// → : bir önceki kardeşin altına taşı (derinleştir)
async function indentNode(id){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  // Find node and its parent list
  function findInTree(nodes, targetId){
    for(let i=0;i<nodes.length;i++){
      if(nodes[i].id===targetId) return {nodes, i, node:nodes[i]};
      if(nodes[i].children?.length){const r=findInTree(nodes[i].children,targetId);if(r)return r;}
    }
    return null;
  }
  const r=findInTree(sys.children,id);if(!r)return;
  const {nodes, i, node}=r;
  if(i===0){toast("Bir üstünde kardeş yok — indentlenemez","info");return}
  const prevSib=nodes[i-1];
  // Remove from current position
  nodes.splice(i,1);
  // Add as last child of previous sibling
  if(!prevSib.children)prevSib.children=[];
  prevSib.children.push(node);
  S.expanded[prevSib.id]=true;
  addRev("Düzey arttı",`${node.name} → ${prevSib.name} altına`);
  await persist();renderMain();toast(`"${node.name}" → "${prevSib.name}" altına taşındı`);
}

// ← : parent'ının kardeşi yap (sığlaştır)
async function outdentNode(id){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  // Find node, its parent, grandparent
  function findWithParent(nodes, targetId, parentNode=null, parentList=null){
    for(let i=0;i<nodes.length;i++){
      if(nodes[i].id===targetId) return {node:nodes[i], idx:i, parentNode, parentList:nodes, grandList:parentList};
      if(nodes[i].children?.length){
        const r=findWithParent(nodes[i].children, targetId, nodes[i], nodes);
        if(r)return r;
      }
    }
    return null;
  }
  const r=findWithParent(sys.children, id);if(!r)return;
  const {node, idx, parentNode, parentList, grandList}=r;
  if(!parentNode){toast("Zaten en üst seviyede","info");return}
  // Find parent's position in grandList
  const pIdx=grandList.findIndex(n=>n.id===parentNode.id);
  // Remove from parent's children
  parentList.splice(idx,1);
  // Insert after parent in grandList
  grandList.splice(pIdx+1,0,node);
  addRev("Düzey azaldı",`${node.name} ← ${parentNode.name} üstüne`);
  await persist();renderMain();toast(`"${node.name}" bir üst seviyeye çıkarıldı`);
}

function toggleLibrary(){

  if(S.showLibrary){panel.classList.remove('hidden');btn.style.background='var(--ac)';btn.style.color='#fff';}
  else{panel.classList.add('hidden');btn.style.background='';btn.style.color='';}
  renderLibrary();

function renderLibrary(){
  const countEl=document.getElementById('libCount');
  if(countEl)countEl.textContent=S.library.length?S.library.length+' parça':'';
  const list=document.getElementById('libList');if(!list)return;
  const q=(document.getElementById('libSearch')?.value||'').toLowerCase();

  // Kütüphane parçaları
  const libItems=S.library.filter(l=>!q||l.name.toLowerCase().includes(q)||(l.partNo||'').toLowerCase().includes(q));

  // BOM'lardaki parçalar (arama varsa göster, kütüphanede olmayanlar)
  let bomHits=[];
  if(q.length>=2){
    const libSet=new Set(S.library.map(l=>l.name+'||'+(l.partNo||'')));
    function walkBOM(nodes,sysName){
      for(const n of nodes||[]){
        if((n.name||'').toLowerCase().includes(q)||(n.partNo||'').toLowerCase().includes(q)){
          const key=n.name+'||'+(n.partNo||'');
          if(!libSet.has(key)&&!bomHits.find(h=>h.key===key)){
            bomHits.push({id:n.id,key,name:n.name,partNo:n.partNo||'',qty:n.qty||1,sysName});
          }
        }
        if(n.children?.length)walkBOM(n.children,sysName);
      }
    }
    for(const s of S.systems)walkBOM(s.children,s.name);
  }

  if(!libItems.length&&!bomHits.length){
    list.innerHTML=`<div style="text-align:center;padding:20px 8px;color:var(--tx4);font-size:10px">${q?'Sonuç yok':S.library.length?'Sonuç yok':'Kütüphane boş.<br>BOM ağacından sürükle<br>veya + ile ekle.'}</div>`;
    return;
  }

  let html='';
  if(libItems.length){
    if(q)html+=`<div style="font-size:9px;color:var(--tx3);padding:4px 6px 2px;text-transform:uppercase;letter-spacing:1px">Kütüphane</div>`;
    html+=libItems.map(l=>`
      <div class="lib-item" draggable="true" id="lib-${l.id}"
        ondragstart="libItemDragStart(event,'lib:${l.id}')"
        ondragend="libItemDragEnd(event)"
        oncontextmenu="showLibCtxMenu(event,'${l.id}')">
        <div class="lib-item-icon">⚙️</div>
        <div class="lib-item-info">
          <div class="lib-item-name" title="${l.name}">${l.name}</div>
          <div class="lib-item-pn">${l.partNo||'—'}&nbsp;×${l.qty||1}</div>
        </div>
        <span class="lib-item-del" onclick="removeFromLibrary('${l.id}')" title="Kütüphaneden çıkar">✕</span>
      </div>`).join('');
  }
  if(bomHits.length){
    html+=`<div style="font-size:9px;color:var(--tx3);padding:6px 6px 2px;text-transform:uppercase;letter-spacing:1px;border-top:1px solid var(--brd);margin-top:4px">BOM'dan — sürükle veya + ekle</div>`;
    html+=bomHits.map(h=>`
      <div class="lib-item" draggable="true" id="lib-bom-${h.id}" style="border-color:rgba(99,102,241,.25)"
        ondragstart="libItemDragStart(event,'bom:${h.id}')"
        ondragend="libItemDragEnd(event)">
        <div class="lib-item-icon" style="background:rgba(99,102,241,.12);color:var(--ac2)">📦</div>
        <div class="lib-item-info">
          <div class="lib-item-name" title="${h.name}">${h.name}</div>
          <div class="lib-item-pn">${h.partNo||'—'}&nbsp;×${h.qty||1}<span style="color:var(--tx4);margin-left:4px">${h.sysName}</span></div>
        </div>
        <span class="lib-item-del" onclick="addBomHitToLibrary('${h.id}')" title="Kütüphaneye ekle" style="color:var(--ac2)">＋</span>
      </div>`).join('');
  }
  list.innerHTML=html;
  // Store bomHits for drag resolution
  window._libBomHits=bomHits;
}

// Add BOM search hit to library
function addBomHitToLibrary(nodeId){
  let fullNode=null;
  for(const s of S.systems){fullNode=find(s.children,nodeId);if(fullNode)break;}
  if(!fullNode)return;
  const exists=S.library.find(l=>l.name===fullNode.name&&l.partNo===(fullNode.partNo||''));
  if(exists){toast(`"${fullNode.name}" zaten kütüphanede`,"info");return}
  addPartToLibrary(fullNode);
}

async function libZoneDrop(e){
  e.preventDefault();
  document.getElementById('libDropZone')?.classList.remove('over');
  const data=e.dataTransfer.getData('text/plain')||'';
  // Only accept tree nodes (not lib items)
  if(data.startsWith('lib:')||data.startsWith('bom:')){toast("Zaten kütüphanede veya BOM'dan","info");return}
  const nodeId=data.startsWith('tree:')?data.slice(5):S.dragId;
  S.dragId=null;
  if(!nodeId)return;
  for(const s of S.systems){const f=find(s.children,nodeId);if(f){addPartToLibrary(f);return}}
}

function _deepCopyNode(n){
  return {id:gid(),name:n.name,partNo:n.partNo||'',qty:n.qty||1,_extra:n._extra?{...n._extra}:{},children:(n.children||[]).map(_deepCopyNode)};
}
function _expandAll(n){
  if(n.children&&n.children.length){S.expanded[n.id]=true;n.children.forEach(_expandAll);}
}
// library item children yoksa BOM sistemlerinden eşleşen node'u bul
function _findNodeByNamePn(nodes,name,pn){
  for(const n of nodes||[]){
    if(n.name===name&&(n.partNo||'')===(pn||''))return n;
    const f=_findNodeByNamePn(n.children,name,pn);if(f)return f;
  }
  return null;
}
function _libItemToNode(libItem){
  // Her zaman BOM sistemlerinden gerçek node'u bul (_extra ve _extraCols için)
  let realNode=null, realSys=null;
  for(const sys of S.systems){
    const f=_findNodeByNamePn(sys.children,libItem.name,libItem.partNo||'');
    if(f){realNode=f;realSys=sys;break;}
  }
  if(realNode){
    // Kütüphaneyi zenginleştir
    if(!libItem.children||!libItem.children.length)
      libItem.children=(realNode.children||[]).map(_deepCopyNode);
    libItem._extra={...realNode._extra};
    if(realSys?._extraCols?.length)libItem._extraCols=realSys._extraCols;
    persist();
    return _deepCopyNode(realNode);
  }
  // BOM'da bulunamadı — mevcut kütüphane verisinden kopyala
  return _deepCopyNode(libItem);
}
function addPartToLibrary(n){
  const hasChildren=n.children&&n.children.length>0;
  const exists=S.library.find(l=>l.name===n.name&&l.partNo===(n.partNo||''));
  // Hangi sistemden geldiğini bul → _extraCols bilgisini al
  let srcSysExtraCols=[];
  for(const sys of S.systems){if(find(sys.children,n.id)){srcSysExtraCols=sys._extraCols||[];break;}}
  if(exists){
    // Güncelle: children, _extra ve _extraCols üzerine yaz
    exists.children=hasChildren?(n.children||[]).map(_deepCopyNode):exists.children||[];
    if(n._extra)exists._extra={...n._extra};
    if(srcSysExtraCols.length)exists._extraCols=srcSysExtraCols;
    persist();renderLibrary();toast(`"${n.name}" kütüphanede güncellendi${hasChildren?' ('+n.children.length+' alt parça)':''}`);
    return;
  }
  S.library.push({id:gid(),name:n.name,partNo:n.partNo||'',qty:n.qty||1,note:'',_extra:n._extra||{},_extraCols:srcSysExtraCols,children:hasChildren?(n.children||[]).map(_deepCopyNode):[]});
  persist();renderLibrary();toast(`"${n.name}" kütüphaneye eklendi${hasChildren?' ('+n.children.length+' alt parça ile)':''}`);
}

function addNodeToLibrary(nodeId){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  const n=find(sys.children,nodeId);if(!n)return;
  addPartToLibrary(n);
}

async function collectFromAllBOMs(){
  let added=0;
  function walkAll(nodes){
    for(const n of nodes||[]){
      const exists=S.library.find(l=>l.name===n.name&&l.partNo===(n.partNo||''));
      if(!exists&&n.name){
        S.library.push({id:gid(),name:n.name,partNo:n.partNo||'',qty:n.qty||1,note:''});
        added++;
      }
      if(n.children?.length)walkAll(n.children);
    }
  }
  for(const s of S.systems)walkAll(s.children);
  await persist();renderLibrary();
  toast(added?`${added} yeni parça kütüphaneye eklendi`:"Yeni parça bulunamadı (hepsi zaten var)","info");
}

// ── AUX DATA IMPORT (Yardımcı Veri — stok no eşleştirmeli) ──
async function importAuxData(){
  const sys=S.systems.find(s=>s.id===S.selSys);
  if(!sys){toast("Önce bir sistem seçin","error");return;}
  const result=await window.api.importExcel();
  if(!result)return;
  if(result.error){toast("Excel hatası: "+result.error,"error");return;}
  const sheet=result.sheets[0];
  if(!sheet||!sheet.data?.length){toast("Boş Excel","error");return;}
  const headers=sheet.data[0];
  const rows=sheet.data.slice(1).filter(r=>r.some(c=>c!==''&&c!==null&&c!==undefined));
  // Eşleştirme sütununu otomatik bul (Malzeme, stok no, part no vb.)
  const hl=headers.map(h=>(h||'').toString().toLowerCase());
  const autoKeyIdx=hl.findIndex(h=>h==='malzeme'||(h.startsWith('malzeme')&&!h.includes('kısa')&&!h.includes('metin')&&!h.includes('stok')&&!h.includes('aile')));
  const keyIdx=autoKeyIdx>=0?autoKeyIdx:hl.findIndex(h=>h.includes('stok')||h.includes('parça no')||h.includes('part'));
  const finalKey=keyIdx>=0?keyIdx:0;
  const colOpts=headers.map((h,i)=>`<option value="${i}"${i===finalKey?' selected':''}>${h||'Col '+i}</option>`).join('');
  const checkboxHtml=headers.map((h,i)=>i===finalKey?'':
    `<label style="display:flex;align-items:center;gap:6px;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;color:var(--tx2);transition:background .1s" onmouseover="this.style.background='var(--sf2)'" onmouseout="this.style.background=''">
      <input type="checkbox" class="aux-col-chk" value="${i}" checked style="accent-color:var(--ac);cursor:pointer">
      ${h||'Col '+i}
    </label>`
  ).filter(Boolean).join('');
  document.getElementById("modalC").innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" style="width:500px" onclick="event.stopPropagation()">
    <div class="modal-title">📊 Yardımcı Veri Yükle</div>
    <div class="modal-desc">${rows.length} satır — <b>${sys.name}</b> sistemine parça numarası üzerinden eşleştirilecek</div>
    <div class="field" style="margin-top:14px">
      <label class="field-label">Eşleştirme Sütunu (Stok / Parça No)</label>
      <select class="field-input" id="aux-key-col" onchange="document.querySelector('.aux-col-chk[value='+this.value+']')&&(document.querySelector('.aux-col-chk[value='+this.value+']').closest('label').style.display='none')">${colOpts}</select>
    </div>
    <div class="field" style="margin-top:8px">
      <label class="field-label" style="display:flex;justify-content:space-between"><span>İçe Alınacak Sütunlar</span>
        <span style="font-weight:400;cursor:pointer;color:var(--ac2)" onclick="document.querySelectorAll('.aux-col-chk').forEach(c=>c.checked=true)">Tümünü Seç</span></label>
      <div style="background:var(--sf);border:1px solid var(--brd);border-radius:var(--rs);padding:6px;max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:1px">
        ${checkboxHtml}
      </div>
    </div>
    <div class="modal-btns"><button class="modal-btn" onclick="closeModal()">İptal</button><button class="modal-btn primary" onclick="processAuxData()">Yükle</button></div>
  </div></div>`;
  window._auxData={headers,rows};
  window._auxSysId=sys.id;
}

async function processAuxData(){
  const sys=S.systems.find(s=>s.id===window._auxSysId);
  if(!sys||!window._auxData){toast("Veri bulunamadı","error");return;}
  const {headers,rows}=window._auxData;
  const keyColIdx=parseInt(document.getElementById('aux-key-col').value);
  const checkedCols=Array.from(document.querySelectorAll('.aux-col-chk:checked')).map(c=>parseInt(c.value));
  if(!checkedCols.length){toast("En az bir sütun seçin","error");return;}
  const colNames=checkedCols.map(i=>(headers[i]||'Col'+i).toString());
  // Harita: stok no → satır
  const auxMap={};
  for(const row of rows){
    const key=String(row[keyColIdx]??'').trim();
    if(key) auxMap[key]=row;
  }
  // Tüm node'ları gez, partNo üzerinden eşleştir
  let matched=0,total=0;
  function walk(nodes){
    for(const node of nodes){
      total++;
      const pn=String(node.partNo||'').trim();
      if(pn&&auxMap[pn]){
        if(!node._extra)node._extra={};
        const row=auxMap[pn];
        checkedCols.forEach((ci,ii)=>{node._extra[colNames[ii]]=String(row[ci]??'');});
        matched++;
      }
      if(node.children?.length)walk(node.children);
    }
  }
  walk(sys.children);
  // _extraCols güncelle
  if(!sys._extraCols)sys._extraCols=[];
  for(const col of colNames){if(!sys._extraCols.includes(col))sys._extraCols.push(col);}
  await persist();closeModal();renderTab();
  toast(`${matched}/${total} parça eşleşti — ${colNames.length} sütun eklendi`);
}

async function processExcel(){
  const data=window._xlData;if(!data)return;
  const get=id=>{const v=parseInt(document.getElementById(id)?.value);return v>=0?v:-1};
  const nameCol=get('xl-name'),pnCol=get('xl-pn'),qtyCol=get('xl-qty'),parentCol=get('xl-parent'),levelCol=get('xl-level'),idCol=get('xl-id');

  if(nameCol<0){toast("Parça Adı sütunu gerekli","error");return}

  const headers=data[0]||[];
  const mappedCols=new Set([nameCol,pnCol,qtyCol,parentCol,levelCol,idCol].filter(c=>c>=0));
  // Extra (unmapped) columns
  const extraColIdxs=headers.map((_,i)=>i).filter(i=>!mappedCols.has(i));
  const extraColNames=extraColIdxs.map(i=>(headers[i]||'Col'+i).toString());

  const rows=data.slice(1).filter(r=>r[nameCol]);
  const sysId=gid();
  const sysName=window._xlFileName||("Excel Import — "+new Date().toLocaleDateString("tr-TR"));

  function makeExtra(r){
    const ex={};
    extraColIdxs.forEach((ci,ii)=>{ex[extraColNames[ii]]=String(r[ci]??'')});
    return ex;
  }

  let children=[];

  if(parentCol>=0 && idCol>=0){
    const nodeMap={};
    for(const r of rows){
      const id=String(r[idCol]||gid());
      nodeMap[id]={id:'xl-'+id,name:String(r[nameCol]),partNo:pnCol>=0?String(r[pnCol]||''):'',qty:qtyCol>=0?parseInt(r[qtyCol])||1:1,_extra:makeExtra(r),children:[]};
    }
    for(const r of rows){
      const id=String(r[idCol]);
      const pid=String(r[parentCol]||'');
      if(pid&&nodeMap[pid]){nodeMap[pid].children.push(nodeMap[id])}
      else{children.push(nodeMap[id])}
    }
  } else if(levelCol>=0){
    const stack=[{children}];
    for(const r of rows){
      const level=parseInt(r[levelCol])||0;
      const node={id:'xl-'+gid(),name:String(r[nameCol]),partNo:pnCol>=0?String(r[pnCol]||''):'',qty:qtyCol>=0?parseInt(r[qtyCol])||1:1,_extra:makeExtra(r),children:[]};
      while(stack.length>level+1)stack.pop();
      if(stack.length<=level)stack.push(stack[stack.length-1].children[stack[stack.length-1].children.length-1]||{children});
      const parent=stack[stack.length-1];
      (parent.children||children).push(node);
      stack.push(node);
    }
  } else {
    for(const r of rows){
      children.push({id:'xl-'+gid(),name:String(r[nameCol]),partNo:pnCol>=0?String(r[pnCol]||''):'',qty:qtyCol>=0?parseInt(r[qtyCol])||1:1,_extra:makeExtra(r),children:[]});
    }
  }

  S.systems.push({id:sysId,name:sysName,type:"Import",status:"Aktif",icon:"📦",revision:"Rev-A",_extraCols:extraColNames,children});
  addRev("Excel içe aktarıldı",`${rows.length} satır → ${sysName}`);
  await persist();closeModal();selSys(sysId);renderSidebar();toast(`${rows.length} parça yüklendi`);
}

function csvR(f){return f.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(",")}

function parseCSV(t){const lines=[];let cur=[],f="",q=false;for(let i=0;i<t.length;i++){const c=t[i];if(q){if(c==='"'&&t[i+1]==='"'){f+='"';i++}else if(c==='"')q=false;else f+=c}else{if(c==='"')q=true;else if(c===','){cur.push(f);f=""}else if(c==='\n'||(c==='\r'&&t[i+1]==='\n')){cur.push(f);f="";lines.push(cur);cur=[];if(c==='\r')i++}else f+=c}}if(f||cur.length){cur.push(f);lines.push(cur)}return lines}

async function _doExportSysExcel(sys){
  const extraCols=sys._extraCols||[];
  const header=["Level","Parça Adı","Parça No","Adet","Parent",...extraCols];
  const rows=[header];
  const w=(ns,d,pn)=>{
    for(const n of ns){
      const base=[d,n.name,n.partNo||"",n.qty||1,pn];
      const extras=extraCols.map(c=>(n._extra&&n._extra[c]!=null)?n._extra[c]:'');
      rows.push([...base,...extras]);
      if(n.children?.length)w(n.children,d+1,n.name);
    }
  };
  w(sys.children,0,sys.name);
  const p=await window.api.exportExcel({sheetData:rows,fileName:`${sys.name}-BOM.xlsx`});
  if(p){addRev("Excel export",p.split(/[/\\]/).pop());await persist();toast("Excel kaydedildi")}
}

function orgCollapseSubtree(nid){
  if(!S.orgExpanded)S.orgExpanded=new Set();
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;

  // Collect this node and all expanded descendants to remove from orgExpanded
  const toRemove=new Set([nid]);
  function collectExpanded(n){
    if(!n)return;
    if(S.orgExpanded.has(n.id))toRemove.add(n.id);
    for(const c of n.children||[])collectExpanded(c);
  }
  const targetNode=find(sys.children,nid);
  if(targetNode){for(const c of targetNode.children||[])collectExpanded(c);}
  toRemove.forEach(id=>S.orgExpanded.delete(id));

  // Depth'i hesapla: node'un ağaçtaki derinliği → orgMaxDepth'i buna ayarla
  function findDepth(nodes,id,d){
    for(const n of nodes||[]){
      if(n.id===id)return d;
      const found=findDepth(n.children,id,d+1);
      if(found>=0)return found;
    }
    return -1;
  }
  const depth=findDepth(sys.children,nid,1);
  if(depth>=0) S.orgMaxDepth=depth; // bu node'dan itibaren gösterme

  S.orgFocusNid=S._orgParentOf?S._orgParentOf[nid]:null;
  renderTab();
}

// ═══════ BOM COMPARE ═══════
function renderCompare(container){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  const others=S.systems.filter(s=>s.id!==S.selSys);
  if(!others.length){container.innerHTML='<div class="empty-state"><div class="empty-icon">🔀</div><div class="empty-title">Karşılaştırma yapılamıyor</div><div class="empty-desc">En az 2 sistem gerekli.</div></div>';return}
  const selId=S.compareTarget||others[0].id;
  S.compareTarget=selId;
  const target=S.systems.find(s=>s.id===selId);if(!target)return;

  const flatA=flattenBOM(sys.children,'');
  const flatB=flattenBOM(target.children,'');

  // Ad + seviye bazında map — her (ad, derinlik) kombinasyonu ayrı satır
  const mapA=new Map(), mapB=new Map();
  flatA.forEach(n=>{
    const k=n.name.toLowerCase().trim()+'::'+n._depth;
    if(mapA.has(k)){const x=mapA.get(k);x.qty+=n.qty||1}
    else mapA.set(k,{...n,qty:n.qty||1});
  });
  flatB.forEach(n=>{
    const k=n.name.toLowerCase().trim()+'::'+n._depth;
    if(mapB.has(k)){const x=mapB.get(k);x.qty+=n.qty||1}
    else mapB.set(k,{...n,qty:n.qty||1});
  });

  // Kategorize et — seviyeye göre sırala
  const matched=[],qtyDiff=[],onlyA=[],onlyB=[];
  for(const[k,a]of mapA){
    if(!mapB.has(k)){onlyA.push(a)}
    else{
      const b=mapB.get(k);
      if(a.qty===b.qty){matched.push({a,b})}
      else{qtyDiff.push({a,b})}
    }
  }
  for(const[k,b]of mapB){if(!mapA.has(k)){onlyB.push(b)}}

  matched.sort((x,y)=>x.a._depth-y.a._depth);
  qtyDiff.sort((x,y)=>x.a._depth-y.a._depth);
  onlyA.sort((x,y)=>x._depth-y._depth);
  onlyB.sort((x,y)=>x._depth-y._depth);

  const totalA=mapA.size, totalB=mapB.size;
  const matchPct=Math.round(matched.length/Math.max(totalA,1)*100);
  const qtyPct=Math.round(qtyDiff.length/Math.max(totalA,1)*100);

  const opts=others.map(s=>`<option value="${s.id}" ${s.id===selId?'selected':''}>${s.icon} ${s.name}</option>`).join('');

  const rowA=(items,cls,badge,showQty)=>items.map(({a,b})=>{
    const n=a;
    return `<div class="cmp-row ${cls}" style="padding-left:${8+n._depth*12}px">
      <span class="cmp-badge ${badge}">${badge==='ok'?'✓':badge==='qty'?'≠':badge==='rem'?'−':'+'}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${n.name}">${n.name}</span>
      <span class="cmp-pn">${n.partNo||''} ${showQty?'×'+n.qty:''}</span>
    </div>`;
  }).join('');

  const rowB=(items,cls,badge)=>items.map(n=>`<div class="cmp-row ${cls}" style="padding-left:${8+n._depth*12}px">
    <span class="cmp-badge ${badge}">${badge==='ok'?'✓':badge==='qty'?'≠':badge==='add'?'+':'−'}</span>
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${n.name}">${n.name}</span>
    <span class="cmp-pn">${n.partNo||''} ×${n.qty}</span>
  </div>`).join('');

  const rowQtyB=qtyDiff.map(({a,b})=>`<div class="cmp-row qty-diff" style="padding-left:${8+b._depth*12}px">
    <span class="cmp-badge qty">≠</span>
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${b.name}">${b.name}</span>
    <span class="cmp-pn" style="color:var(--warn)">×${b.qty} <span style="color:var(--tx4)">(A:×${a.qty})</span></span>
  </div>`).join('');

  container.innerHTML=`
    <div style="display:flex;flex-direction:column;height:100%">

      <span style="font-weight:600">Karşılaştır:</span>
