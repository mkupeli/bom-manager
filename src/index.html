      <div class="cmp-stat"><div class="cmp-dot" style="background:var(--warn)"></div><span style="color:var(--warn)">${qtyDiff.length} adet farklı (${qtyPct}%)</span></div>
      <div class="cmp-stat"><div class="cmp-dot" style="background:var(--err)"></div><span style="color:var(--err)">${onlyA.length} yalnızca A'da</span></div>
      <div class="cmp-stat"><div class="cmp-dot" style="background:#818cf8"></div><span style="color:#a5b4fc">${onlyB.length} yalnızca B'de</span></div>
    </div>

    <!-- İstatistik kartları -->
    ${(()=>{

          ${countA===0?'<div style="padding:20px;text-align:center;color:var(--tx3);font-size:11px">Bu kategoride kayıt yok</div>':''}
        </div>
        <div class="cmp-side" style="border-right:none">
          <div class="cmp-side-hdr">${target.icon} ${target.name} <span style="color:var(--tx3);font-size:9px">(${countB} parça gösteriliyor)</span></div>
          ${showMatch?matched.map(({b})=>`<div class="cmp-row match" style="padding-left:${8+b._depth*12}px"><span class="cmp-badge ok" style="background:rgba(16,185,129,.15);color:var(--ok)">✓</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.name}</span><span class="cmp-pn">×${b.qty}</span></div>`).join(''):''}
          ${showQty?qtyDiff.map(({b,a})=>`<div class="cmp-row qty-diff" style="padding-left:${8+b._depth*12}px"><span class="cmp-badge qty" style="background:rgba(245,158,11,.15);color:var(--warn)">≠</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.name}</span><span class="cmp-pn" style="color:var(--warn)">×${b.qty} <span style="color:var(--tx4);font-size:8px">(A:×${a.qty})</span></span></div>`).join(''):''}
          ${showOnlyB?onlyB.map(n=>`<div class="cmp-row added" style="padding-left:${8+n._depth*12}px"><span class="cmp-badge add" style="background:rgba(99,102,241,.15);color:#a5b4fc">+</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.name}</span><span class="cmp-pn">×${n.qty}</span></div>`).join(''):''}
          ${countB===0?'<div style="padding:20px;text-align:center;color:var(--tx3);font-size:11px">Bu kategoride kayıt yok</div>':''}
        </div>
      </div>`;
    })()}
    </div>`;
}
function flattenBOM(nodes,parentPath,depth=0){
  const result=[];
  for(const n of(nodes||[])){
    const path=parentPath?parentPath+'/'+n.name:n.name;
    result.push({id:n.id,name:n.name,partNo:n.partNo||'',qty:n.qty||1,_path:path,_depth:depth});
    if(n.children?.length)result.push(...flattenBOM(n.children,path,depth+1));
  }
  return result;
}
function bomKey(n){return (n.partNo||'')+':'+(n.name||'').toLowerCase()}

// ═══════ SUNBURST (Zoomable Drill-Down) ═══════
// Her seferinde sadece 2 seviye: merkez (odak) + çocukları.
// Tıklayınca o dala iner, merkeze tıklayınca çıkar. Breadcrumb navigasyon.

S.sbFocus = null; // null = root
S.sbPath = [];    // breadcrumb stack [{node, name}]

function _sbCountLeaves(node) {
  if (!node.children?.length) return Math.max(node.qty || 1, 1);
  return node.children.reduce((s, c) => s + _sbCountLeaves(c), 0);
}

function sbDrillDown(idx) {
  const sys = S.systems.find(s => s.id === S.selSys); if (!sys) return;
  const focusChildren = S.sbFocus ? S.sbFocus.children : sys.children;
  const child = focusChildren[idx];
  if (!child || !child.children?.length) return; // leaf node, no drill
  S.sbPath.push({ node: S.sbFocus, name: S.sbFocus ? S.sbFocus.name : sys.name });
  S.sbFocus = child;
  renderTab();
}

function sbDrillUp() {
  if (!S.sbPath.length) return;
  const prev = S.sbPath.pop();
  S.sbFocus = prev.node;
  renderTab();
}

function sbGoTo(idx) {
  // Jump to a breadcrumb level
  S.sbPath = S.sbPath.slice(0, idx);
  S.sbFocus = idx === 0 ? null : S.sbPath[idx-1]?.node || null;
  // Re-set focus to the node at position idx
  if (idx > 0 && S.sbPath.length > 0) {
    S.sbFocus = S.sbPath[S.sbPath.length - 1].node;
    S.sbPath = S.sbPath.slice(0, -1);
  } else {
    S.sbFocus = null; S.sbPath = [];
  }
  renderTab();
}

function renderSunburst(container) {
  const sys = S.systems.find(s => s.id === S.selSys); if (!sys) return;
  if (!S.sbPath) { S.sbPath = []; S.sbFocus = null; }

  const W = container.clientWidth || 800, H = container.clientHeight || 600;
  const cx = W / 2, cy = (H - 40) / 2 + 40; // leave room for breadcrumb at top
  const outerR = Math.min(W, H - 60) / 2 - 30;
  const innerR = outerR * 0.28; // center circle radius

  const focusNode = S.sbFocus;
  const focusChildren = focusNode ? (focusNode.children || []) : sys.children;
  const focusName = focusNode ? focusNode.name : sys.name;
  const focusPartNo = focusNode ? (focusNode.partNo || '') : '';
  const totalLeaves = focusChildren.reduce((s, c) => s + _sbCountLeaves(c), 0) || 1;
  const hasParent = S.sbPath.length > 0;

  const palette = ['#6366f1','#10b981','#f59e0b','#ec4899','#3b82f6','#8b5cf6','#14b8a6','#f97316','#06b6d4','#84cc16'];

  // Build arc slices
  function arcPath(r0, r1, a0, a1, cx, cy) {
    if (a1 - a0 >= 2 * Math.PI - 0.001) return `M${cx},${cy-r1}A${r1},${r1},0,1,1,${cx-0.001},${cy-r1}ZM${cx},${cy-r0}A${r0},${r0},0,1,0,${cx-0.001},${cy-r0}Z`;
    const cos0 = Math.cos(a0 - Math.PI/2), sin0 = Math.sin(a0 - Math.PI/2);
    const cos1 = Math.cos(a1 - Math.PI/2), sin1 = Math.sin(a1 - Math.PI/2);
    const lg = (a1 - a0) > Math.PI ? 1 : 0;
    return `M${cx+r0*cos0},${cy+r0*sin0}L${cx+r1*cos0},${cy+r1*sin0}A${r1},${r1},0,${lg},1,${cx+r1*cos1},${cy+r1*sin1}L${cx+r0*cos1},${cy+r0*sin1}A${r0},${r0},0,${lg},0,${cx+r0*cos0},${cy+r0*sin0}Z`;
  }

  let slices = '', labels = '';
  let angle = -Math.PI / 2; // start at top
  const GAP = focusChildren.length > 1 ? 0.015 : 0;

  focusChildren.forEach((child, i) => {
    const leaves = _sbCountLeaves(child);
    const sweep = (leaves / totalLeaves) * 2 * Math.PI - GAP;
    const a0 = angle + GAP / 2, a1 = a0 + sweep;
    const col = palette[i % palette.length];
    const hasKids = child.children?.length > 0;
    const midA = (a0 + a1) / 2;
    const midR = (innerR + outerR) / 2;
    const tx = cx + midR * Math.cos(midA - Math.PI/2);
    const ty = cy + midR * Math.sin(midA - Math.PI/2);
    const showLabel = sweep > 0.12;
    const showSub = sweep > 0.22;
    const childCount = child.children?.length || 0;

    slices += `<path d="${arcPath(innerR, outerR, a0, a1, cx, cy)}"
      fill="${col}" fill-opacity="0.82" stroke="#0a0a0d" stroke-width="2"
      style="cursor:${hasKids?'pointer':'default'};transition:fill-opacity .15s"
      onmouseenter="this.style.fillOpacity=1;_sbShowTip(event,'${child.name.replace(/'/g,'`')}','${child.partNo||''}',${child.qty||1},${leaves},${childCount})"
      onmouseleave="this.style.fillOpacity=0.82;_sbHideTip()"
      onclick="${hasKids?`sbDrillDown(${i})`:''}"/>`;

    if (showLabel) {
      const maxChars = Math.max(4, Math.floor(sweep * (innerR + outerR) / 14));
      const lbl = truncate(child.name, maxChars);
      const showQty = true;
      const subLines = (showSub && childCount > 0 ? 1 : 0) + (showSub && showQty ? 1 : 0);
      const nameOffY = subLines > 0 ? -(subLines * 8) : 0;
      labels += `<text x="${tx}" y="${ty + nameOffY}"
        text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="${sweep>0.35?12:10}" font-weight="600"
        font-family="IBM Plex Sans,sans-serif" pointer-events="none"
        style="text-shadow:0 1px 4px rgba(0,0,0,.9)">${lbl}</text>`;
      if (showSub && showQty) {
        labels += `<text x="${tx}" y="${ty + nameOffY + 14}"
          text-anchor="middle" dominant-baseline="middle"
          fill="${(child.qty||1) > 1 ? '#f59e0b' : 'rgba(255,255,255,0.5)'}" font-size="10" font-weight="700"
          font-family="JetBrains Mono,monospace" pointer-events="none">×${child.qty||1}</text>`;
      }
      if (showSub && childCount > 0) {
        labels += `<text x="${tx}" y="${ty + nameOffY + (showQty ? 26 : 14)}"
          text-anchor="middle" dominant-baseline="middle"
          fill="rgba(255,255,255,0.55)" font-size="9"
          font-family="JetBrains Mono,monospace" pointer-events="none">${childCount} alt</text>`;
      }
    }
    angle += sweep + GAP;
  });

  // Center circle
  const centerClick = hasParent ? 'sbDrillUp()' : '';
  const centerLabel = truncate(focusName, 14);
  const centerSub = focusPartNo || (hasParent ? '← geri' : '');
  slices += `<circle cx="${cx}" cy="${cy}" r="${innerR}"
    fill="${hasParent?'#2a1a4a':'#1a1a2e'}" stroke="${hasParent?'#8b5cf6':'#3a3a50'}" stroke-width="2"
    style="cursor:${hasParent?'pointer':'default'}"
    onmouseenter="_sbShowCenter(event,'${focusName.replace(/'/g,'`')}')"
    onmouseleave="_sbHideTip()"
    onclick="${centerClick}"/>`;
  labels += `<text x="${cx}" y="${cy-(centerSub?7:0)}" text-anchor="middle" dominant-baseline="middle"
    fill="${hasParent?'#c4b5fd':'#818cf8'}" font-size="${innerR>60?13:11}" font-weight="700"
    font-family="IBM Plex Sans,sans-serif" pointer-events="none">${centerLabel}</text>`;
  if (centerSub) labels += `<text x="${cx}" y="${cy+12}" text-anchor="middle" dominant-baseline="middle"
    fill="${hasParent?'#8b5cf6':'#555'}" font-size="9" font-family="IBM Plex Sans,sans-serif" pointer-events="none">${centerSub}</text>`;

  // Empty state
  if (!focusChildren.length) {
    slices += `<text x="${cx}" y="${cy+innerR+30}" text-anchor="middle" fill="var(--tx4)" font-size="11" font-family="IBM Plex Sans,sans-serif">Alt parça yok</text>`;
  }

  // Breadcrumb
  const crumbItems = [{ name: sys.name, idx: 0 }, ...S.sbPath.map((p,i) => ({ name: p.name, idx: i+1 }))];
  if (focusNode) crumbItems.push({ name: focusName, idx: -1 }); // current, not clickable
  const breadcrumb = `<div style="position:absolute;top:0;left:0;right:0;height:36px;display:flex;align-items:center;padding:0 16px;gap:4px;background:var(--bg2);border-bottom:1px solid var(--brd);overflow:hidden">
    ${crumbItems.map((c, i) => `
      ${i>0?`<span style="color:var(--tx4);font-size:12px">›</span>`:''}
      ${c.idx>=0
        ? `<span style="font-size:11px;color:${i===crumbItems.length-2&&focusNode?'var(--ac2)':'var(--tx3)'};cursor:pointer;padding:2px 6px;border-radius:4px;hover:background:var(--sf)" onclick="sbGoTo(${i})" onmouseenter="this.style.color='var(--ac2)'" onmouseleave="this.style.color='${i===crumbItems.length-2&&focusNode?'var(--ac2)':'var(--tx3)'})'">${c.name}</span>`
        : `<span style="font-size:11px;color:var(--tx);font-weight:600;padding:2px 6px">${c.name}</span>`
      }`).join('')}
    <span style="margin-left:auto;font-size:10px;color:var(--tx4)">${focusChildren.length} öğe &nbsp;|&nbsp; ${totalLeaves} toplam parça</span>
  </div>`;

  container.innerHTML = `<div style="position:relative;width:100%;height:100%;overflow:hidden">
    ${breadcrumb}
    <svg width="${W}" height="${H-36}" style="display:block;margin-top:36px">
      ${slices}${labels}
    </svg>
    <div id="sbTip" style="display:none;position:absolute;background:var(--sf2);border:1px solid var(--brd2);border-radius:8px;padding:10px 14px;font-size:11px;pointer-events:none;z-index:20;max-width:240px;box-shadow:0 4px 20px rgba(0,0,0,.4)"></div>
    ${!hasParent&&focusChildren.length>0?`<div style="position:absolute;bottom:14px;right:16px;font-size:10px;color:var(--tx4)">Alt parça olan dilimlere tıkla: içine gir</div>`:''}
  </div>`;
}

window._sbShowTip = function(e, name, pn, qty, leaves, childCount) {
  const tip = document.getElementById('sbTip'); if (!tip) return;
  tip.innerHTML = `<div style="font-weight:700;color:var(--tx);margin-bottom:4px">${name}</div>
    ${pn?`<div style="color:var(--ac2);font-family:monospace;font-size:10px;margin-bottom:4px">${pn}</div>`:''}
    ${qty>1?`<div style="color:var(--warn)">×${qty} adet</div>`:''}
    <div style="color:var(--tx3);font-size:10px">${leaves} toplam parça</div>
    ${childCount>0?`<div style="color:var(--ac2);font-size:10px">${childCount} alt bileşen — tıkla: detay</div>`:
      `<div style="color:var(--tx4);font-size:10px">Alt parça yok</div>`}`;
  const rect = e.target.closest('div,svg')?.getBoundingClientRect() || {left:0,top:0};
  tip.style.display='block';
  tip.style.left = (e.clientX - rect.left + 14)+'px';
  tip.style.top = (e.clientY - rect.top - 10)+'px';
};
window._sbShowCenter = function(e, name) {
  const tip = document.getElementById('sbTip'); if (!tip) return;
  const hasParent = S.sbPath?.length > 0;
  if (!hasParent) { tip.style.display='none'; return; }
  tip.innerHTML = `<div style="color:var(--ac2);font-size:11px">← Geri: <b>${name}</b></div>`;
  const rect = e.target.closest('div,svg')?.getBoundingClientRect() || {left:0,top:0};
  tip.style.display='block';
  tip.style.left = (e.clientX - rect.left + 14)+'px';
  tip.style.top = (e.clientY - rect.top - 10)+'px';
};
window._sbHideTip = function() { const t=document.getElementById('sbTip'); if(t) t.style.display='none'; };

S.bomTableRows = []; S.bomTableFiltered = []; S.bomTableColFilters = {};
const BT_ROW_H = 34;
const BT_OVERSCAN = 10;
const BT_DEPTH_COLORS = ['#6366f1','#10b981','#f59e0b','#ec4899','#3b82f6','#8b5cf6'];

function _btGetCols(sys) {
  const hidden = S.bomTableHiddenCols||new Set();
  const fixed = [
    { key:'depth',  label:'Lvl',      w:'54px',  align:'left',  fixed:true },
    { key:'name',   label:'Parça Adı', w:'260px', align:'left',  fixed:true },
    { key:'partNo', label:'Parça No',  w:'150px', align:'left',  fixed:true },
    { key:'qty',    label:'Adet',      w:'56px',  align:'right', fixed:true },
  ].filter(c=>!hidden.has(c.key));
  const extra = (sys._extraCols||[])
    .filter(c=>!hidden.has('_x_'+c))
    .map(c=>{
      const w = Math.max(100, Math.min(220, c.length * 8 + 24)) + 'px';
      return { key:'_x_'+c, label:c, w, align:'left', extraName:c };
    });
  return [...fixed, ...extra];
}

function _btToggleColPanel(e){
  if(e) e.stopPropagation();
  const panel=document.getElementById('btColPanel');
  if(!panel) return;

  if(panel.style.display==='none'||!panel.style.display){

    _btRenderColList('');
    setTimeout(()=>{
      document.getElementById('btColSearch')?.focus();

    },0);
  } else {
    panel.style.display='none';
  }
}
function _btPanelOutsideClick(e){
  const panel=document.getElementById('btColPanel');
  if(panel&&!panel.contains(e.target)&&e.target.id!=='btColBtn'){
    panel.style.display='none';
  } else if(panel&&panel.style.display!=='none'){
    document.addEventListener('mousedown',_btPanelOutsideClick,{once:true});

}
function _btRenderColList(filter){
  const list=document.getElementById('btColList'); if(!list) return;
  const sys=S.systems.find(s=>s.id===S.selSys); if(!sys) return;
  const hidden=S.bomTableHiddenCols||new Set();
  const q=(filter||'').toLowerCase();
  const allCols=[
    {key:'depth', label:'Lvl', fixed:true},
    {key:'name',  label:'Parça Adı', fixed:true},
    {key:'partNo',label:'Parça No',  fixed:true},
    {key:'qty',   label:'Adet',      fixed:true},
    ...(sys._extraCols||[]).map(c=>({key:'_x_'+c, label:c, fixed:false}))
  ].filter(c=>!q||c.label.toLowerCase().includes(q));

  list.innerHTML=allCols.map(c=>{
    const vis=!hidden.has(c.key);
    const fixedBadge=c.fixed?`<span style="font-size:9px;color:var(--tx4);margin-left:4px">sabit</span>`:'';
    return `<div style="display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:5px;cursor:pointer;transition:background .1s"
      onmouseover="this.style.background='var(--sf2)'" onmouseout="this.style.background=''">
      <input type="checkbox" ${vis?'checked':''} ${c.fixed?'':''}
        style="accent-color:var(--ac);cursor:pointer;flex-shrink:0"
        onchange="_btToggleCol('${c.key}',this.checked)" ${c.fixed?'title="Sabit sütun — gizleyebilirsiniz"':''}>
      <span style="flex:1;font-size:11px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.label}">${c.label}${fixedBadge}</span>
      <button onclick="_btScrollToCol('${c.key}')" title="Bu sütuna git"
        style="flex-shrink:0;padding:2px 7px;border-radius:4px;border:1px solid var(--brd);background:var(--sf);color:var(--ac2);font-size:10px;cursor:pointer">→</button>
    </div>`;
  }).join('');
  if(!allCols.length) list.innerHTML=`<div style="padding:8px;color:var(--tx4);font-size:11px;text-align:center">Eşleşen sütun yok</div>`;
}
function _btColSearchInput(val){ _btRenderColList(val); }

function _btHideExtraCols(){

function _btScrollToCol(key){
  const scroller=document.getElementById('btScroll'); if(!scroller) return;
  const sys=S.systems.find(s=>s.id===S.selSys); if(!sys) return;

  if(th){th.style.background='rgba(99,102,241,.3)';setTimeout(()=>{th.style.background='';},800);}

function _btRenderAnalysisPanel(){

  const extraCols=sys._extraCols||[];

    panel.innerHTML=`<div style="color:var(--tx3);font-size:11px;padding:4px">Önce yardımcı veri yükleyin (📊 Durum Yükle)</div>`;
    return;
  }
  const colOpts=extraCols.map(c=>`<option value="_x_${c}" ${S.bomTableAnalysisCol==='_x_'+c?'selected':''}>${c}</option>`).join('');
  panel.innerHTML=`
    <div style="display:flex;align-items:center;gap:6px">
      <select class="field-input" id="btAnalColSel" style="flex:1;font-size:11px;padding:5px 8px" onchange="_btSetAnalysisCol(this.value)">

    <div id="btAnalBody" style="margin-top:4px"></div>`;

}

function _btClearAnalysis(){

function _btRunAnalysis(colKey){
  const sys=S.systems.find(s=>s.id===S.selSys); if(!sys) return;
  const extraName=colKey.startsWith('_x_')?colKey.slice(3):colKey;

  // Tüm satırlarda (filtresiz) değer dağılımı hesapla
  const counts={};
  for(const r of (S.bomTableRows||[])){
    const val=String(r._extra?.[extraName]??'').trim()||'(boş)';
    counts[val]=(counts[val]||0)+1;
  }
  // Sırala: çoktan aza
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,[,v])=>s+v,0);

  // Renk ataması
  sorted.forEach(([val],i)=>{
    if(!S.bomTableAnalysisColors[val])
      S.bomTableAnalysisColors[val]=_BT_ANAL_PALETTE[i%_BT_ANAL_PALETTE.length];
  });

  // Tabloyu yeniden render et (renk kodlama için)
  _btRenderViewport();

  // Panel body'yi güncelle
  const body=document.getElementById('btAnalBody'); if(!body) return;
  const maxCount=sorted[0]?.[1]||1;
  body.innerHTML=`
    <div style="font-size:9px;color:var(--tx3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px">${extraName} — ${sorted.length} farklı değer, ${total} parça</div>
    <div style="display:flex;flex-direction:column;gap:3px;max-height:360px;overflow-y:auto">
      ${sorted.map(([val,cnt])=>{
        const pct=Math.round(cnt/total*100);
        const barW=Math.round(cnt/maxCount*100);
        const color=S.bomTableAnalysisColors[val];
        const isActive=S.bomTableAnalysisFilter?.col===colKey&&S.bomTableAnalysisFilter?.val===val;
        return `<div style="cursor:pointer;border-radius:5px;padding:4px 6px;transition:background .1s;${isActive?'background:var(--sf2);outline:1px solid '+color:''}"
          onclick="_btAnalFilterVal('${colKey}','${val.replace(/'/g,"\\'")}')"
          onmouseover="this.style.background='var(--sf2)'" onmouseleave="this.style.background='${isActive?'var(--sf2)':''}'"
          title="Tıkla: bu değere göre filtrele">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
            <span style="width:10px;height:10px;border-radius:3px;background:${color};flex-shrink:0;display:inline-block"></span>
            <span style="flex:1;font-size:11px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${val}</span>
            <span style="font-size:10px;color:var(--tx3);font-family:'JetBrains Mono',monospace;flex-shrink:0">${cnt} <span style="color:var(--tx4)">(${pct}%)</span></span>
          </div>
          <div style="height:4px;background:var(--sf3);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${barW}%;background:${color};border-radius:2px;transition:width .3s"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${S.bomTableAnalysisFilter?`<button class="tool-btn" style="margin-top:6px;width:100%;justify-content:center;color:var(--warn)" onclick="_btClearAnalysisFilter()">✕ Filtreyi Temizle</button>`:''}`;
}

function _btAnalFilterVal(colKey, val){
  // Aynı değere tekrar tıklanırsa filtreyi kaldır (toggle)
  if(S.bomTableAnalysisFilter?.col===colKey && S.bomTableAnalysisFilter?.val===val){
    S.bomTableAnalysisFilter=null;
  } else {
    S.bomTableAnalysisFilter={col:colKey, val};

  if(scroller) scroller.scrollTop=0;
  _btRenderViewport();

}

function _btClearAnalysisFilter(){
  S.bomTableAnalysisFilter=null;
  _btApplyFilter();
  const scroller=document.getElementById('btScroll');
  if(scroller) scroller.scrollTop=0;
  _btRenderViewport();

}

function renderBomTable(container) {
  const sys = S.systems.find(s => s.id === S.selSys); if (!sys) return;
  S.bomTableColFilters = {};

  const flat = [];
  function walk(nodes, depth, ancestors) {
    for (const n of nodes) {
      flat.push({ depth, name: n.name||'', partNo: n.partNo||'', qty: n.qty||1, _extra: n._extra||{}, ancestors });
      if (n.children?.length) walk(n.children, depth+1, [...ancestors, {name: n.name||'', partNo: n.partNo||''}]);
    }
  }
  walk(sys.children, 0, [{name: sys.name, partNo: ''}]);
  S.bomTableRows = flat;
  S.bomTableSort = { col: 'depth', dir: 1 };
  _btApplyFilter();

  const cols = _btGetCols(sys);
  const N = cols.length;
  const thBase = 'padding:0;color:var(--tx3);font-weight:600;border-bottom:1px solid var(--brd);cursor:pointer;user-select:none;background:var(--bg2);overflow:hidden';
  const thInner = 'padding:7px 10px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:flex;align-items:center;gap:4px';
  const fiStyle = 'width:100%;padding:3px 6px;background:var(--sf);border:1px solid var(--brd);border-radius:4px;color:var(--tx);font-size:10px;font-family:inherit;outline:none;box-sizing:border-box';

  const colgroupHtml = `<colgroup>${cols.map(c=>`<col style="width:${c.w};min-width:${c.w}">`).join('')}</colgroup>`;
  const headRow = cols.map(c=>`<th style="${thBase};text-align:${c.align}" onclick="sortBomTable('${c.key}')"><div style="${thInner};justify-content:${c.align==='right'?'flex-end':'flex-start'}" title="${c.label}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.label}</span><span style="opacity:.5;flex-shrink:0" id="bts-${c.key}"></span></div></th>`).join('');
  const filterRow = cols.map(c=>`<td style="padding:3px 6px;background:var(--bg2);border-bottom:2px solid var(--brd);overflow:hidden"><input style="${fiStyle}" placeholder="Filtrele..." oninput="btColFilter('${c.key}',this.value)" value="${(S.bomTableColFilters[c.key]||'').replace(/"/g,'&quot;')}"></td>`).join('');

  // Tek tablo: thead sticky + tbody sanal kaydırma (üst/alt spacer satırı)
  container.innerHTML = `<div id="btScroll" style="height:100%;overflow:auto" onscroll="_btOnScroll()">
    <table id="btTable" style="border-collapse:collapse;font-size:11px;table-layout:fixed;min-width:max-content;width:100%">
      ${colgroupHtml}
      <thead id="btHead" style="position:sticky;top:0;z-index:10">
        <tr>${headRow}</tr>
        <tr id="btFilterRow">${filterRow}</tr>
      </thead>
      <tbody id="btBody">
        <tr id="btTopSpacer" style="height:0px"><td colspan="${N}" style="padding:0;border:none"></td></tr>
        <tr id="btBotSpacer" style="height:0px"><td colspan="${N}" style="padding:0;border:none"></td></tr>
      </tbody>
    </table>
  </div>`;

  _btRenderViewport();
  updateBomTableInfo();
  _btUpdateSortIndicators();
}

function _btApplyFilter() {
  const cf = S.bomTableColFilters||{};
  const af = S.bomTableAnalysisFilter||null; // {col, val} — tam eşleşme
  const sys = S.systems.find(s=>s.id===S.selSys);
  const cols = sys ? _btGetCols(sys) : [];

  let rows = S.bomTableRows.filter(r => {
    // 1) Analiz filtresi — tam eşleşme
    if(af?.col && af?.val!==null){
      const c=cols.find(c=>c.key===af.col);
      const cv=c?.extraName ? String(r._extra[c.extraName]??'').trim() : String(r[af.col]??'').trim();
      if(af.val==='(boş)'){ if(cv!=='') return false; }
      else { if(cv!==af.val) return false; }
    }
    // 2) Metin filtreleri — içerir (substring)
    for (const c of cols) {
      const fv = (cf[c.key]||'').toLowerCase(); if (!fv) continue;
      const cv = c.extraName ? (r._extra[c.extraName]||'') : String(r[c.key]??'');
      if (!cv.toLowerCase().includes(fv)) return false;
    }
    return true;
  });

  if (S.bomTableSort) {
    const {col, dir} = S.bomTableSort;
    const ec = cols.find(c=>c.key===col)?.extraName;
    rows.sort((a,b) => {
      const av = ec ? (a._extra[ec]||'') : a[col];
      const bv = ec ? (b._extra[ec]||'') : b[col];
      return (typeof av==='number'&&typeof bv==='number' ? av-bv : String(av).localeCompare(String(bv)))*dir;
    });
  }
  S.bomTableFiltered = rows;
}

function _btRenderViewport() {
  const scroller   = document.getElementById('btScroll');
  const topSpacer  = document.getElementById('btTopSpacer');
  const botSpacer  = document.getElementById('btBotSpacer');
  const tbody      = document.getElementById('btBody');
  if (!scroller||!topSpacer||!botSpacer||!tbody) return;

  const sys = S.systems.find(s=>s.id===S.selSys); if(!sys) return;
  const cols = _btGetCols(sys);
  const rows = S.bomTableFiltered;
  const total = rows.length;

  // Thead yüksekliğini hesaba kat (sticky)
  const head = document.getElementById('btHead');
  const headH = head ? head.offsetHeight : 58;
  const scrollTop = Math.max(0, scroller.scrollTop - headH);
  const viewH = (scroller.clientHeight || 600) - headH;

  const first = Math.max(0, Math.floor(scrollTop/BT_ROW_H) - BT_OVERSCAN);
  const last  = Math.min(total-1, Math.ceil((scrollTop+viewH)/BT_ROW_H) + BT_OVERSCAN);

  topSpacer.style.height = (first * BT_ROW_H) + 'px';
  botSpacer.style.height = (Math.max(0, total - last - 1) * BT_ROW_H) + 'px';

  let html = '';
  for (let i = first; i <= last; i++) {
    const r = rows[i];
    const dc = BT_DEPTH_COLORS[r.depth % BT_DEPTH_COLORS.length];
    const bg = i%2===0 ? 'transparent' : 'var(--sf)';
    html += `<tr style="height:${BT_ROW_H}px;background:${bg};cursor:pointer" onmouseenter="this.style.background='var(--sf2)'" onmouseleave="this.style.background='${bg}'" onclick="_btShowAncestors(event,${i})">`;
    for (const c of cols) {
      let cell;
      if (c.key==='depth') {
        cell = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${dc};margin-right:5px;vertical-align:middle"></span>${r.depth}`;
      } else if (c.key==='name') {
        cell = `<span style="padding-left:${r.depth*14}px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;font-weight:${r.depth===0?'600':'400'}">${r.name}</span>`;
      } else if (c.key==='partNo') {
        cell = `<span style="font-family:'JetBrains Mono',monospace;color:var(--ac2)">${r.partNo||'—'}</span>`;
      } else if (c.key==='qty') {
        cell = `<span style="font-family:'JetBrains Mono',monospace;color:var(--warn)">×${r.qty}</span>`;
      } else if (c.extraName) {
        const rawVal=String(r._extra[c.extraName]??'').trim();
        const dispVal=rawVal||'—';
        const isAnalCol=(S.bomTableAnalysisCol===c.key);
        const aColor=isAnalCol?(S.bomTableAnalysisColors[rawVal||'(boş)']||null):null;
        cell=aColor
          ? `<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:2px;background:${aColor};flex-shrink:0"></span><span style="color:var(--tx)">${dispVal}</span></span>`
          : `<span style="color:var(--tx2)">${dispVal}</span>`;
      } else { cell = ''; }
      const isAnalCol=(c.extraName&&S.bomTableAnalysisCol===c.key);
      const aColor=isAnalCol?(S.bomTableAnalysisColors[String(r._extra[c.extraName]??'').trim()||'(boş)']||null):null;
      const cellBg=aColor?`background:${aColor}18;`:'';
      html += `<td style="padding:0 10px;border-bottom:1px solid var(--brd);text-align:${c.align};overflow:hidden;white-space:nowrap;text-overflow:ellipsis;${cellBg}">${cell}</td>`;
    }
    html += `</tr>`;
  }

  // Önceki render'dan kalan satırları temizle (spacer'lar hariç)
  tbody.querySelectorAll('tr:not(#btTopSpacer):not(#btBotSpacer)').forEach(tr => tr.remove());
  // Yeni satırları topSpacer'ın hemen arkasına ekle
  topSpacer.insertAdjacentHTML('afterend', html);
}

function _btOnScroll() { _btRenderViewport(); }

function _btUpdateSortIndicators() {
  const sys = S.systems.find(s=>s.id===S.selSys); if (!sys) return;
  _btGetCols(sys).forEach(c => {
    const el = document.getElementById('bts-'+c.key); if (!el) return;
    if (S.bomTableSort?.col===c.key) el.textContent = S.bomTableSort.dir===1?'↑':'↓';
    else el.textContent = '↕';
  });
}

let _bomTableFilterTimer = null;
function btColFilter(col, val) {
  if (!S.bomTableColFilters) S.bomTableColFilters = {};
  S.bomTableColFilters[col] = val;
  if (_bomTableFilterTimer) clearTimeout(_bomTableFilterTimer);
  _bomTableFilterTimer = setTimeout(() => {
    _btApplyFilter();
    const scroller = document.getElementById('btScroll');
    if (scroller) scroller.scrollTop = 0;
    _btRenderViewport();
    updateBomTableInfo();
  }, 180);
}

function sortBomTable(col) {
  if (!S.bomTableSort) S.bomTableSort = {col, dir:1};
  else if (S.bomTableSort.col===col) S.bomTableSort.dir *= -1;
  else S.bomTableSort = {col, dir:1};
  _btApplyFilter();
  const scroller = document.getElementById('btScroll');
  if (scroller) scroller.scrollTop = 0;
  _btRenderViewport();
  updateBomTableInfo();
  _btUpdateSortIndicators();
}
function updateBomTableInfo() {
  const el = document.getElementById('bomTableInfo'); if (!el) return;
  const total = S.bomTableRows?.length||0, shown = S.bomTableFiltered?.length??total;
  el.textContent = shown===total ? `${total} parça` : `${shown}/${total} parça`;
}
function exportBomTableCSV() {
  const sys = S.systems.find(s=>s.id===S.selSys); if (!sys) return;
  const cols = _btGetCols(sys);
  const rows = S.bomTableFiltered||S.bomTableRows||[]; if (!rows.length) return;
  const header = cols.map(c=>c.label);
  const lines = [header.join(','), ...rows.map(r=>cols.map(c=>{
    let v;
    if (c.extraName) v = r._extra[c.extraName]||'';
    else v = String(r[c.key]??'');
    return `"${v.replace(/"/g,'""')}"`;
  }).join(','))];
  const blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='bom-export.csv'; a.click();
}

// ═══════ ALT SİSTEM KARŞILAŞTIRMA MATRİSİ ═══════
function renderDSM(container) {
  const sys = S.systems.find(s => s.id === S.selSys); if (!sys) return;
  if (!sys.children?.length) {
    container.innerHTML='<div class="empty-state"><div class="empty-icon">⊞</div><div class="empty-title">Alt sistem yok</div></div>'; return;
  }

  function flatSub(nodes, depth) {
    let arr = [];
    for (const n of nodes) {
      arr.push({...n, _depth: depth});
      if (n.children?.length) arr = arr.concat(flatSub(n.children, depth+1));
    }
    return arr;
  }
  function maxDepth(nodes, d) {
    let m = d;
    for (const n of nodes) if (n.children?.length) m = Math.max(m, maxDepth(n.children, d+1));
    return m;
  }

  const METRICS = [
    { key:'total',    label:'Toplam Parça',      desc:'Tüm alt parçalar dahil',         fmt:v=>`${v}`,        color:(v,mm)=>_dsmColor(v,'neutral') },
    { key:'unique',   label:'Benzersiz Parça No', desc:'Farklı parça numarası sayısı',   fmt:v=>`${v}`,        color:(v,mm)=>_dsmColor(v,'neutral') },
    { key:'depth',    label:'Max Derinlik',       desc:'Ağaç derinliği (seviye)',        fmt:v=>`${v} lvl`,    color:(v,mm)=>_dsmColor(v,'warn',3,5) },
    { key:'nopn',     label:'Parça No Eksik',     desc:'Parça numarası boş olan sayısı', fmt:v=>`${v}`,        color:(v,mm)=>_dsmColor(v,'danger',0,5) },
    { key:'maxqty',   label:'Max Adet',           desc:'En yüksek adetli tek parça',    fmt:v=>`×${v}`,       color:(v,mm)=>_dsmColor(v,'neutral') },
    { key:'totalqty', label:'Toplam Adet',        desc:'Tüm parçaların adet toplamı',   fmt:v=>`${v}`,        color:(v,mm)=>_dsmColor(v,'neutral') },
  ];

  const palette = ['#6366f1','#10b981','#f59e0b','#ec4899','#3b82f6','#8b5cf6','#14b8a6','#f97316','#06b6d4','#84cc16'];

  const rows = sys.children.map((c, i) => {
    const all = flatSub(c.children||[], 1);
    const total = all.length;
    const uniquePNs = new Set(all.map(n=>n.partNo).filter(Boolean)).size;
    const depth = c.children?.length ? maxDepth(c.children, 1) : 0;
    const noPn = all.filter(n=>!n.partNo).length;
    const maxQty = all.reduce((m,n)=>Math.max(m,n.qty||1),1);
    const totalQty = all.reduce((s,n)=>s+(n.qty||1),0);
    return { name:c.name, partNo:c.partNo||'', color:palette[i%palette.length], total, unique:uniquePNs, depth, nopn:noPn, maxqty:maxQty, totalqty:totalQty };
  });

  const minMax = {};
  METRICS.forEach(m => {
    const vals = rows.map(r=>r[m.key]);
    minMax[m.key] = { min:Math.min(...vals), max:Math.max(...vals) };
  });

  let html = `<div style="overflow:auto;height:100%;padding:16px">
    <div style="font-size:10px;color:var(--tx3);margin-bottom:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px">Alt Sistem Metrik Karşılaştırması</div>
    <table style="border-collapse:collapse;font-size:11px;font-family:'IBM Plex Sans',sans-serif;width:100%">
      <thead><tr>
        <th style="padding:8px 16px;text-align:left;color:var(--tx3);font-weight:600;border-bottom:2px solid var(--brd2);min-width:160px">Alt Sistem</th>`;

  METRICS.forEach(m => {
    html += `<th style="padding:8px 10px;text-align:center;color:var(--tx3);font-weight:600;border-bottom:2px solid var(--brd2);min-width:100px" title="${m.desc}">${m.label}</th>`;
  });
  html += '</tr></thead><tbody>';

  rows.forEach((r, i) => {
    html += `<tr onmouseenter="this.style.background='var(--sf)'" onmouseleave="this.style.background='transparent'">
      <td style="padding:10px 16px;border-bottom:1px solid var(--brd)">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${r.color};flex-shrink:0"></span>
          <span style="color:var(--tx);font-weight:600">${r.name}</span>
        </div>
        ${r.partNo?`<div style="font-size:9px;color:var(--tx4);font-family:monospace;margin-left:18px">${r.partNo}</div>`:''}
      </td>`;

    METRICS.forEach(m => {
      const val = r[m.key];
      const textColor = m.color(val, minMax[m.key]);
      const barPct = minMax[m.key].max===minMax[m.key].min ? 50 : Math.round((val-minMax[m.key].min)/(minMax[m.key].max-minMax[m.key].min)*100);
      html += `<td style="padding:8px 10px;border-bottom:1px solid var(--brd);text-align:center;vertical-align:middle" title="${m.desc}: ${m.fmt(val)}">
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
          <span style="font-weight:700;font-size:13px;color:${textColor}">${m.fmt(val)}</span>
          <div style="width:64px;height:4px;background:var(--sf3);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${barPct}%;background:${textColor};border-radius:2px"></div>
          </div>
        </div>
      </td>`;
    });
    html += '</tr>';
  });

  // Toplam satırı
  const T = { total:rows.reduce((s,r)=>s+r.total,0), unique:'—', depth:Math.max(...rows.map(r=>r.depth)),
    nopn:rows.reduce((s,r)=>s+r.nopn,0), maxqty:Math.max(...rows.map(r=>r.maxqty)),
    totalqty:rows.reduce((s,r)=>s+r.totalqty,0) };
  html += `<tr style="background:var(--sf2)"><td style="padding:10px 16px;color:var(--tx2);font-weight:700;border-top:2px solid var(--brd2)">TOPLAM / ORTALAMA</td>`;
  METRICS.forEach(m => {
    const val = T[m.key];
    html += `<td style="padding:8px 10px;text-align:center;color:var(--tx2);font-weight:600;border-top:2px solid var(--brd2)">${val==='—'?'—':m.fmt(val)}</td>`;
  });
  html += `</tr></tbody></table>
    <div style="margin-top:14px;display:flex;gap:20px;flex-wrap:wrap;font-size:10px;color:var(--tx4)">
      <span><span style="color:var(--ok)">■</span> İyi</span>
      <span><span style="color:var(--warn)">■</span> Dikkat</span>
      <span><span style="color:var(--err)">■</span> Aksiyon gerekli</span>
      <span><span style="color:var(--tx3)">■</span> Bilgi</span>
      <span style="margin-left:auto;font-style:italic">Sütun başlıklarının üzerine gelin: açıklama</span>
    </div>`;

  // ── Ekstra sütun analizi (Durum Yükle ile gelen sütunlar) ──
  const extraCols = sys._extraCols || [];
  if (extraCols.length > 0) {
    extraCols.forEach(colName => {
      // Her alt sistem için bu sütunun değer dağılımını topla (kendisi + tüm torunları)
      const sysData = sys.children.map((c, i) => {
        const all = [c, ...flatSub(c.children || [], 1)];
        const dist = {};
        let filled = 0;
        all.forEach(n => {
          const v = String((n._extra && n._extra[colName] != null ? n._extra[colName] : '')).trim();
          const key = v || '(boş)';
          dist[key] = (dist[key] || 0) + 1;
          if (v) filled++;
        });
        return { name: c.name, partNo: c.partNo || '', color: palette[i % palette.length], dist, total: all.length, filled };
      });

      // Tüm benzersiz değerleri frekansa göre sırala
      const globalDist = {};
      sysData.forEach(r => Object.entries(r.dist).forEach(([v, cnt]) => { globalDist[v] = (globalDist[v] || 0) + cnt; }));
      const uniqueVals = Object.entries(globalDist).sort((a, b) => b[1] - a[1]).map(e => e[0]);
      const valColors = ['#6366f1','#10b981','#f59e0b','#ec4899','#3b82f6','#8b5cf6','#14b8a6','#f97316','#06b6d4','#84cc16'];

      html += `<div style="margin-top:32px;border-top:1px solid var(--brd);padding-top:20px">
        <div style="font-size:10px;color:var(--ac2);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px">
          📊 ${colName} — Alt Sistem Dağılımı
        </div>
        <table style="border-collapse:collapse;font-size:11px;font-family:'IBM Plex Sans',sans-serif;width:100%">
          <thead><tr>
            <th style="padding:7px 14px;text-align:left;color:var(--tx3);font-weight:600;border-bottom:2px solid var(--brd2);min-width:160px">Alt Sistem</th>
            <th style="padding:7px 10px;text-align:center;color:var(--tx3);font-weight:600;border-bottom:2px solid var(--brd2);min-width:70px">Toplam</th>`;
      uniqueVals.forEach((v, vi) => {
        html += `<th style="padding:7px 10px;text-align:center;color:${valColors[vi%valColors.length]};font-weight:600;border-bottom:2px solid var(--brd2);min-width:80px">${v}</th>`;
      });
      html += '</tr></thead><tbody>';

      sysData.forEach(r => {
        html += `<tr onmouseenter="this.style.background='var(--sf)'" onmouseleave="this.style.background='transparent'">
          <td style="padding:9px 14px;border-bottom:1px solid var(--brd)">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${r.color};flex-shrink:0"></span>
              <span style="color:var(--tx);font-weight:600">${r.name}</span>
            </div>
            ${r.partNo?`<div style="font-size:9px;color:var(--tx4);font-family:monospace;margin-left:18px">${r.partNo}</div>`:''}
          </td>
          <td style="padding:9px 10px;border-bottom:1px solid var(--brd);text-align:center;color:var(--tx2);font-weight:600">${r.total}</td>`;
        uniqueVals.forEach((v, vi) => {
          const cnt = r.dist[v] || 0;
          const pct = r.total ? Math.round(cnt / r.total * 100) : 0;
          const color = valColors[vi % valColors.length];
          html += `<td style="padding:7px 10px;border-bottom:1px solid var(--brd);text-align:center;vertical-align:middle" title="${v}: ${cnt} parça (%${pct})">
            <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
              <span style="font-weight:700;font-size:13px;color:${cnt>0?color:'var(--tx4)'}">${cnt>0?cnt:'—'}</span>
              ${cnt>0?`<div style="width:56px;height:4px;background:var(--sf3);border-radius:2px;overflow:hidden">
                <div style="height:100%;width:${pct}%;background:${color};border-radius:2px"></div>
              </div>
              <span style="font-size:9px;color:var(--tx4)">%${pct}</span>`:''}
            </div>
          </td>`;
        });
        html += '</tr>';
      });

      // Toplam satırı
      html += `<tr style="background:var(--sf2)">
        <td style="padding:9px 14px;color:var(--tx2);font-weight:700;border-top:2px solid var(--brd2)">TOPLAM</td>
        <td style="padding:9px 10px;text-align:center;color:var(--tx2);font-weight:700;border-top:2px solid var(--brd2)">${sysData.reduce((s,r)=>s+r.total,0)}</td>`;
      uniqueVals.forEach((v, vi) => {
        const total = globalDist[v] || 0;
        html += `<td style="padding:9px 10px;text-align:center;color:${valColors[vi%valColors.length]};font-weight:700;border-top:2px solid var(--brd2)">${total}</td>`;
      });
      html += '</tr></tbody></table></div>';
    });
  }

  html += '</div>';
  container.innerHTML = html;
}
function _dsmColor(v, type, goodMax, warnMax) {
  if (type==='neutral') return 'var(--tx2)';
  if (type==='warn') return v<=goodMax?'var(--ok)':v<=warnMax?'var(--warn)':'var(--err)';
  if (type==='danger') return v===0?'var(--ok)':v<=warnMax?'var(--warn)':'var(--err)';
  return 'var(--tx2)';
}
function _dsmColorPct(v) { return v>=90?'var(--ok)':v>=50?'var(--warn)':'var(--err)'; }

// ═══════ DASHBOARD ═══════
function renderDashboard(container){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  const flat=flattenBOM(sys.children,'');
  const total=flat.length;
  const totalQty=flat.reduce((s,n)=>s+(n.qty||1),0);
  const maxDepth=flat.reduce((m,n)=>Math.max(m,n._depth),0)+1;

  // Group by depth level
  const byDepth={};
  flat.forEach(n=>{const lbl=['Alt Sistem','Bileşen','Parça','Alt Parça'][n._depth]||`Seviye ${n._depth}`;byDepth[lbl]=(byDepth[lbl]||0)+1});

  // Top qty items
  const topQty=[...flat].sort((a,b)=>b.qty-a.qty).slice(0,8);

  // Parts with children count (sub-systems)
  const subSystems=flat.filter(n=>{const node=find(sys.children,n.id);return node&&node.children&&node.children.length>0});

  // ── BOM table stats ──
  // Parça no doluluk
  const withPN  = flat.filter(n=>n.partNo).length;
  const dupPNs  = _dashDuplicates(flat.map(n=>n.partNo).filter(Boolean));
  // Leaf vs branch
  function isLeaf(n){ const node=find(sys.children,n.id||''); return !node?.children?.length; }
  function flatWithNode(nodes,d){ let a=[];for(const n of nodes){a.push({...n,_node:n,_depth:d});if(n.children?.length)a=a.concat(flatWithNode(n.children,d+1))}return a; }
  const flatFull=flatWithNode(sys.children,0);
  const leaves=flatFull.filter(n=>!n._node.children?.length);
  const branches=flatFull.filter(n=>n._node.children?.length>0);
  const leafQty=leaves.reduce((s,n)=>s+(n.qty||1),0);
  // Orphan / no PN at leaf
  const leafNoPN=leaves.filter(n=>!n.partNo);
  // Qty distribution
  const qty1=flat.filter(n=>n.qty===1).length;
  const qtyGt1=flat.filter(n=>n.qty>1).length;
  const avgQty=total?Math.round(totalQty/total*10)/10:0;
  // Depth histogram (top 8 levels)
  const depthHist={};
  flat.forEach(n=>{ depthHist[n._depth]=(depthHist[n._depth]||0)+1 });
  const depthMax=Math.max(...Object.values(depthHist));
  // Avg children per branch
  const avgChildren=branches.length?Math.round(branches.reduce((s,n)=>s+(n._node.children?.length||0),0)/branches.length*10)/10:0;

  const barRow=(label,val,max,color,sub='')=>`<div class="dash-bar" style="margin:5px 0">
    <span class="dash-bar-label" style="min-width:90px;font-size:10px">${label}</span>
    <div class="dash-bar-track" style="flex:1"><div class="dash-bar-fill" style="width:${max?Math.round(val/max*100):0}%;background:${color}"></div></div>
    <span class="dash-bar-val">${val}${sub}</span></div>`;

  container.innerHTML=`<div style="overflow-y:auto;height:100%;padding:0 0 20px">
  <div class="dash-grid">
    <!-- ROW 1: Temel istatistikler -->
    <div class="dash-card"><div class="dash-card-title">Toplam Parça (benzersiz tip)</div><div class="dash-big">${total}</div><div class="dash-sub">${branches.length} alt sistem &nbsp;·&nbsp; ${leaves.length} yaprak parça</div></div>
    <div class="dash-card"><div class="dash-card-title">Toplam Adet (stok)</div><div class="dash-big">${totalQty.toLocaleString('tr-TR')}</div><div class="dash-sub">Ortalama ×${avgQty} / parça tipi &nbsp;·&nbsp; Yaprak: ${leafQty.toLocaleString('tr-TR')}</div></div>
    <div class="dash-card"><div class="dash-card-title">Ağaç Derinliği</div><div class="dash-big">${maxDepth}</div><div class="dash-sub">Ortalama ${avgChildren} alt / ara düğüm</div></div>
    <div class="dash-card"><div class="dash-card-title">Parça No Doluluk</div>
      <div class="dash-big" style="color:${withPN===total?'var(--ok)':withPN/total>.7?'var(--warn)':'var(--err)'}">${total?Math.round(withPN/total*100):0}%</div>
      <div class="dash-sub">${withPN}/${total} parçada parça no var · ${dupPNs.length} duplikat</div></div>

    <!-- ROW 2: Yapı analizi -->
    <div class="dash-card" style="grid-column:span 2"><div class="dash-card-title">Seviye Dağılımı (parça sayısı)</div>
      ${Object.entries(depthHist).sort((a,b)=>+a[0]-+b[0]).map(([d,cnt])=>barRow(
        `${ ['Alt Sistem','Bileşen','Parça','Alt Parça'][+d]||'Seviye '+d} (L${d})`, cnt, depthMax,
        ['#6366f1','#10b981','#f59e0b','#ec4899','#3b82f6','#8b5cf6'][+d%6]
      )).join('')}
    </div>

    <div class="dash-card"><div class="dash-card-title">Adet Dağılımı</div>
      ${barRow('Adet = 1',qty1,total,'var(--tx3)',' parça')}
      ${barRow('Adet > 1',qtyGt1,total,'var(--warn)',' parça')}
      <div style="margin-top:10px;font-size:10px;color:var(--tx3)">En yüksek adetli</div>
      ${topQty.slice(0,5).map(n=>`<div class="dash-list-item"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.name}</span><span style="color:var(--warn);font-family:'JetBrains Mono',monospace;flex-shrink:0">×${n.qty}</span></div>`).join('')}
    </div>

    <!-- ROW 3: Kalite göstergeleri -->
    <div class="dash-card"><div class="dash-card-title">Yaprak Parça Kalitesi (${leaves.length} parça)</div>
      ${barRow('Parça No var',leaves.length-leafNoPN.length,leaves.length,'var(--ok)')}
      ${barRow('Parça No eksik',leafNoPN.length,leaves.length,'var(--err)')}
      ${leafNoPN.length>0?`<div style="margin-top:8px;font-size:9px;color:var(--tx3);margin-bottom:4px">Parça No eksik yapraklar</div>
      ${leafNoPN.slice(0,6).map(n=>`<div class="dash-list-item"><div class="dash-warn-dot"></div><span style="flex:1">${n.name||'—'}</span></div>`).join('')}
      ${leafNoPN.length>6?`<div style="font-size:9px;color:var(--tx4);padding-top:4px">...+${leafNoPN.length-6} daha</div>`:''}`:'<div style="color:var(--ok);font-size:11px;padding:8px 0">Tüm yaprak parçalarda PN mevcut</div>'}
    </div>

    <div class="dash-card"><div class="dash-card-title">Duplikat Parça No (${dupPNs.length})</div>
      ${dupPNs.length===0?'<div style="color:var(--ok);font-size:11px;padding:8px 0">Duplikat parça no bulunamadı</div>':
      dupPNs.slice(0,8).map(({pn,count})=>`<div class="dash-list-item"><span style="font-family:monospace;color:var(--ac2);flex:1">${pn}</span><span style="color:var(--err);font-size:9px">×${count}</span></div>`).join('')+
      (dupPNs.length>8?`<div style="font-size:9px;color:var(--tx4);padding-top:4px">...+${dupPNs.length-8} daha</div>`:'')}
    </div>

    ${_dashMatchCard(sys, flat)}
    ${_dashExtraCols(sys, flatFull)}
  </div></div>`;
}

function _dashExtraCols(sys, flatFull) {
  // Extra columns (from Excel import)
  const extraCols = sys._extraCols||[];

  // Also scan for any non-standard keys on nodes (like _oid, custom fields)
  // and treat high-cardinality-friendly ones
  const customKeys = [];
  if (flatFull.length > 0) {
    const skip = new Set(['id','name','partNo','qty','children','_depth','_extra','_oid','_path']);
    const sample = flatFull[0];
    Object.keys(sample).forEach(k=>{ if(!skip.has(k) && k.charAt(0)!=='_') customKeys.push(k); });
  }

  if (!extraCols.length && !customKeys.length) return '';

  const allCols = [...new Set([...extraCols, ...customKeys])];

  const colCards = allCols.map(col => {
    // Gather values from _extra or direct node property
    const vals = flatFull.map(n => {
      const v = n._extra ? (n._extra[col]??'') : (n[col]??'');
      return String(v).trim();
    });
    const nonEmpty = vals.filter(v=>v && v!=='0' && v.toLowerCase()!=='null');
    const fillRate = flatFull.length ? Math.round(nonEmpty.length/flatFull.length*100) : 0;

    // Value distribution (top 10 unique values)
    const dist={};
    nonEmpty.forEach(v=>{dist[v]=(dist[v]||0)+1});
    const sorted=Object.entries(dist).sort((a,b)=>b[1]-a[1]);
    const top=sorted.slice(0,8);
    const maxCnt=top.length?top[0][1]:1;
    const colors=['#6366f1','#10b981','#f59e0b','#ec4899','#3b82f6','#8b5cf6','#14b8a6','#f97316'];

    return `<div class="dash-card">
      <div class="dash-card-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>${col}</span>
        <span style="font-size:9px;color:${fillRate>80?'var(--ok)':fillRate>40?'var(--warn)':'var(--err)'}">%${fillRate} dolu</span>
      </div>
      <div style="font-size:10px;color:var(--tx3);margin-bottom:8px">${sorted.length} benzersiz değer · ${nonEmpty.length} kayıt</div>
      ${top.map(([val,cnt],i)=>`<div class="dash-bar" style="margin:4px 0">
        <span style="min-width:100px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px;color:var(--tx2)" title="${val}">${val||'—'}</span>
        <div class="dash-bar-track" style="flex:1"><div class="dash-bar-fill" style="width:${Math.round(cnt/maxCnt*100)}%;background:${colors[i%colors.length]}"></div></div>
        <span class="dash-bar-val">${cnt}</span>
      </div>`).join('')}
      ${sorted.length>8?`<div style="font-size:9px;color:var(--tx4);margin-top:4px">...+${sorted.length-8} değer daha</div>`:''}
    </div>`;
  });

  return `<div style="grid-column:1/-1;padding:12px 0 4px;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);font-weight:600;border-top:1px solid var(--brd)">
    BOM Tablosu Sütun İstatistikleri
  </div>
  ${colCards.join('')}`;
}

function _dashDuplicates(arr){
  const cnt={};arr.forEach(v=>{cnt[v]=(cnt[v]||0)+1});
  return Object.entries(cnt).filter(([,c])=>c>1).sort((a,b)=>b[1]-a[1]).map(([pn,count])=>({pn,count}));
}

function _dashMatchCard(sys, flatA) {
  const otherSystems = S.systems.filter(s=>s.id!==S.selSys);
  if (!otherSystems.length) return `<div class="dash-card" style="grid-column:span 2">
    <div class="dash-card-title">BOM Eşleşme Analizi</div>
    <div style="color:var(--tx4);font-size:11px;padding:8px 0">Karşılaştırmak için en az 2 sistem gerekli.</div>
  </div>`;

  const opts = otherSystems.map(s=>`<option value="${s.id}" ${s.id===S.dashCmpSys?'selected':''}>${s.name}</option>`).join('');
  const sel = `<select class="field-input" style="width:100%;font-size:11px;padding:5px 8px;margin-bottom:10px" onchange="dashSetCmp(this.value)">
    <option value="">— Karşılaştırılacak sistemi seçin —</option>${opts}
  </select>`;

  const cmpSys = S.dashCmpSys ? S.systems.find(s=>s.id===S.dashCmpSys) : null;
  if (!cmpSys) return `<div class="dash-card" style="grid-column:span 2">
    <div class="dash-card-title">BOM Eşleşme Analizi</div>${sel}
  </div>`;

  const flatB = flattenBOM(cmpSys.children,'');
  const pnsA = new Set(flatA.map(n=>n.partNo).filter(Boolean));
  const pnsB = new Set(flatB.map(n=>n.partNo).filter(Boolean));
  const common = [...pnsA].filter(p=>pnsB.has(p));
  const onlyA = [...pnsA].filter(p=>!pnsB.has(p));
  const onlyB = [...pnsB].filter(p=>!pnsA.has(p));
  const pct = Math.max(pnsA.size,pnsB.size) ? Math.round(common.length/Math.max(pnsA.size,pnsB.size)*100) : 0;
  const namesA = new Set(flatA.map(n=>n.name.toLowerCase().trim()).filter(Boolean));
  const namesB = new Set(flatB.map(n=>n.name.toLowerCase().trim()).filter(Boolean));
  const commonNames = [...namesA].filter(n=>namesB.has(n));
  const namePct = Math.max(namesA.size,namesB.size) ? Math.round(commonNames.length/Math.max(namesA.size,namesB.size)*100) : 0;
  const pctColor = pct>=80?'var(--ok)':pct>=50?'var(--warn)':'var(--err)';

  return `<div class="dash-card" style="grid-column:span 2">
    <div class="dash-card-title">BOM Eşleşme Analizi — <span style="color:var(--ac2)">${sys.name}</span> ↔ <span style="color:var(--pink)">${cmpSys.name}</span></div>
    ${sel}
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <div style="flex:1;text-align:center;background:var(--sf2);border-radius:8px;padding:12px 6px">
        <div style="font-size:26px;font-weight:700;color:${pctColor}">${pct}%</div>
        <div style="font-size:9px;color:var(--tx3);margin-top:3px">Parça No Eşleşme</div>
      </div>
      <div style="flex:1;text-align:center;background:var(--sf2);border-radius:8px;padding:12px 6px">
        <div style="font-size:26px;font-weight:700;color:var(--ok)">${common.length}</div>
        <div style="font-size:9px;color:var(--tx3);margin-top:3px">Ortak Parça No</div>
      </div>
      <div style="flex:1;text-align:center;background:var(--sf2);border-radius:8px;padding:12px 6px">
        <div style="font-size:26px;font-weight:700;color:var(--warn)">${namePct}%</div>
        <div style="font-size:9px;color:var(--tx3);margin-top:3px">Ad Benzerliği</div>
      </div>
      <div style="flex:1;text-align:center;background:var(--sf2);border-radius:8px;padding:12px 6px">
        <div style="font-size:26px;font-weight:700;color:var(--err)">${onlyA.length+onlyB.length}</div>
        <div style="font-size:9px;color:var(--tx3);margin-top:3px">Farklı Parça</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:10px">
      <div style="background:var(--sf2);border-radius:6px;padding:10px;border-left:3px solid var(--ac2)">
        <div style="color:var(--ac2);margin-bottom:6px;font-weight:600">Sadece "${sys.name}"de (${onlyA.length})</div>
        ${onlyA.length===0?`<div style="color:var(--ok)">✓ Tümü eşleşiyor</div>`:
          onlyA.slice(0,6).map(p=>`<div style="font-family:monospace;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px">${p}</div>`).join('')+
          (onlyA.length>6?`<div style="color:var(--tx4);margin-top:4px">...+${onlyA.length-6} daha</div>`:'')}
      </div>
      <div style="background:var(--sf2);border-radius:6px;padding:10px;border-left:3px solid var(--pink)">
        <div style="color:var(--pink);margin-bottom:6px;font-weight:600">Sadece "${cmpSys.name}"de (${onlyB.length})</div>
        ${onlyB.length===0?`<div style="color:var(--ok)">✓ Tümü eşleşiyor</div>`:
          onlyB.slice(0,6).map(p=>`<div style="font-family:monospace;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px">${p}</div>`).join('')+
          (onlyB.length>6?`<div style="color:var(--tx4);margin-top:4px">...+${onlyB.length-6} daha</div>`:'')}
      </div>
    </div>
  </div>`;
}

function dashSetCmp(id) { S.dashCmpSys = id||null; renderTab(); }

// ═══════ AUTO-BACKUP ═══════
let _backupTimer=null;
const _origPersist=persist;
persist=async function(){
  await window.api.saveData({systems:S.systems,revisions:S.revisions});
  // Schedule backup 30s after last save
  if(_backupTimer)clearTimeout(_backupTimer);
  _backupTimer=setTimeout(async()=>{
    try{await window.api.saveData({systems:S.systems,revisions:S.revisions,_backup:true})}catch(e){}
  },30000);
};

// ── KEYBOARD ──
document.addEventListener("keydown",e=>{if(e.ctrlKey&&e.key==="s"){e.preventDefault();persist();toast("Kaydedildi")}if(e.ctrlKey&&e.key==="f"&&S.tab==='tree'){e.preventDefault();const el=document.getElementById('treeSearch');if(el)el.focus()}if(e.ctrlKey&&e.key==="a"&&S.tab==='tree'){e.preventDefault();selectAllVisible()}if(e.key==="Delete"&&S.multiSel.length>0){bulkDelete()}else if(e.key==="Delete"&&S.selNode){delNode(S.selNode)}if(e.key==="Escape"){if(S.multiSel.length>0){clearMultiSel()}else if(S.searchQuery){S.searchQuery='';S.searchHits=[];S.searchIdx=0;renderTab()}else{closeModal();closeRP()}}});

function selectAllVisible(){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  S.multiSel=[];
  const walk=ns=>{for(const n of ns){S.multiSel.push(n.id);if(S.expanded[n.id]&&n.children?.length)walk(n.children)}};
  walk(sys.children);renderToolbar();renderTab();
}

init();
</script>
</body>
