<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>BOM Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root {
  --bg:#0a0a0d;--bg2:#101014;--sf:#161619;--sf2:#1c1c21;--sf3:#252529;--sf4:#2e2e34;
  --brd:#2a2a30;--brd2:#363640;
  --tx:#e5e3df;--tx2:#9a9894;--tx3:#6a6a6a;--tx4:#444;
  --ac:#6366f1;--ac2:#818cf8;--ac3:#a5b4fc;
  --ok:#10b981;--ok2:#34d399;--warn:#f59e0b;--err:#ef4444;
  --info:#3b82f6;--pink:#ec4899;--purple:#8b5cf6;
  --r:12px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;user-select:none}
.titlebar{height:38px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;align-items:center;padding:0 16px;-webkit-app-region:drag;flex-shrink:0}
.titlebar-icon{font-size:15px;margin-right:8px}.titlebar-text{font-size:11px;font-weight:600;color:var(--tx2);letter-spacing:.5px}
.titlebar-badge{font-size:9px;color:var(--ok);background:rgba(16,185,129,.12);padding:2px 7px;border-radius:4px;margin-left:8px;font-family:'JetBrains Mono',monospace}
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:250px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:14px;border-bottom:1px solid var(--brd)}
.sidebar-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);font-weight:600;margin-bottom:8px}
.sidebar-search-wrap{position:relative}
.sidebar-search-wrap::before{content:'⌕';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--tx4);font-size:12px}
.sidebar-search{width:100%;padding:7px 9px 7px 28px;background:var(--sf);border:1px solid var(--brd);border-radius:var(--rs);color:var(--tx);font-size:11px;font-family:inherit;outline:none}
.sidebar-search:focus{border-color:var(--ac)}
.sys-list{flex:1;overflow-y:auto;padding:6px}
.sys-list::-webkit-scrollbar{width:3px}.sys-list::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:2px}
.sys-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;transition:background .12s;margin-bottom:1px}
.sys-item:hover{background:var(--sf)}.sys-item.active{background:var(--ac)}
.sys-item.active .sys-item-sub{color:rgba(255,255,255,.7)}
.sys-icon-sm{font-size:18px;width:32px;height:32px;background:var(--sf2);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sys-item.active .sys-icon-sm{background:rgba(255,255,255,.15)}
.sys-item-info{flex:1;min-width:0}
.sys-item-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sys-item-sub{font-size:9px;color:var(--tx3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.sys-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-footer{padding:10px;border-top:1px solid var(--brd);display:flex;gap:5px}
.sf-btn{flex:1;padding:7px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--sf);color:var(--tx2);font-size:10px;font-family:inherit;cursor:pointer;text-align:center;font-weight:500;transition:all .12s}
.sf-btn:hover{background:var(--sf2)}.sf-btn.primary{background:var(--ac);border-color:var(--ac);color:#fff}
.sf-btn.primary:hover{background:#5558e6}
.ctx-menu{position:fixed;background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:4px;z-index:9999;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.ctx-item{padding:7px 12px;border-radius:5px;font-size:12px;cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:8px}
.ctx-item:hover{background:var(--sf2)}
.ctx-item.danger{color:#f87171}.ctx-item.danger:hover{background:rgba(248,113,113,.12)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:8px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:6px;background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.tool-btn{padding:5px 10px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--sf);color:var(--tx2);font-size:10px;font-family:inherit;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap}
.tool-btn:hover{background:var(--sf2);color:var(--tx)}.tool-btn.danger:hover{border-color:var(--err);color:var(--err)}
.tool-btn.active{background:var(--ac);border-color:var(--ac);color:#fff}
.tool-sep{width:1px;height:18px;background:var(--brd)}.tool-spacer{flex:1}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--brd);background:var(--bg2);padding:0 16px;flex-shrink:0}
.tab-item{padding:8px 14px;font-size:11px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.tab-item:hover{color:var(--tx2)}.tab-item.active{color:var(--ac2);border-bottom-color:var(--ac)}
.content{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}.content::-webkit-scrollbar{width:5px}.content::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:3px}

/* SYSTEM HEADER */
.sys-hdr{padding:20px 20px 14px;background:linear-gradient(180deg,var(--sf) 0%,transparent 100%)}
.sys-hdr-row{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.sys-hdr-icon{font-size:32px;width:56px;height:56px;background:var(--sf2);border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--brd)}
.sys-hdr-name{font-size:18px;font-weight:700;margin-bottom:3px}.sys-hdr-sn{font-size:11px;color:var(--tx2);font-family:'JetBrains Mono',monospace}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:500;font-family:'JetBrains Mono',monospace}

/* TREE */
.tree{padding:4px 10px 20px}
.tn{display:flex;align-items:center;gap:5px;padding:6px 8px;cursor:pointer;border-radius:6px;transition:background .1s;margin:1px 0}
.tn:hover{background:var(--sf)}.tn.sel{background:rgba(99,102,241,.1);outline:1px solid rgba(99,102,241,.3)}
.ta{font-size:7px;color:var(--tx3);transition:transform .15s;display:inline-block;width:10px;text-align:center}.ta.op{transform:rotate(90deg)}
.td{width:4px;height:4px;border-radius:50%;background:var(--sf4);margin:0 3px}
.tl{font-size:11px;font-weight:500;flex:1}.tp{font-size:9px;color:var(--ac2);font-family:'JetBrains Mono',monospace;margin-right:4px}
.ts{font-size:9px;color:var(--tx3);font-family:'JetBrains Mono',monospace;margin-right:4px}
.tq{font-size:8px;color:var(--warn);font-weight:600;background:rgba(245,158,11,.1);padding:1px 4px;border-radius:3px;margin-right:4px}
.tj{font-size:8px;color:var(--info);font-weight:600;background:rgba(59,130,246,.1);padding:1px 5px;border-radius:3px}
.tc{font-size:8px;color:var(--tx4);background:var(--sf2);padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace}

/* RIGHT PANEL */
.rpanel{width:300px;background:var(--bg2);border-left:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.rpanel.hidden{display:none}
.rp-hdr{padding:12px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.rp-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--tx2)}
.rp-close{width:26px;height:26px;border-radius:5px;border:none;background:var(--sf);color:var(--tx3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.rp-close:hover{background:var(--sf2);color:var(--tx)}
.rp-body{flex:1;overflow-y:auto;padding:14px}.rp-body::-webkit-scrollbar{width:3px}.rp-body::-webkit-scrollbar-thumb{background:var(--sf3);border-radius:2px}
.rp-acts{padding:10px 14px;border-top:1px solid var(--brd);display:flex;gap:6px}
.rp-btn{flex:1;padding:7px;border-radius:var(--rs);border:none;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer}
.rp-btn.save{background:var(--ac);color:#fff}.rp-btn.save:hover{background:#5558e6}
.rp-btn.cancel{background:var(--sf);color:var(--tx2);border:1px solid var(--brd)}.rp-btn.cancel:hover{background:var(--sf2)}
.field{margin-bottom:12px}
.field-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);font-weight:500;margin-bottom:4px;display:block}
.field-input{width:100%;padding:7px 9px;background:var(--sf);border:1px solid var(--brd);border-radius:var(--rs);color:var(--tx);font-size:11px;font-family:inherit;outline:none}
.field-input:focus{border-color:var(--ac)}.field-input::placeholder{color:var(--tx4)}.field-input.mono{font-family:'JetBrains Mono',monospace}
select.field-input{cursor:pointer}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--sf);border:1px solid var(--brd2);border-radius:14px;padding:22px;width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:4px}.modal-desc{font-size:11px;color:var(--tx2);margin-bottom:18px;line-height:1.5}
.modal-btns{display:flex;gap:6px;justify-content:flex-end;margin-top:18px}
.modal-btn{padding:7px 16px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--sf2);color:var(--tx);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer}
.modal-btn:hover{background:var(--sf3)}.modal-btn.primary{background:var(--ac);border-color:var(--ac);color:#fff}.modal-btn.danger{background:var(--err);border-color:var(--err);color:#fff}

/* REVISIONS */
.rev-item{padding:8px 10px;border-radius:var(--rs);background:var(--sf);border:1px solid var(--brd);margin-bottom:4px}
.rev-hdr{display:flex;justify-content:space-between;margin-bottom:3px}
.rev-tag{font-size:9px;font-weight:600;color:var(--purple);font-family:'JetBrains Mono',monospace}
.rev-time{font-size:9px;color:var(--tx3);font-family:'JetBrains Mono',monospace}
.rev-desc{font-size:10px;color:var(--tx2);line-height:1.4}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;background:var(--sf2);border:1px solid var(--brd2);border-radius:var(--rs);font-size:11px;color:var(--tx);z-index:300;box-shadow:0 4px 24px rgba(0,0,0,.4);animation:ti .3s ease;display:flex;align-items:center;gap:6px}
.toast.success{border-left:3px solid var(--ok)}.toast.error{border-left:3px solid var(--err)}.toast.info{border-left:3px solid var(--info)}
@keyframes ti{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* SEARCH */
.search-bar{display:flex;align-items:center;gap:6px;flex:1;max-width:400px}
.search-bar input{flex:1;padding:5px 9px;background:var(--sf);border:1px solid var(--brd);border-radius:var(--rs);color:var(--tx);font-size:11px;font-family:inherit;outline:none}
.search-bar input:focus{border-color:var(--ac)}
.search-info{font-size:10px;color:var(--tx3);white-space:nowrap}
.tn.search-hit{background:rgba(245,158,11,.12);outline:1px solid rgba(245,158,11,.3)}
.tn.search-hit .tl{color:#f59e0b}
.search-nav-btn{padding:3px 8px;border-radius:4px;border:1px solid var(--brd);background:var(--sf);color:var(--tx2);font-size:10px;cursor:pointer}
.search-nav-btn:hover{background:var(--sf2)}

/* COMPARE */
.cmp-layout{display:flex;height:100%;overflow:hidden}
.cmp-side{flex:1;overflow-y:auto;padding:10px;border-right:1px solid var(--brd)}
.cmp-side:last-child{border-right:none}
.cmp-side-hdr{font-size:11px;font-weight:600;color:var(--tx2);padding:6px 8px;background:var(--sf);border-radius:var(--rs);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cmp-row{display:flex;align-items:center;gap:5px;padding:5px 8px;font-size:11px;border-radius:4px;margin:1px 0}
.cmp-row.added{background:rgba(99,102,241,.1);color:#a5b4fc}
.cmp-row.removed{background:rgba(239,68,68,.1);color:var(--err)}
.cmp-row.match{background:rgba(16,185,129,.1);color:var(--ok2)}
.cmp-row.qty-diff{background:rgba(245,158,11,.12);color:var(--warn)}
.cmp-row.unchanged{color:var(--tx3)}
.cmp-pn{font-size:9px;color:var(--tx3);font-family:'JetBrains Mono',monospace;margin-left:auto}
.cmp-badge{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px}
.cmp-badge.add{background:rgba(16,185,129,.15);color:var(--ok)}
.cmp-badge.rem{background:rgba(239,68,68,.15);color:var(--err)}
.cmp-badge.chg{background:rgba(245,158,11,.15);color:var(--warn)}
.cmp-summary{display:flex;gap:12px;padding:10px 16px;background:var(--sf);border-bottom:1px solid var(--brd);font-size:11px}
.cmp-stat{display:flex;align-items:center;gap:4px}
.cmp-dot{width:8px;height:8px;border-radius:50%}
.cmp-select{padding:5px 9px;background:var(--sf);border:1px solid var(--brd);border-radius:var(--rs);color:var(--tx);font-size:11px;font-family:inherit;outline:none;cursor:pointer}
.cmp-select:focus{border-color:var(--ac)}

/* DRAG & DROP */
.tn.drag-over{border-top:2px solid var(--ac);margin-top:-1px}
.tn.drag-over-into{background:rgba(99,102,241,.15);outline:1px dashed var(--ac)}
.tn.dragging{opacity:.4}
.tn .drag-handle{cursor:grab;color:var(--tx4);font-size:10px;margin-right:2px;opacity:0;transition:opacity .12s}
.tn:hover .drag-handle{opacity:1}

/* MULTI-SELECT & BULK */
.tn.multi-sel{background:rgba(99,102,241,.12);outline:1px solid rgba(99,102,241,.25)}
.bulk-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--ac);color:#fff;font-size:11px;font-weight:500}
.bulk-bar button{padding:4px 10px;border-radius:var(--rs);border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:10px;cursor:pointer;font-family:inherit}
.bulk-bar button:hover{background:rgba(255,255,255,.2)}
.bulk-bar button.danger{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.2)}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:16px}
.dash-card{background:var(--sf);border:1px solid var(--brd);border-radius:var(--r);padding:16px}
.dash-card-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-bottom:8px;font-weight:600}
.dash-big{font-size:28px;font-weight:700;color:var(--tx);margin-bottom:4px}
.dash-sub{font-size:10px;color:var(--tx3)}
.dash-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.dash-bar-label{font-size:10px;color:var(--tx2);width:100px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.dash-bar-track{flex:1;height:6px;background:var(--sf3);border-radius:3px;overflow:hidden}
.dash-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.dash-bar-val{font-size:9px;color:var(--tx3);width:30px;text-align:right;font-family:'JetBrains Mono',monospace}
.dash-list-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:10px;color:var(--tx2);border-bottom:1px solid rgba(255,255,255,.03)}
.dash-list-item:last-child{border:none}
.dash-warn-dot{width:6px;height:6px;border-radius:50%;background:var(--warn);flex-shrink:0}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.2}.empty-title{font-size:15px;font-weight:600;color:var(--tx2);margin-bottom:6px}
.empty-desc{font-size:12px;color:var(--tx3);text-align:center;line-height:1.6;max-width:340px;margin-bottom:16px}

/* EXCEL PREVIEW */
.xlsx-preview{max-height:300px;overflow:auto;border:1px solid var(--brd);border-radius:var(--rs);margin:10px 0}
.xlsx-preview table{width:100%;border-collapse:collapse;font-size:10px}
.xlsx-preview th{background:var(--sf2);padding:5px 8px;text-align:left;font-weight:600;position:sticky;top:0;border-bottom:1px solid var(--brd)}
.xlsx-preview td{padding:4px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-family:'JetBrains Mono',monospace;font-size:9px}
.xlsx-preview tr:hover td{background:var(--sf)}

/* VISUALIZATION */
.viz-container{width:100%;height:100%;position:relative;overflow:hidden;background:var(--bg)}
.viz-container svg{width:100%;height:100%}
.viz-controls{position:absolute;top:12px;right:12px;display:flex;gap:4px;z-index:10}
.viz-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--brd);background:var(--sf);color:var(--tx2);font-size:10px;font-family:inherit;cursor:pointer}
.viz-btn:hover{background:var(--sf2);color:var(--tx)}
.viz-legend{position:absolute;bottom:12px;left:12px;background:var(--sf);border:1px solid var(--brd);border-radius:var(--rs);padding:10px;font-size:9px;color:var(--tx2);z-index:10}
</style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-icon">🔧</span>
  <span class="titlebar-text">BOM MANAGER v2.0</span>
  <span class="titlebar-badge">OFFLINE</span>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Sistemler</div>
      <div class="sidebar-search-wrap">
        <input class="sidebar-search" id="sysSearch" placeholder="Sistem ara..." oninput="filterSystems()">
      </div>
    </div>
    <div class="sys-list" id="sysList"></div>
    <div class="sidebar-footer">
      <button class="sf-btn primary" onclick="showAddSystemModal()">+ Yeni</button>
      <button class="sf-btn" onclick="showImportMenu()">İçe Aktar</button>
    </div>
  </div>

  <div class="main">
    <div id="mainContent" style="display:flex;flex-direction:column;height:100%"></div>
  </div>

  <div class="rpanel hidden" id="rpanel">
    <div class="rp-hdr"><span class="rp-title" id="rpTitle">Detay</span><button class="rp-close" onclick="closeRP()">✕</button></div>
    <div class="rp-body" id="rpBody"></div>
    <div class="rp-acts" id="rpActs"></div>
  </div>
</div>

<div id="modalC"></div>
<div id="toastC"></div>

<script>
// ═══════ STATE ═══════
let S = { systems:[], revisions:[], selSys:null, selNode:null, expanded:{}, tab:"tree", vizMode:"org", compareFilter:null };

const DEFAULT_SYS = [
  { id:"sys-001",name:"Çok Fonksiyonlu Radar Sistemi",type:"Radar",serialNo:"RDR-2026-A0147",status:"Aktif",icon:"📡",revision:"Rev-C",
    children:[
      {id:"ant-001",name:"Anten Alt Sistemi",partNo:"ANT-400",serialNo:"ANT-S-00291",qty:1,jiraKey:"",children:[

        {id:"ae-004",name:"Pedestal",partNo:"PDS-300",serialNo:"PDS-E-00112",qty:1,jiraKey:"",children:[]},
      ]},
      {id:"rcv-001",name:"Alıcı/Verici Alt Sistemi",partNo:"RCV-500",serialNo:"RCV-S-00183",qty:1,jiraKey:"",children:[
        {id:"rc-001",name:"LNA",partNo:"LNA-010",serialNo:"LNA-F-20087",qty:4,jiraKey:"",children:[]},
        {id:"rc-002",name:"SSPA",partNo:"SPA-020",serialNo:"SPA-G-15039",qty:4,jiraKey:"",children:[]},
        {id:"rc-003",name:"Frekans Sentezleyici",partNo:"FSY-030",serialNo:"FSY-H-00441",qty:1,jiraKey:"",children:[]},
      ]},
      {id:"sp-001",name:"Sinyal İşleme",partNo:"SPI-600",serialNo:"SPI-S-00074",qty:1,jiraKey:"",children:[
        {id:"sp-011",name:"FPGA Kartı",partNo:"FPG-100",serialNo:"FPG-K-30112",qty:2,jiraKey:"",children:[]},

// ═══════ HELPERS ═══════
function gid(){return 'id-'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function cnt(n){if(!n.children?.length)return 0;return n.children.reduce((s,c)=>s+1+cnt(c),0)}
function find(nodes,id){for(const n of nodes){if(n.id===id)return n;if(n.children?.length){const f=find(n.children,id);if(f)return f}}return null}
function rm(nodes,id){for(let i=0;i<nodes.length;i++){if(nodes[i].id===id){nodes.splice(i,1);return true}if(nodes[i].children?.length&&rm(nodes[i].children,id))return true}return false}
function stColor(s){return{Aktif:"#10b981",Üretimde:"#f59e0b",Test:"#8b5cf6",Bakımda:"#ef4444",Depo:"#6b7280"}[s]||"#6b7280"}
function toast(m,t="success"){const e=document.createElement("div");e.className=`toast ${t}`;e.textContent=m;document.getElementById("toastC").appendChild(e);setTimeout(()=>e.remove(),3000)}
function addRev(a,d){S.revisions.unshift({id:gid(),timestamp:Date.now(),action:a,detail:d});if(S.revisions.length>200)S.revisions=S.revisions.slice(0,200)}

// ═══════ TREE VIEW ═══════
S.multiSel=[];S.dragId=null;
const TREE_ROW_H = 32; // px per row
const TREE_OVERSCAN = 20; // extra rows above/below viewport

// Build flat visible list from tree
function _buildVisibleRows(nodes, d, out) {
  for (const n of (nodes||[])) {
    out.push({n, d});
    if (S.expanded[n.id] && n.children?.length) _buildVisibleRows(n.children, d+1, out);
  }
}

function _rowHtml(r) {
  const n=r.n, d=r.d;
  const has=n.children?.length>0, op=S.expanded[n.id], sel=S.selNode===n.id;
  const isHit=S.searchHits&&S.searchHits.includes(n.id);
  const isCur=S.searchHits&&S.searchHits[S.searchIdx]===n.id;
  const isMulti=S.multiSel&&S.multiSel.includes(n.id);
  let h=`<div class="tn ${sel?'sel':''} ${isHit?'search-hit':''} ${isMulti?'multi-sel':''}" id="tn-${n.id}" style="padding-left:${10+d*20}px;height:${TREE_ROW_H}px;box-sizing:border-box${isCur?';outline:2px solid #f59e0b;outline-offset:-2px':''}" draggable="true" onclick="selNode(event,'${n.id}')" ondblclick="editNode('${n.id}')" ondragstart="dragStart(event,'${n.id}')" ondragover="dragOver(event,'${n.id}')" ondragleave="dragLeave(event)" ondrop="dropNode(event,'${n.id}')" ondragend="dragEnd(event)">`;
  h+=`<span class="drag-handle">⠿</span>`;
  h+=has?`<span class="ta ${op?'op':''}" onclick="event.stopPropagation();tog('${n.id}')">▶</span>`:`<span class="td"></span>`;
  h+=`<span class="tl">${n.name}</span>`;
  if(n.partNo)h+=`<span class="tp">${n.partNo}</span>`;
  h+=`<span class="ts">${n.serialNo||''}</span>`;
  if(n.qty>1)h+=`<span class="tq">×${n.qty}</span>`;
  if(n.jiraKey)h+=`<span class="tj">${n.jiraKey}</span>`;
  if(has)h+=`<span class="tc">${n.children.length}</span>`;
  h+=`</div>`;
  return h;
}

let _treeRows=[], _treeScrollEl=null;

function _renderTreeViewport() {
  const wrap = document.getElementById('treeVWrap'); if(!wrap)return;
  const scrollTop = wrap.scrollTop;
  const viewH = wrap.clientHeight || window.innerHeight;
  const total = _treeRows.length;
  const startIdx = Math.max(0, Math.floor(scrollTop/TREE_ROW_H) - TREE_OVERSCAN);
  const endIdx = Math.min(total, Math.ceil((scrollTop+viewH)/TREE_ROW_H) + TREE_OVERSCAN);
  const topPad = startIdx * TREE_ROW_H;
  const botPad = (total - endIdx) * TREE_ROW_H;
  const inner = document.getElementById('treeVInner'); if(!inner)return;
  inner.style.paddingTop = topPad+'px';
  inner.style.paddingBottom = botPad+'px';
  let h='';
  for(let i=startIdx;i<endIdx;i++) h+=_rowHtml(_treeRows[i]);
  inner.innerHTML=h;
}

function renderTree(c){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  _treeRows=[];
  _buildVisibleRows(sys.children, 0, _treeRows);
  const total=_treeRows.length;
  const totalH = total * TREE_ROW_H;
  const prevScroll = _treeScrollEl ? _treeScrollEl.scrollTop : 0;
  c.innerHTML=`<div id="treeVWrap" style="flex:1;overflow-y:auto;min-height:0;" onscroll="_renderTreeViewport()"><div id="treeVInner" class="tree" style="min-height:${totalH}px;padding-bottom:24px"></div></div><div style="padding:3px 12px;background:var(--bg2);border-top:1px solid var(--brd);font-size:9px;color:var(--tx4);flex-shrink:0">${total.toLocaleString()} satır gösteriliyor</div>`;
  _treeScrollEl = document.getElementById('treeVWrap');
  if(_treeScrollEl && prevScroll) _treeScrollEl.scrollTop=prevScroll;
  _renderTreeViewport();
  setTimeout(_renderTreeViewport, 0); // layout hesabı sonrası tekrar çiz
  updateSearchInfo();
}
function rnodes(nodes,d){if(!nodes?.length)return"";let h="";for(const n of nodes){const has=n.children?.length>0,op=S.expanded[n.id],sel=S.selNode===n.id;const isHit=S.searchHits&&S.searchHits.includes(n.id);const isCur=S.searchHits&&S.searchHits[S.searchIdx]===n.id;const isMulti=S.multiSel.includes(n.id);h+=`<div class="tn ${sel?'sel':''} ${isHit?'search-hit':''} ${isMulti?'multi-sel':''}" id="tn-${n.id}" style="padding-left:${10+d*20}px" draggable="true" onclick="selNode(event,'${n.id}')" ondblclick="editNode('${n.id}')" ondragstart="dragStart(event,'${n.id}')" ondragover="dragOver(event,'${n.id}')" ondragleave="dragLeave(event)" ondrop="dropNode(event,'${n.id}')" ondragend="dragEnd(event)">`;h+=`<span class="drag-handle">⠿</span>`;h+=has?`<span class="ta ${op?'op':''}" onclick="event.stopPropagation();tog('${n.id}')">▶</span>`:`<span class="td"></span>`;h+=`<span class="tl">${n.name}</span>`;if(n.partNo)h+=`<span class="tp">${n.partNo}</span>`;h+=`<span class="ts">${n.serialNo}</span>`;if(n.qty>1)h+=`<span class="tq">×${n.qty}</span>`;if(n.jiraKey)h+=`<span class="tj">${n.jiraKey}</span>`;if(has)h+=`<span class="tc">${n.children.length}</span>`;h+=`</div>`;if(op&&has)h+=rnodes(n.children,d+1)}return h}

// ═══════ TREE SEARCH ═══════
S.searchQuery='';S.searchHits=[];S.searchIdx=0;
const SEARCH_MAX_EXPAND = 80; // above this: show count but don't expand parents (avoid huge re-render)
let _searchTimer = null;

function searchTree(q) {
  if (_searchTimer) clearTimeout(_searchTimer);
  if (!q || q.length < 2) {
    // Clear immediately, no debounce
    S.searchQuery=''; S.searchHits=[]; S.searchIdx=0;
    renderTab(); return;
  }
  _searchTimer = setTimeout(() => _doSearch(q), 280);
}

function _doSearch(q) {
  S.searchQuery=q; S.searchHits=[]; S.searchIdx=0;
  const sys=S.systems.find(s=>s.id===S.selSys); if(!sys)return;
  const ql=q.toLowerCase();

  // Walk tree, collect hits (fast even at 20k nodes)
  const walkFind=(nodes)=>{for(const n of nodes){
    if((n.name||'').toLowerCase().includes(ql)||(n.partNo||'').toLowerCase().includes(ql)||(n.serialNo||'').toLowerCase().includes(ql)||(n.jiraKey||'').toLowerCase().includes(ql)){S.searchHits.push(n.id)}
    if(n.children?.length)walkFind(n.children);
  }};
  walkFind(sys.children);

  if(S.searchHits.length===0){renderTab();return}

  if(S.searchHits.length<=SEARCH_MAX_EXPAND){
    // Manageable: expand parents so hits are visible
    const hitSet=new Set(S.searchHits);
    const expandParents=(nodes,path)=>{for(const n of nodes){
      const curPath=[...path,n.id];
      if(hitSet.has(n.id)){curPath.slice(0,-1).forEach(id=>{S.expanded[id]=true})}
      if(n.children?.length)expandParents(n.children,curPath);
    }};
    expandParents(sys.children,[]);
    renderTab();
    scrollToHit();
  } else {
    // Too many hits: only update info bar, don't expand/re-render (prevents freeze)
    updateSearchInfo();
    // Apply highlight classes in-place without full re-render
    _applySearchHighlight();
  }
}

function _applySearchHighlight(){
  // Remove old highlights
  document.querySelectorAll('.search-hit').forEach(el=>el.classList.remove('search-hit'));
  // Add to visible hits only
  const hitSet=new Set(S.searchHits);
  hitSet.forEach(id=>{const el=document.getElementById('tn-'+id);if(el)el.classList.add('search-hit')});
  updateSearchInfo();
}

function searchNav(dir){
  if(!S.searchHits.length)return;
  S.searchIdx=(S.searchIdx+dir+S.searchHits.length)%S.searchHits.length;
  // If this hit's parent isn't expanded yet, expand it now (on demand)
  const sys=S.systems.find(s=>s.id===S.selSys);
  if(sys){
    const hitId=S.searchHits[S.searchIdx];
    const expandParents=(nodes,path)=>{for(const n of nodes){
      const curPath=[...path,n.id];
      if(n.id===hitId){curPath.slice(0,-1).forEach(id=>{S.expanded[id]=true});return true}
      if(n.children?.length&&expandParents(n.children,curPath))return true;
    }};
    expandParents(sys.children,[]);
  }
  renderTab(); scrollToHit();
}
function searchKeyNav(e){if(e.key==='Enter'){e.preventDefault();searchNav(e.shiftKey?-1:1)}if(e.key==='Escape'){S.searchQuery='';S.searchHits=[];S.searchIdx=0;renderTab()}}
function scrollToHit(){
  const id=S.searchHits[S.searchIdx];if(!id)return;
  setTimeout(()=>{const el=document.getElementById('tn-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},50);
}
function updateSearchInfo(){
  const el=document.getElementById('searchInfo');if(!el)return;
  if(!S.searchQuery||S.searchQuery.length<2){el.textContent='';return}
  if(S.searchHits.length===0){el.textContent='Sonuç yok';return}
  const over=S.searchHits.length>SEARCH_MAX_EXPAND;
  el.textContent=over?`${S.searchHits.length} sonuç — Enter ile gezin`:`${S.searchIdx+1}/${S.searchHits.length}`;
  el.title=over?'Çok fazla sonuç: parent\'lar otomatik açılmadı, Enter ile tek tek gez':'';
}
function tog(id){S.expanded[id]=!S.expanded[id];renderTab()}
function expandToDepth(maxD){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  const w=(ns,d)=>ns.forEach(n=>{
    S.expanded[n.id]=d<maxD;
    if(n.children?.length)w(n.children,d+1);
  });
  w(sys.children,0);renderTab();
}
function selNode(e,id){
  e.stopPropagation();
  if(e.ctrlKey||e.metaKey){
    // Multi-select with Ctrl+Click
    const idx=S.multiSel.indexOf(id);
    if(idx>=0)S.multiSel.splice(idx,1);else S.multiSel.push(id);
    renderToolbar();renderTab();return;
  }
  S.multiSel=[];S.selNode=id;renderToolbar();renderTab();showNodeRP(id);
}
function clearMultiSel(){S.multiSel=[];renderToolbar();renderTab()}
function expandAll(){const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;const w=ns=>ns.forEach(n=>{if(n.children?.length){S.expanded[n.id]=true;w(n.children)}});w(sys.children);renderTab()}
function collapseAll(){const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;const w=ns=>ns.forEach(n=>{S.expanded[n.id]=false;if(n.children?.length)w(n.children)});w(sys.children);renderTab()}

// ═══════ DRAG & DROP ═══════
function dragStart(e,id){S.dragId=id;e.dataTransfer.effectAllowed='move';e.target.classList.add('dragging')}
function dragOver(e,targetId){
  e.preventDefault();e.stopPropagation();
  if(S.dragId===targetId)return;
  document.querySelectorAll('.drag-over,.drag-over-into').forEach(el=>{el.classList.remove('drag-over','drag-over-into')});
  const el=document.getElementById('tn-'+targetId);if(!el)return;
  const rect=el.getBoundingClientRect();const y=e.clientY-rect.top;
  if(y<rect.height*0.3){el.classList.add('drag-over')}
  else{el.classList.add('drag-over-into')}
}
function dragLeave(e){e.target.classList.remove('drag-over','drag-over-into')}
function dragEnd(e){S.dragId=null;document.querySelectorAll('.dragging,.drag-over,.drag-over-into').forEach(el=>{el.classList.remove('dragging','drag-over','drag-over-into')})}
async function dropNode(e,targetId){
  e.preventDefault();e.stopPropagation();
  if(!S.dragId||S.dragId===targetId)return;
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  // Prevent dropping parent into its own child
  const dragNode=find(sys.children,S.dragId);if(!dragNode)return;
  const isChild=(node,parentId)=>{if(node.id===parentId)return true;if(node.children)for(const c of node.children){if(isChild(c,parentId))return true};return false};
  if(isChild(dragNode,targetId))return;
  const el=document.getElementById('tn-'+targetId);
  const isInto=el&&el.classList.contains('drag-over-into');
  // Remove from old location
  rm(sys.children,S.dragId);
  if(isInto){
    // Drop as child of target
    const target=find(sys.children,targetId);
    if(target){if(!target.children)target.children=[];target.children.push(dragNode);S.expanded[targetId]=true}
  } else {
    // Drop as sibling before target
    const insertBefore=(nodes)=>{for(let i=0;i<nodes.length;i++){if(nodes[i].id===targetId){nodes.splice(i,0,dragNode);return true}if(nodes[i].children?.length&&insertBefore(nodes[i].children))return true}return false};
    insertBefore(sys.children);
  }
  addRev("Taşındı",`${dragNode.name} → ${isInto?'altına':'önüne'}`);
  await persist();S.dragId=null;renderMain();toast("Parça taşındı");
}

// ═══════ ORG CHART VISUALIZATION ═══════
function _orgCountNodes(nodes) {
  let c = nodes ? nodes.length : 0;
  if (nodes) for (const n of nodes) if (n.children?.length) c += _orgCountNodes(n.children);
  return c;
}
function _orgCountDesc(nodes) {
  let c = 0;
  if (!nodes) return 0;
  for (const n of nodes) { c++; if (n.children?.length) c += _orgCountDesc(n.children); }
  return c;
}

function setOrgDepth(d) { S.orgMaxDepth = d; S.orgExpanded = new Set(); S.orgFocusNid = null; renderTab(); }
function orgToggleNode(nid) {
  if (!S.orgExpanded) S.orgExpanded = new Set();
  if (S.orgExpanded.has(nid)) {
    // Collapsing: focus on the parent node
    S.orgExpanded.delete(nid);
    S.orgFocusNid = S._orgParentOf ? S._orgParentOf[nid] : null;
  } else {
    // Expanding: focus on this node's subtree
    S.orgExpanded.add(nid);
    S.orgFocusNid = nid;
  }
  renderTab();
}

function renderOrgChart(container) {
  const sys = S.systems.find(s => s.id === S.selSys);
  if (!sys) return;
  if (!S.orgExpanded) S.orgExpanded = new Set();

  const totalNodes = _orgCountNodes(sys.children) + 1;

  // Default: show first 2 levels, user can expand further
  if (S.orgMaxDepth === undefined || S.orgMaxDepth === null) {
    S.orgMaxDepth = 2;
  }
  const maxD = S.orgMaxDepth;

  const root = { name: sys.name, partNo: "", serialNo: sys.serialNo, children: sys.children, _isRoot: true, id: 'org-root' };
  // Yukarıdan aşağıya layout: x = yatay konum, y = derinlik * satır yüksekliği
  const nodeW = 200, nodeH = 56, gapX = 20, gapY = 60;
  const positions = [];
  const parentMap = {};
  let maxX = 0, maxY = 0;

  function layoutTree(node, depth, parentNid) {
    const nid = node.id || ('org-' + positions.length);
    node._oid = nid;
    if (parentNid) parentMap[nid] = parentNid;
    const manuallyExpanded = S.orgExpanded.has(nid);
    const atLimit = depth >= maxD && node.children?.length > 0 && !manuallyExpanded;
    const y = depth * (nodeH + gapY);
    if (y + nodeH > maxY) maxY = y + nodeH;

    if (!node.children?.length || atLimit) {
      const x = maxX; maxX += nodeW + gapX;
      positions.push({ node, nid, parentNid, x, y, w: nodeW, h: nodeH, collapsed: atLimit, descCount: atLimit ? _orgCountDesc(node.children) : 0 });
      return { mid: x + nodeW / 2, left: x, right: x + nodeW };
    }
    const cp = node.children.map(c => layoutTree(c, depth + 1, nid));
    const left = Math.min(...cp.map(c => c.left)), right = Math.max(...cp.map(c => c.right));
    const cx = (left + right) / 2 - nodeW / 2;
    positions.push({ node, nid, parentNid, x: cx, y, w: nodeW, h: nodeH, childMids: cp.map(c => c.mid), childY: y + nodeH, collapsed: false, descCount: 0, canCollapse: manuallyExpanded });
    return { mid: cx + nodeW / 2, left, right };
  }
  layoutTree(root, 0, null);
  S._orgParentOf = parentMap;
  window._orgPositions = positions;

  const renderedNodes = positions.length;
  const pad = 60;
  const svgW = maxX + pad * 2, svgH = maxY + pad * 2 + gapY;

  // Derinlik renk paleti — her seviye için dolgu ve kontur rengi
  const DEPTH_COLORS = [
    {fill:'#1e1b4b',stroke:'#818cf8'},  // 0 - kök (indigo)
    {fill:'#1a2744',stroke:'#38bdf8'},  // 1 - mavi
    {fill:'#14342b',stroke:'#34d399'},  // 2 - yeşil
    {fill:'#2d1b4e',stroke:'#a78bfa'},  // 3 - mor
    {fill:'#1e3a2f',stroke:'#6ee7b7'},  // 4 - açık yeşil
    {fill:'#312010',stroke:'#fbbf24'},  // 5 - turuncu
    {fill:'#1e2d40',stroke:'#60a5fa'},  // 6 - açık mavi
    {fill:'#3b1f28',stroke:'#f87171'},  // 7 - kırmızı
    {fill:'#1f3040',stroke:'#7dd3fc'},  // 8
    {fill:'#2a2010',stroke:'#fcd34d'},  // 9
  ];
  function depthColor(d) { return DEPTH_COLORS[d % DEPTH_COLORS.length]; }

  // Derinlik hesabı: nid → depth (positions'dan)
  const nidDepth = {};
  positions.forEach(p => { const d = Math.round(p.y / (nodeH + gapY)); nidDepth[p.nid] = d; });

  let inner = '';
  inner += `<defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowHover"><feGaussianBlur stdDeviation="6" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient>
  </defs>`;

  // Edges — yukarıdan aşağıya, derinlik renkli
  for (const p of positions) {
    if (p.childMids) {
      const d = nidDepth[p.nid] || 0;
      const ec = depthColor(d+1).stroke;
      const fx = p.x + p.w / 2, fy = p.y + p.h;  // çıkış: alt orta
      const my = p.childY + (gapY / 2) - (gapY / 4); // yatay hat y konumu
      const edgeNid = p.nid;
      // Ebeveynden yatay hatta dikey çizgi
      inner += `<path class="org-edge" data-pnid="${edgeNid}" d="M${fx},${fy} V${my}" fill="none" stroke="${ec}" stroke-width="1.5" opacity="0.5"/>`;
      // Yatay hat: tüm çocukları birleştiren
      if (p.childMids.length > 1) {
        const leftX = Math.min(...p.childMids), rightX = Math.max(...p.childMids);
        inner += `<line class="org-edge" data-pnid="${edgeNid}" x1="${leftX}" y1="${my}" x2="${rightX}" y2="${my}" stroke="${ec}" stroke-width="1.5" opacity="0.5"/>`;
      }
      // Yatay hattan her çocuğa dikey çizgi
      for (const mid of p.childMids) {
        inner += `<path class="org-edge" data-pnid="${edgeNid}" d="M${mid},${my} V${p.childY}" fill="none" stroke="${ec}" stroke-width="1.5" opacity="0.5"/>`;
      }
    }
  }

  // Nodes
  for (const p of positions) {
    const isR = p.node._isRoot;
    if (p.collapsed) {
      // Clickable collapsed node
      inner += `<g data-nid="${p.nid}" style="cursor:pointer" onclick="orgToggleNode('${p.nid}')">
        <rect x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" rx="10" fill="#151520" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.85"/>
        <rect x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" rx="10" fill="transparent"/>
        <text x="${p.x+p.w/2}" y="${p.y+18}" text-anchor="middle" fill="#9090c0" font-size="11" font-weight="600" font-family="IBM Plex Sans,sans-serif">${truncate(p.node.name,22)}</text>
        <text x="${p.x+p.w/2}" y="${p.y+34}" text-anchor="middle" fill="#6366f1" font-size="11" font-weight="700" font-family="IBM Plex Sans,sans-serif">▶ ${p.descCount} parça</text>
        <text x="${p.x+p.w/2}" y="${p.y+49}" text-anchor="middle" fill="#5555aa" font-size="9" font-family="IBM Plex Sans,sans-serif">tıkla: aç</text>
      </g>`;
    } else {
      const d = nidDepth[p.nid] || 0;
      const dc = depthColor(d);
      const fill = isR ? 'url(#rootGrad)' : dc.fill;
      const stroke = isR ? '#818cf8' : p.canCollapse ? '#10b981' : dc.stroke;
      const tc = '#e5e3df';
      const sc = dc.stroke;
      const sc2 = dc.stroke + '99';
      const clickAttr = p.canCollapse ? `onclick="orgToggleNode('${p.nid}')"` : '';
      const descCount = _orgCountDesc(p.node.children);
      const tooltip = `${p.node.name}${p.node.partNo?' | '+p.node.partNo:''}${descCount?' | '+descCount+' alt parça':''}${p.node.qty>1?' | ×'+p.node.qty:''}`;
      inner += `<g class="org-node" data-nid="${p.nid}" style="cursor:${p.canCollapse?'pointer':'default'}" ${clickAttr}
        onmouseenter="orgHoverNode('${p.nid}',true,'${tooltip.replace(/'/g,'&#39;')}')"
        onmouseleave="orgHoverNode('${p.nid}',false,'')">`;
      inner += `<rect class="org-node-rect" data-nid="${p.nid}" x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}" rx="8" fill="${fill}" stroke="${stroke}" stroke-width="1.5" ${isR?'filter="url(#glow)"':''}/>`;
      inner += `<text x="${p.x+p.w/2}" y="${p.y+20}" text-anchor="middle" fill="${tc}" font-size="12" font-weight="600" font-family="IBM Plex Sans,sans-serif">${truncate(p.node.name,22)}</text>`;
      if (p.node.partNo) inner += `<text x="${p.x+p.w/2}" y="${p.y+35}" text-anchor="middle" fill="${sc}" font-size="10" font-family="JetBrains Mono,monospace">${p.node.partNo}</text>`;
      inner += `<text x="${p.x+p.w/2}" y="${p.y+49}" text-anchor="middle" fill="${sc2}" font-size="9" font-family="JetBrains Mono,monospace">${p.node.serialNo||''}</text>`;
      if (p.node.qty > 1) {
        inner += `<rect x="${p.x+p.w-30}" y="${p.y-8}" width="34" height="16" rx="8" fill="#f59e0b" opacity="0.9"/>`;
        inner += `<text x="${p.x+p.w-13}" y="${p.y+4}" text-anchor="middle" fill="#000" font-size="9" font-weight="700" font-family="JetBrains Mono,monospace">×${p.node.qty}</text>`;
      }
      if (p.canCollapse) {
        inner += `<text x="${p.x+p.w/2}" y="${p.y+p.h-3}" text-anchor="middle" fill="#10b981" font-size="8" font-family="IBM Plex Sans,sans-serif">kapat</text>`;
      }
      inner += `</g>`;
    }
  }

  const depthOpts = [...Array.from({length:21},(_,i)=>i+1),99].map(d => {
    const lbl = d===99?'Tümü':`${d}`;
    const act = maxD===d?'background:var(--ac);color:#fff;border-color:var(--ac)':'';
    return `<button class="viz-btn" style="min-width:24px;padding:3px 5px;font-size:10px;${act}" onclick="setOrgDepth(${d})">${lbl}</button>`;
  }).join('');

  container.innerHTML = `<div class="viz-container" id="orgVizC">
    <svg id="orgSvg" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <g id="orgG">${inner}</g>
    </svg>
    <div style="position:absolute;top:12px;left:12px;background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:10px;color:var(--tx3);z-index:10;display:flex;flex-direction:column;gap:6px">
      <div>🖱 Scroll: Zoom &nbsp;|&nbsp; Sürükle: Gezin &nbsp;|&nbsp; Düğüme tıkla: aç/kapat</div>
      <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
        <span style="color:var(--tx4)">Tüm derinlik:</span>
        ${depthOpts}
      </div>
      <div style="color:var(--tx4);font-size:9px">${renderedNodes} gösteriliyor / ${totalNodes} toplam</div>
    </div>
    <div style="position:absolute;bottom:12px;right:12px;display:flex;gap:4px;z-index:10">
      <button class="viz-btn" onclick="orgZoom(1.3)">＋</button>
      <button class="viz-btn" onclick="orgZoom(0.7)">−</button>
      <button class="viz-btn" onclick="orgFit()">Sığdır</button>
    </div>
  </div>`;

  // Preserve pan/zoom if we already had a view, otherwise init
  const prevViz = window._orgViz;
  window._orgViz = {
    scale: prevViz ? prevViz.scale : 1,
    tx: prevViz ? prevViz.tx : 0,
    ty: prevViz ? prevViz.ty : 0,
    dragging: false, lastX: 0, lastY: 0, svgW, svgH
  };

  if (S.orgFocusNid) {
    _orgZoomToSubtree(S.orgFocusNid, positions);
    S.orgFocusNid = null;
  } else if (!prevViz) {
    orgFit();
  } else {
    applyOrgTransform();
  }

  // Re-apply search highlights after re-render
  if (S.orgSearchHits?.length) {
    requestAnimationFrame(() => _orgHighlightApply());
  }

  // Tooltip elementi
  if (!document.getElementById('orgTooltip')) {
    const tt = document.createElement('div');
    tt.id = 'orgTooltip';
    tt.style.cssText = 'position:fixed;background:#1e1e2a;border:1px solid #3a3a55;border-radius:7px;padding:6px 10px;font-size:11px;color:#e5e3df;pointer-events:none;z-index:9999;display:none;max-width:260px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.5)';
    document.body.appendChild(tt);
  }

  window.orgHoverNode = function(nid, enter, tooltipText) {
    const svg = document.getElementById('orgSvg'); if (!svg) return;
    const tt = document.getElementById('orgTooltip');

    if (!enter) {
      // Tüm node'ları normale döndür
      svg.querySelectorAll('.org-node-rect').forEach(el => {
        el.style.opacity = ''; el.style.filter = '';
      });
      svg.querySelectorAll('.org-edge').forEach(el => {
        el.style.opacity = '0.5'; el.style.strokeWidth = '';
      });
      if (tt) tt.style.display = 'none';
      return;
    }

    // Hover tooltip
    if (tt && tooltipText) {
      tt.textContent = tooltipText;
      tt.style.display = 'block';
      document.addEventListener('mousemove', _orgMoveTooltip);
    }

    // Ata zincirini bul (nid → kök)
    const ancestors = new Set();
    let cur = nid;
    while (cur) { ancestors.add(cur); cur = S._orgParentOf?.[cur]; }

    // Tüm node'ları soluklaştır, ata zincirini parlat
    svg.querySelectorAll('.org-node-rect').forEach(el => {
      const n = el.dataset.nid;
      if (ancestors.has(n)) {
        el.style.opacity = '1';
        el.style.filter = 'url(#glowHover)';
      } else {
        el.style.opacity = '0.2';
        el.style.filter = '';
      }
    });

    // Edge'leri de ata zincirine göre vurgula
    svg.querySelectorAll('.org-edge').forEach(el => {
      const pnid = el.dataset.pnid;
      if (ancestors.has(pnid)) {
        el.style.opacity = '1';
        el.style.strokeWidth = '2.5';
      } else {
        el.style.opacity = '0.08';
      }
    });
  };

  function _orgMoveTooltip(e) {
    const tt = document.getElementById('orgTooltip'); if (!tt) return;
    if (tt.style.display === 'none') { document.removeEventListener('mousemove', _orgMoveTooltip); return; }
    tt.style.left = (e.clientX + 14) + 'px';
    tt.style.top = (e.clientY - 10) + 'px';
  }

  const svg = document.getElementById('orgSvg');
  svg.addEventListener('wheel', function(e) {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 0.88;
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const v = window._orgViz;
    const newScale = Math.max(0.05, Math.min(5, v.scale * factor));
    v.tx = mx - (mx - v.tx) * (newScale / v.scale);
    v.ty = my - (my - v.ty) * (newScale / v.scale);
    v.scale = newScale;
    applyOrgTransform();
  }, { passive: false });
  svg.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    const v = window._orgViz; v.dragging = true; v.lastX = e.clientX; v.lastY = e.clientY;
    svg.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', function(e) {
    const v = window._orgViz; if (!v || !v.dragging) return;
    v.tx += e.clientX - v.lastX; v.ty += e.clientY - v.lastY;
    v.lastX = e.clientX; v.lastY = e.clientY;
    applyOrgTransform();
  });
  window.addEventListener('mouseup', function() {
    const v = window._orgViz; if (v) v.dragging = false;
    const svg = document.getElementById('orgSvg'); if (svg) svg.style.cursor = 'grab';
  });
  svg.style.cursor = 'grab';
}

function applyOrgTransform() {
  const g = document.getElementById('orgG'); if (!g) return;
  const v = window._orgViz;
  g.setAttribute('transform', `translate(${v.tx},${v.ty}) scale(${v.scale})`);
}

function orgZoom(factor) {
  const v = window._orgViz; if (!v) return;
  const svg = document.getElementById('orgSvg'); if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const newScale = Math.max(0.1, Math.min(5, v.scale * factor));
  v.tx = cx - (cx - v.tx) * (newScale / v.scale);
  v.ty = cy - (cy - v.ty) * (newScale / v.scale);
  v.scale = newScale;
  applyOrgTransform();
}

function orgFit() {
  const v = window._orgViz; if (!v) return;
  const svg = document.getElementById('orgSvg'); if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const scaleX = rect.width / (v.svgW + 100), scaleY = rect.height / (v.svgH + 100);
  v.scale = Math.min(scaleX, scaleY, 1.2);
  v.tx = (rect.width - v.svgW * v.scale) / 2;
  v.ty = (rect.height - v.svgH * v.scale) / 2 + 20;
  applyOrgTransform();
}

function _orgZoomToSubtree(focusNid, positions) {
  const v = window._orgViz; if (!v) return;
  const svg = document.getElementById('orgSvg'); if (!svg) return;

  // Build nid→position map and children map
  const posMap = {};
  positions.forEach(p => posMap[p.nid] = p);
  const childrenOf = {};
  positions.forEach(p => {
    if (p.parentNid) {
      if (!childrenOf[p.parentNid]) childrenOf[p.parentNid] = [];
      childrenOf[p.parentNid].push(p.nid);
    }
  });

  // Collect all positions in the subtree rooted at focusNid
  const subtree = [];
  const walk = nid => {
    if (posMap[nid]) subtree.push(posMap[nid]);
    (childrenOf[nid] || []).forEach(walk);
  };
  walk(focusNid);

  if (!subtree.length) { applyOrgTransform(); return; }

  // Bounding box of subtree with padding
  const pad = 60;
  const minX = Math.min(...subtree.map(p => p.x)) - pad;
  const maxX = Math.max(...subtree.map(p => p.x + p.w)) + pad;
  const minY = Math.min(...subtree.map(p => p.y)) - pad;
  const maxY = Math.max(...subtree.map(p => p.y + p.h)) + pad;
  const bW = maxX - minX, bH = maxY - minY;

  const rect = svg.getBoundingClientRect();
  const sx = rect.width / bW, sy = rect.height / bH;
  v.scale = Math.min(sx, sy, 1.6); // max zoom 1.6x so labels are readable
  v.tx = rect.width / 2 - (minX + bW / 2) * v.scale;
  v.ty = rect.height / 2 - (minY + bH / 2) * v.scale;
  applyOrgTransform();
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

// ═══════ ORG CHART SEARCH ═══════
let _orgSearchTimer = null;
S.orgSearch = ''; S.orgSearchHits = []; S.orgSearchIdx = 0;

function orgSearchInput(q) {
  S.orgSearch = q;
  if (_orgSearchTimer) clearTimeout(_orgSearchTimer);
  if (!q || q.length < 2) {
    S.orgSearchHits = []; S.orgSearchIdx = 0;
    _orgHighlightApply(); _updateOrgSearchInfo(); return;
  }
  _orgSearchTimer = setTimeout(() => _doOrgSearch(q), 250);
}

function _doOrgSearch(q) {
  const sys = S.systems.find(s => s.id === S.selSys); if (!sys) return;
  const ql = q.toLowerCase();

  // Walk raw BOM tree, collect hit node IDs + all ancestor IDs
  const hitIds = []; // actual node.id values of matches
  const ancestorIds = new Set(); // ancestors to expand

  const walk = (nodes, ancestors) => {
    for (const n of nodes) {
      const curPath = [...ancestors, n.id];
      const matches = (n.name||'').toLowerCase().includes(ql)
        || (n.partNo||'').toLowerCase().includes(ql)
        || (n.serialNo||'').toLowerCase().includes(ql)
        || (n.jiraKey||'').toLowerCase().includes(ql);
      if (matches) {
        hitIds.push(n.id);
        // All ancestors must be expanded so this node is visible
        ancestors.forEach(id => ancestorIds.add(id));
      }
      if (n.children?.length) walk(n.children, curPath);
    }
  };
  if ((sys.name||'').toLowerCase().includes(ql)) hitIds.push('org-root');
  walk(sys.children, ['org-root']);

  if (hitIds.length === 0) {
    S.orgSearchHits = []; S.orgSearchIdx = 0;
    _orgHighlightApply(); _updateOrgSearchInfo(); return;
  }

  // Expand all ancestors so hits become visible, then re-render
  if (!S.orgExpanded) S.orgExpanded = new Set();
  let needRerender = false;
  ancestorIds.forEach(id => {
    if (!S.orgExpanded.has(id)) { S.orgExpanded.add(id); needRerender = true; }
  });

  // After render, _oid values are assigned — map node.id → _oid via positions
  const afterRender = () => {
    const positions = window._orgPositions || [];
    // Build id→nid map
    const idToNid = {};
    positions.forEach(p => { if (p.node.id) idToNid[p.node.id] = p.nid; });
    idToNid['org-root'] = 'org-root';

    S.orgSearchHits = hitIds.map(id => idToNid[id] || id).filter(Boolean);
    S.orgSearchIdx = 0;
    _orgHighlightApply();
    _updateOrgSearchInfo();
    if (S.orgSearchHits.length > 0) _orgZoomToHits(S.orgSearchHits);
  };

  if (needRerender) {
    renderTab(); // re-render with expanded ancestors
    requestAnimationFrame(afterRender);
  } else {
    afterRender();
  }
}

function _orgHighlightApply() {
  // Remove old highlights
  document.querySelectorAll('#orgG .org-hit').forEach(el => {
    el.querySelector('rect')?.setAttribute('stroke', el.dataset.origStroke || '#2e2e34');
    el.classList.remove('org-hit');
  });
  document.querySelectorAll('#orgG .org-hit-cur').forEach(el => el.classList.remove('org-hit-cur'));

  if (!S.orgSearchHits?.length) return;
  const hitSet = new Set(S.orgSearchHits);
  const curId = S.orgSearchHits[S.orgSearchIdx];

  document.querySelectorAll('#orgG [data-nid]').forEach(el => {
    const nid = el.dataset.nid;
    if (hitSet.has(nid)) {
      el.classList.add('org-hit');
      const rect = el.querySelector('rect');
      if (rect) { el.dataset.origStroke = rect.getAttribute('stroke'); rect.setAttribute('stroke', nid === curId ? '#f59e0b' : '#10b981'); rect.setAttribute('stroke-width', '2.5'); }
    }
  });
}

function _updateOrgSearchInfo() {
  const el = document.getElementById('orgSearchInfo'); if (!el) return;
  if (!S.orgSearchHits?.length) {
    el.textContent = S.orgSearch?.length >= 2 ? 'Sonuç yok' : '';
  } else {
    el.textContent = `${S.orgSearchIdx+1}/${S.orgSearchHits.length}`;
  }
}

function _orgZoomToHits(hits) {
  if (!window._orgViz) return;
  const positions = window._orgPositions; if (!positions) return;
  const hitSet = new Set(hits);
  const sub = positions.filter(p => hitSet.has(p.nid));
  if (!sub.length) return;
  const pad = 80;
  const minX = Math.min(...sub.map(p=>p.x))-pad, maxX = Math.max(...sub.map(p=>p.x+p.w))+pad;
  const minY = Math.min(...sub.map(p=>p.y))-pad, maxY = Math.max(...sub.map(p=>p.y+p.h))+pad;
  const bW = maxX-minX, bH = maxY-minY;
  const svg = document.getElementById('orgSvg'); if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const v = window._orgViz;
  v.scale = Math.min(rect.width/bW, rect.height/bH, 1.8);
  v.tx = rect.width/2 - (minX+bW/2)*v.scale;
  v.ty = rect.height/2 - (minY+bH/2)*v.scale;
  applyOrgTransform();
}

function orgSearchNav(dir) {
  if (!S.orgSearchHits?.length) return;
  S.orgSearchIdx = (S.orgSearchIdx + dir + S.orgSearchHits.length) % S.orgSearchHits.length;
  _orgHighlightApply(); _updateOrgSearchInfo();
  const positions = window._orgPositions; if (!positions) return;
  const curId = S.orgSearchHits[S.orgSearchIdx];
  const p = positions.find(p => p.nid === curId);
  if (!p) return;
  const svg = document.getElementById('orgSvg'); if (!svg) return;
  const rect = svg.getBoundingClientRect();
  const v = window._orgViz;
  const pad = 120;
  v.scale = Math.min(rect.width/(p.w+pad*2), rect.height/(p.h+pad*2), 1.8);
  v.tx = rect.width/2 - (p.x+p.w/2)*v.scale;
  v.ty = rect.height/2 - (p.y+p.h/2)*v.scale;
  applyOrgTransform();
}

function orgSearchKeyNav(e) {
  if (e.key==='Enter') { e.preventDefault(); orgSearchNav(e.shiftKey?-1:1); }
  if (e.key==='Escape') orgSearchClear();
}

function orgSearchClear() {
  S.orgSearch=''; S.orgSearchHits=[]; S.orgSearchIdx=0;
  _orgHighlightApply(); renderToolbar();
}

// ═══════ FORCE GRAPH VISUALIZATION ═══════
const GRAPH_SVG_LIMIT = 250; // above this → canvas mode
const depthColors = ['#6366f1', '#10b981', '#f59e0b', '#ec4899', '#3b82f6', '#8b5cf6'];

function renderForceGraph(container) {
  const sys = S.systems.find(s => s.id === S.selSys);
  if (!sys) return;

  // Collect all nodes
  const allNodes = [], allLinks = [];
  function walk(node, parentId, depth) {
    const id = node.id || ('n-' + allNodes.length);
    node._fid = id;
    allNodes.push({ id, name: node.name, partNo: node.partNo, depth, qty: node.qty, children: node.children });
    if (parentId) allLinks.push({ source: parentId, target: id });
    if (node.children) node.children.forEach(c => walk(c, id, depth + 1));
  }
  const rootId = 'root-' + sys.id;
  allNodes.push({ id: rootId, name: sys.name, partNo: '', depth: 0, qty: 1, children: sys.children });
  sys.children.forEach(c => walk(c, rootId, 1));

  if (allNodes.length <= GRAPH_SVG_LIMIT) {
    _renderForceGraphSVG(container, allNodes, allLinks);
  } else {
    _renderForceGraphCanvas(container, allNodes, allLinks);
  }
}

// ── Small graph: SVG force simulation (unchanged logic, optimized iterations) ──
function _renderForceGraphSVG(container, nodes, links) {
  // Give nodes initial positions
  nodes.forEach(n => { n.x = 500 + (Math.random()-0.5)*400; n.y = 400 + (Math.random()-0.5)*300; n.vx=0; n.vy=0; });

  // Build lookup map for link resolve
  const byId = {}; nodes.forEach(n => byId[n.id] = n);

  const iters = Math.min(300, Math.max(80, 15000 / nodes.length));
  for (let iter = 0; iter < iters; iter++) {
    // Repulsion (O(n²) but n is small here)
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        let dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y;
        let d=Math.sqrt(dx*dx+dy*dy)||1, f=1200/(d*d);
        let fx=dx/d*f, fy=dy/d*f;
        nodes[i].vx-=fx; nodes[i].vy-=fy; nodes[j].vx+=fx; nodes[j].vy+=fy;
      }
    }
    for (const l of links) {
      const s=byId[l.source], t=byId[l.target]; if(!s||!t) continue;
      let dx=t.x-s.x, dy=t.y-s.y, d=Math.sqrt(dx*dx+dy*dy)||1, f=(d-120)*0.015;
      s.vx+=dx/d*f; s.vy+=dy/d*f; t.vx-=dx/d*f; t.vy-=dy/d*f;
    }
    for (const n of nodes) {
      n.vx+=(500-n.x)*0.001; n.vy+=(400-n.y)*0.001;
      n.vx*=0.85; n.vy*=0.85; n.x+=n.vx; n.y+=n.vy;
    }
  }

  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for(const n of nodes){if(n.x<minX)minX=n.x;if(n.x>maxX)maxX=n.x;if(n.y<minY)minY=n.y;if(n.y>maxY)maxY=n.y}
  const gW=maxX-minX+200, gH=maxY-minY+200;

  let inner=`<defs><filter id="glow2"><feGaussianBlur stdDeviation="5" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowhead" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="6" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#444"/></marker></defs>`;

  const byId2={}; nodes.forEach(n=>byId2[n.id]=n);
  for(const l of links){const s=byId2[l.source],t=byId2[l.target];if(!s||!t)continue;inner+=`<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>`;}
  for(const n of nodes){
    const r=n.depth===0?32:Math.max(14,22-n.depth*3);
    const col=depthColors[n.depth%depthColors.length];
    inner+=`<circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${col}" opacity="0.9" stroke="${col}" stroke-width="3" stroke-opacity="0.25" ${n.depth===0?'filter="url(#glow2)"':''}/>`;
    inner+=`<text x="${n.x}" y="${n.y+r+16}" text-anchor="middle" fill="#aaa" font-size="${n.depth===0?13:11}" font-weight="500" font-family="IBM Plex Sans,sans-serif">${truncate(n.name,20)}</text>`;
    if(n.partNo) inner+=`<text x="${n.x}" y="${n.y+r+30}" text-anchor="middle" fill="#666" font-size="9" font-family="JetBrains Mono,monospace">${n.partNo}</text>`;
  }

  container.innerHTML=`<div class="viz-container" id="graphVizC">
    <svg id="graphSvg" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><g id="graphG">${inner}</g></svg>
    <div class="viz-legend" style="position:absolute;bottom:12px;left:12px">
      <div style="font-weight:600;margin-bottom:4px;color:#aaa">Seviye</div>
      ${depthColors.slice(0,4).map((c,i)=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px"><div style="width:8px;height:8px;border-radius:50%;background:${c}"></div><span>${['Sistem','Alt Sistem','Bileşen','Parça'][i]}</span></div>`).join('')}
    </div>
    <div style="position:absolute;bottom:12px;right:12px;display:flex;gap:4px;z-index:10">
      <button class="viz-btn" onclick="graphZoom(1.3)">＋</button>
      <button class="viz-btn" onclick="graphZoom(0.7)">−</button>
      <button class="viz-btn" onclick="graphFit()">Sığdır</button>
    </div>
    <div style="position:absolute;top:12px;left:12px;background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:10px;color:var(--tx3);z-index:10">
      🖱 Scroll: Zoom &nbsp;|&nbsp; Sürükle: Gezin &nbsp;|&nbsp; ${nodes.length} düğüm
    </div>
  </div>`;

  window._graphViz={scale:1,tx:0,ty:0,dragging:false,lastX:0,lastY:0,gW,gH,cX:(minX+maxX)/2,cY:(minY+maxY)/2};
  graphFit();
  _attachGraphEvents(document.getElementById('graphSvg'), false);
}

// ── Large graph: Canvas-based radial clustered view ──
function _renderForceGraphCanvas(container, allNodes, allLinks) {
  // Build cluster nodes: group by depth 0-2, aggregate deeper nodes into their depth-2 ancestor
  const MAX_SHOW_DEPTH = 2;
  const clusterNodes = allNodes.filter(n => n.depth <= MAX_SHOW_DEPTH);
  const clusterLinks = allLinks.filter(l => {
    const sn = allNodes.find(n=>n.id===l.source), tn = allNodes.find(n=>n.id===l.target);
    return sn && tn && sn.depth <= MAX_SHOW_DEPTH && tn.depth <= MAX_SHOW_DEPTH;
  });

  // Count hidden descendants for each cluster node
  const descCount = {};
  clusterNodes.forEach(n => { descCount[n.id] = 0; });
  allNodes.forEach(n => {
    if (n.depth <= MAX_SHOW_DEPTH) return;
    // Find its deepest ancestor within MAX_SHOW_DEPTH
    // We'll do this by walking allLinks upward
    // Quick approach: mark ancestors during walk
  });
  // Better: count via tree walk
  function countHidden(node, depth) {
    if (!node.children) return 0;
    let cnt = 0;
    for (const c of node.children) {
      if (depth + 1 > MAX_SHOW_DEPTH) { cnt++; cnt += countHidden(c, depth+1); }
      else cnt += countHidden(c, depth+1);
    }
    return cnt;
  }
  clusterNodes.forEach(n => { descCount[n.id] = countHidden(n, n.depth); });

  // Radial layout by depth
  const CX = 600, CY = 450;
  const radii = [0, 200, 420];
  const byDepth = [[], [], []];
  clusterNodes.forEach(n => byDepth[Math.min(n.depth, MAX_SHOW_DEPTH)].push(n));

  byDepth[0].forEach(n => { n.cx = CX; n.cy = CY; });
  byDepth[1].forEach((n, i, arr) => {
    const angle = (2 * Math.PI * i / arr.length) - Math.PI/2;
    n.cx = CX + radii[1] * Math.cos(angle);
    n.cy = CY + radii[1] * Math.sin(angle);
  });
  byDepth[2].forEach((n, i, arr) => {
    const angle = (2 * Math.PI * i / arr.length) - Math.PI/2;
    n.cx = CX + radii[2] * Math.cos(angle);
    n.cy = CY + radii[2] * Math.sin(angle);
  });

  // Find bounds
  let minX=CX-500, maxX=CX+500, minY=CY-500, maxY=CY+500;
  clusterNodes.forEach(n=>{if(n.cx-60<minX)minX=n.cx-60;if(n.cx+60>maxX)maxX=n.cx+60;if(n.cy-60<minY)minY=n.cy-60;if(n.cy+60>maxY)maxY=n.cy+60;});
  const gW=maxX-minX+100, gH=maxY-minY+100;

  const hiddenCount = allNodes.length - clusterNodes.length;

  container.innerHTML=`<div class="viz-container" id="graphVizC" style="position:relative">
    <canvas id="graphCanvas" style="width:100%;height:100%;display:block"></canvas>
    <div style="position:absolute;top:12px;left:12px;background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:8px 12px;font-size:10px;color:var(--tx3);z-index:10;max-width:260px">
      <div style="margin-bottom:4px">🖱 Scroll: Zoom &nbsp;|&nbsp; Sürükle: Gezin</div>
      <div style="color:var(--warn);margin-bottom:3px">⚡ Büyük BOM: ${allNodes.length} düğüm</div>
      <div style="color:var(--tx4)">İlk ${MAX_SHOW_DEPTH+1} seviye gösteriliyor. Gizlenen: <b style="color:var(--ac2)">${hiddenCount}</b> parça</div>
    </div>
    <div class="viz-legend" style="position:absolute;bottom:12px;left:12px">
      <div style="font-weight:600;margin-bottom:4px;color:#aaa">Seviye</div>
      ${depthColors.slice(0,MAX_SHOW_DEPTH+1).map((c,i)=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px"><div style="width:8px;height:8px;border-radius:50%;background:${c}"></div><span>${['Sistem','Alt Sistem','Bileşen'][i]}</span></div>`).join('')}
      <div style="display:flex;align-items:center;gap:5px;margin-top:4px;padding-top:4px;border-top:1px solid #333"><div style="width:8px;height:8px;border-radius:50%;border:2px dashed #555"></div><span style="color:#555">Gizlenen parçalar</span></div>
    </div>
    <div style="position:absolute;bottom:12px;right:12px;display:flex;gap:4px;z-index:10">
      <button class="viz-btn" onclick="graphZoom(1.3)">＋</button>
      <button class="viz-btn" onclick="graphZoom(0.7)">−</button>
      <button class="viz-btn" onclick="graphFit()">Sığdır</button>
    </div>
  </div>`;

  const canvas = document.getElementById('graphCanvas');
  const vizC = document.getElementById('graphVizC');
  const dpr = window.devicePixelRatio || 1;

  function resizeCanvas() {
    const rect = vizC.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    drawGraph();
  }

  window._graphViz = { scale:1, tx:0, ty:0, dragging:false, lastX:0, lastY:0, gW, gH, cX:(minX+maxX)/2, cY:(minY+maxY)/2 };
  window._graphCanvas = { canvas, clusterNodes, clusterLinks, descCount, dpr };

  function drawGraph() {
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const v = window._graphViz;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.scale(dpr * v.scale, dpr * v.scale);
    ctx.translate(v.tx / v.scale, v.ty / v.scale);

    // Draw edges
    ctx.globalAlpha = 0.35;
    for (const l of clusterLinks) {
      const sn = clusterNodes.find(n=>n.id===l.source), tn = clusterNodes.find(n=>n.id===l.target);
      if (!sn || !tn) continue;
      ctx.beginPath();
      ctx.moveTo(sn.cx, sn.cy);
      ctx.lineTo(tn.cx, tn.cy);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Draw nodes
    for (const n of clusterNodes) {
      const r = n.depth===0 ? 36 : n.depth===1 ? 24 : 18;
      const col = depthColors[n.depth % depthColors.length];
      const dc = descCount[n.id] || 0;

      // Glow for root
      if (n.depth === 0) {
        ctx.beginPath(); ctx.arc(n.cx, n.cy, r+10, 0, 2*Math.PI);
        ctx.fillStyle = col+'30'; ctx.fill();
      }

      // Circle
      ctx.beginPath(); ctx.arc(n.cx, n.cy, r, 0, 2*Math.PI);
      ctx.fillStyle = col + 'dd'; ctx.fill();
      ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();

      // Descendant badge (dashed ring + count)
      if (dc > 0) {
        ctx.beginPath(); ctx.arc(n.cx, n.cy, r+8, 0, 2*Math.PI);
        ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
        ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
        // Badge
        const bx=n.cx+r*0.7, by=n.cy-r*0.7;
        ctx.beginPath(); ctx.arc(bx, by, 12, 0, 2*Math.PI);
        ctx.fillStyle = '#1e1e2e'; ctx.fill();
        ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.fillStyle = '#a5b4fc'; ctx.font = '600 9px JetBrains Mono, monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const badge = dc>999?Math.round(dc/1000)+'k':String(dc);
        ctx.fillText(badge, bx, by);
      }

      // Label
      const label = n.name.length>22 ? n.name.slice(0,21)+'…' : n.name;
      ctx.fillStyle = '#ccc'; ctx.font = `${n.depth===0?'700 13':'500 10'}px IBM Plex Sans, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(label, n.cx, n.cy + r + 6);
      if (n.partNo) {
        ctx.fillStyle = '#666'; ctx.font = '9px JetBrains Mono, monospace';
        ctx.fillText(n.partNo, n.cx, n.cy + r + 20);
      }
    }
    ctx.restore();
  }

  window._graphDraw = drawGraph;
  requestAnimationFrame(resizeCanvas);

  // Zoom/pan events on canvas
  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.12 : 0.88;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left), my = (e.clientY - rect.top);
    const v = window._graphViz;
    const ns = Math.max(0.05, Math.min(8, v.scale * factor));
    v.tx = mx - (mx - v.tx) * (ns / v.scale);
    v.ty = my - (my - v.ty) * (ns / v.scale);
    v.scale = ns;
    drawGraph();
  }, { passive: false });

  canvas.addEventListener('mousedown', function(e) {
    if(e.button!==0) return;
    const v=window._graphViz; v.dragging=true; v.lastX=e.clientX; v.lastY=e.clientY;
    canvas.style.cursor='grabbing';
  });
  window.addEventListener('mousemove', function(e) {
    const v=window._graphViz; if(!v||!v.dragging) return;
    v.tx+=e.clientX-v.lastX; v.ty+=e.clientY-v.lastY;
    v.lastX=e.clientX; v.lastY=e.clientY;
    if(window._graphDraw) window._graphDraw();
  });
  window.addEventListener('mouseup', function() {
    const v=window._graphViz; if(v) v.dragging=false;
    const c=document.getElementById('graphCanvas'); if(c) c.style.cursor='grab';
  });
  canvas.style.cursor='grab';

  _setupGraphFitForCanvas(gW, gH, (minX+maxX)/2, (minY+maxY)/2);
}

function _setupGraphFitForCanvas(gW, gH, cX, cY) {
  window._graphViz.gW = gW; window._graphViz.gH = gH;
  window._graphViz.cX = cX; window._graphViz.cY = cY;
  graphFit();
}

function _attachGraphEvents(svg, isSvg) {
  if (!svg) return;
  svg.addEventListener('wheel', function(e) {
    e.preventDefault();
    const factor=e.deltaY<0?1.12:0.88, rect=svg.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top, v=window._graphViz;
    const ns=Math.max(0.05,Math.min(8,v.scale*factor));
    v.tx=mx-(mx-v.tx)*(ns/v.scale); v.ty=my-(my-v.ty)*(ns/v.scale); v.scale=ns;
    applyGraphTransform();
  }, {passive:false});
  svg.addEventListener('mousedown', function(e) {
    if(e.button!==0) return;
    const v=window._graphViz; v.dragging=true; v.lastX=e.clientX; v.lastY=e.clientY;
    svg.style.cursor='grabbing';
  });
  window.addEventListener('mousemove', function(e) {
    const v=window._graphViz; if(!v||!v.dragging) return;
    v.tx+=e.clientX-v.lastX; v.ty+=e.clientY-v.lastY; v.lastX=e.clientX; v.lastY=e.clientY;
    applyGraphTransform();
  });
  window.addEventListener('mouseup', function() {
    const v=window._graphViz; if(v) v.dragging=false;
    const s=document.getElementById('graphSvg'); if(s) s.style.cursor='grab';
  });
  svg.style.cursor='grab';
}

function applyGraphTransform() {
  const g = document.getElementById('graphG'); if (!g) return;
  const v = window._graphViz;
  g.setAttribute('transform', `translate(${v.tx},${v.ty}) scale(${v.scale})`);
}

function graphZoom(factor) {
  const v = window._graphViz; if (!v) return;
  const canvas = document.getElementById('graphCanvas');
  const svg = document.getElementById('graphSvg');
  const el = canvas || svg; if (!el) return;
  const rect = el.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const ns = Math.max(0.05, Math.min(8, v.scale * factor));
  v.tx = cx - (cx - v.tx) * (ns / v.scale); v.ty = cy - (cy - v.ty) * (ns / v.scale); v.scale = ns;
  if (canvas && window._graphDraw) window._graphDraw();
  else applyGraphTransform();
}

function graphFit() {
  const v = window._graphViz; if (!v) return;
  const canvas = document.getElementById('graphCanvas');
  const svg = document.getElementById('graphSvg');
  const el = canvas || svg; if (!el) return;
  const rect = el.getBoundingClientRect();
  const sx = rect.width / (v.gW + 80), sy = rect.height / (v.gH + 80);
  v.scale = Math.min(sx, sy, 1.5);
  v.tx = rect.width / 2 - v.cX * v.scale;
  v.ty = rect.height / 2 - v.cY * v.scale;
  if (canvas && window._graphDraw) window._graphDraw();
  else applyGraphTransform();
}

async function importExcel(){
  const result=await window.api.importExcel();
  if(!result)return;
  if(result.error){toast("Excel hatası: "+result.error,"error");return}
  
  const sheet=result.sheets[0];
  if(!sheet||!sheet.data?.length){toast("Boş Excel","error");return}

  // Show preview + column mapping modal
  const headers=sheet.data[0];
  const preview=sheet.data.slice(0,8);

  let tableHtml='<div class="xlsx-preview"><table><tr>'+headers.map((h,i)=>`<th>${h||'Col '+i}</th>`).join('')+'</tr>';
  preview.slice(1).forEach(row=>{tableHtml+='<tr>'+headers.map((_,i)=>`<td>${row[i]||''}</td>`).join('')+'</tr>'});
  tableHtml+='</table></div>';

  const colOpts=headers.map((h,i)=>`<option value="${i}">${h||'Col '+i}</option>`).join('');
  const noneOpt='<option value="-1">-- Yok --</option>';

  document.getElementById("modalC").innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" style="width:600px" onclick="event.stopPropagation()">
    <div class="modal-title">Excel İçe Aktar</div>
    <div class="modal-desc">Sayfa: <b>${sheet.name}</b> — ${sheet.data.length-1} satır. Sütun eşleştirmesini yapın:</div>
    ${tableHtml}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
      <div class="field"><label class="field-label">Parça Adı *</label><select class="field-input" id="xl-name">${colOpts}</select></div>
      <div class="field"><label class="field-label">Parça No</label><select class="field-input" id="xl-pn">${noneOpt}${colOpts}</select></div>
      <div class="field"><label class="field-label">Seri No</label><select class="field-input" id="xl-sn">${noneOpt}${colOpts}</select></div>
      <div class="field"><label class="field-label">Adet</label><select class="field-input" id="xl-qty">${noneOpt}${colOpts}</select></div>
      <div class="field"><label class="field-label">Jira Key</label><select class="field-input" id="xl-jira">${noneOpt}${colOpts}</select></div>
      <div class="field"><label class="field-label">Parent ID / Üst</label><select class="field-input" id="xl-parent">${noneOpt}${colOpts}</select></div>
      <div class="field"><label class="field-label">Seviye (Level / Indent)</label><select class="field-input" id="xl-level">${noneOpt}${colOpts}</select></div>
      <div class="field"><label class="field-label">ID</label><select class="field-input" id="xl-id">${noneOpt}${colOpts}</select></div>
    </div>
    <div class="modal-btns"><button class="modal-btn" onclick="closeModal()">İptal</button><button class="modal-btn primary" onclick="processExcel()">İçe Aktar</button></div>
  </div></div>`;
  
  // Store data globally for processing
  window._xlData = sheet.data;
  window._xlFileName = result.filePath ? result.filePath.split(/[\\/]/).pop().replace(/\.[^.]+$/, '') : null;

  // Auto-detect columns
  const hl = headers.map(h => (h||'').toString().toLowerCase());
  const autoMap = { name: ['bileşen kısa tanımı','bileşen kısa tanimi','kısa tanım','kisa tanim','name','summary','description','item','tanım'],
    pn:['bileşen stok','bilesen stok','partno','part no','parça no','pn','part_no'],
    sn:['serialno','serial','seri no','sn','serial_no'],
    qty:['bileşen miktarı','bilesen miktari','temel ölçü biriminde','qty','quantity','adet','miktar','count'],
    jira:['jira','key','issue','ticket'],
    parent:['malzeme stok','parent','üst','parent_id','parentid'],
    level:['düzey','duzey','level','seviye','indent','depth','lvl'],
    id:['id','item_id'] };
  
  for(const[field,keywords]of Object.entries(autoMap)){
    const idx=hl.findIndex(h=>keywords.some(k=>h.includes(k)));
    if(idx>=0){const el=document.getElementById('xl-'+field);if(el)el.value=idx}
  }
}

async function processExcel(){
  const data=window._xlData;if(!data)return;
  const get=id=>{const v=parseInt(document.getElementById(id)?.value);return v>=0?v:-1};
  const nameCol=get('xl-name'),pnCol=get('xl-pn'),snCol=get('xl-sn'),qtyCol=get('xl-qty'),jiraCol=get('xl-jira'),parentCol=get('xl-parent'),levelCol=get('xl-level'),idCol=get('xl-id');
  
  if(nameCol<0){toast("Parça Adı sütunu gerekli","error");return}

  const rows=data.slice(1).filter(r=>r[nameCol]);
  const sysId=gid();
  const sysName=window._xlFileName||("Excel Import — "+new Date().toLocaleDateString("tr-TR"));
  
  // Build tree
  let children=[];
  
  if(parentCol>=0 && idCol>=0){
    // Parent ID mode
    const nodeMap={};
    for(const r of rows){
      const id=String(r[idCol]||gid());
      nodeMap[id]={id:'xl-'+id,name:String(r[nameCol]),partNo:pnCol>=0?String(r[pnCol]||''):'',serialNo:snCol>=0?String(r[snCol]||''):'SN-'+gid(),qty:qtyCol>=0?parseInt(r[qtyCol])||1:1,jiraKey:jiraCol>=0?String(r[jiraCol]||''):'',children:[]};
    }
    for(const r of rows){
      const id=String(r[idCol]);
      const pid=String(r[parentCol]||'');
      if(pid&&nodeMap[pid]){nodeMap[pid].children.push(nodeMap[id])}
      else{children.push(nodeMap[id])}
    }
  } else if(levelCol>=0){
    // Level/indent mode
    const stack=[{children}];
    for(const r of rows){
      const level=parseInt(r[levelCol])||0;
      const node={id:'xl-'+gid(),name:String(r[nameCol]),partNo:pnCol>=0?String(r[pnCol]||''):'',serialNo:snCol>=0?String(r[snCol]||''):'SN-'+gid(),qty:qtyCol>=0?parseInt(r[qtyCol])||1:1,jiraKey:jiraCol>=0?String(r[jiraCol]||''):'',children:[]};
      while(stack.length>level+1)stack.pop();
      if(stack.length<=level)stack.push(stack[stack.length-1].children[stack[stack.length-1].children.length-1]||{children});
      const parent=stack[stack.length-1];
      (parent.children||children).push(node);
      stack.push(node);
    }
  } else {
    // Flat list
    for(const r of rows){
      children.push({id:'xl-'+gid(),name:String(r[nameCol]),partNo:pnCol>=0?String(r[pnCol]||''):'',serialNo:snCol>=0?String(r[snCol]||''):'SN-'+gid(),qty:qtyCol>=0?parseInt(r[qtyCol])||1:1,jiraKey:jiraCol>=0?String(r[jiraCol]||''):'',children:[]});
    }
  }

  S.systems.push({id:sysId,name:sysName,type:"Import",serialNo:`XLS-${Date.now().toString(36).toUpperCase()}`,status:"Aktif",icon:"📦",revision:"Rev-A",children});
  addRev("Excel içe aktarıldı",`${rows.length} satır → ${sysName}`);
  await persist();closeModal();selSys(sysId);renderSidebar();toast(`${rows.length} parça yüklendi`);
}
