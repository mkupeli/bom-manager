async function exportJira(){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  const rows=[["Summary","Issue Type","Description","Parent","Priority","Labels","Custom field (Part No)","Custom field (Serial No)","Custom field (Quantity)"].join(",")];
  rows.push(csvR([sys.name,"Epic",`${sys.type}|S/N:${sys.serialNo}|${sys.status}`,"","High",sys.type,"",sys.serialNo,"1"]));
  const w=(ns,pn)=>{for(const n of ns){const has=n.children?.length>0;rows.push(csvR([n.name,has?"Story":"Sub-task",`${n.partNo||'-'}|${n.serialNo}`,pn,"Medium",sys.type,n.partNo||"",n.serialNo,String(n.qty||1)]));if(has)w(n.children,n.name)}};
  w(sys.children,sys.name);
  const p=await window.api.exportJiraCsv(rows.join("\n"));if(p){addRev("Jira CSV",p.split(/[/\\]/).pop());await persist();toast("CSV kaydedildi")}
}
function csvR(f){return f.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(",")}

async function importJiraCSV(){const c=await window.api.importJiraCsv();if(!c)return;
  const lines=parseCSV(c);if(lines.length<2){toast("Geçersiz CSV","error");return}
  const h=lines[0].map(x=>x.trim().toLowerCase());const si=h.findIndex(x=>x==='summary'),ki=h.findIndex(x=>x.includes('key'));
  if(si<0){toast("Summary sütunu yok","error");return}
  const sys=S.systems.find(s=>s.id===S.selSys);let m=0;
  if(sys){for(let i=1;i<lines.length;i++){const s=lines[i][si]?.trim(),k=ki>=0?lines[i][ki]?.trim():"";if(!s||!k)continue;
    const w=ns=>{for(const n of ns){if(n.name.toLowerCase()===s.toLowerCase()||n.partNo===s){n.jiraKey=k;m++}if(n.children?.length)w(n.children)}};w(sys.children)}}
  addRev("Jira CSV import",`${m} eşleşme`);await persist();renderMain();toast(`${m} parça eşleştirildi`)}
function parseCSV(t){const lines=[];let cur=[],f="",q=false;for(let i=0;i<t.length;i++){const c=t[i];if(q){if(c==='"'&&t[i+1]==='"'){f+='"';i++}else if(c==='"')q=false;else f+=c}else{if(c==='"')q=true;else if(c===','){cur.push(f);f=""}else if(c==='\n'||(c==='\r'&&t[i+1]==='\n')){cur.push(f);f="";lines.push(cur);cur=[];if(c==='\r')i++}else f+=c}}if(f||cur.length){cur.push(f);lines.push(cur)}return lines}

async function exportJSON(){const j=JSON.stringify({systems:S.systems,revisions:S.revisions,exportedAt:new Date().toISOString()},null,2);const p=await window.api.exportBomJson(j);if(p){addRev("JSON export",p.split(/[/\\]/).pop());await persist();toast("JSON kaydedildi")}}
async function importBomJSON(){const c=await window.api.importBomJson();if(!c)return;try{const d=JSON.parse(c);if(d.systems){S.systems=d.systems;S.revisions=d.revisions||[];addRev("JSON import",S.systems.length+" sistem");S.selSys=null;await persist();renderSidebar();renderMain();toast(S.systems.length+" sistem yüklendi")}else toast("Geçersiz format","error")}catch{toast("JSON hatası","error")}}

async function exportExcel(){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  const rows=[["Level","Parça Adı","Parça No","Seri No","Adet","Jira Key","Parent"]];
  const w=(ns,d,pn)=>{for(const n of ns){rows.push([d,n.name,n.partNo||"",n.serialNo,n.qty||1,n.jiraKey||"",pn]);if(n.children?.length)w(n.children,d+1,n.name)}};
  w(sys.children,0,sys.name);
  const p=await window.api.exportExcel({sheetData:rows,fileName:`${sys.name}-BOM.xlsx`});
  if(p){addRev("Excel export",p.split(/[/\\]/).pop());await persist();toast("Excel kaydedildi")}
}

// ═══════ BOM COMPARE ═══════
function renderCompare(container){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  const others=S.systems.filter(s=>s.id!==S.selSys);
  if(!others.length){container.innerHTML='<div class="empty-state"><div class="empty-icon">🔀</div><div class="empty-title">Karşılaştırma yapılamıyor</div><div class="empty-desc">En az 2 sistem gerekli.</div></div>';return}
  const selId=S.compareTarget||others[0].id;
  S.compareTarget=selId;
  const target=S.systems.find(s=>s.id===selId);if(!target)return;

  const flatA=flattenBOM(sys.children,'');
  const flatB=flattenBOM(target.children,'');

  // Ad + seviye bazında map — her (ad, derinlik) kombinasyonu ayrı satır
  const mapA=new Map(), mapB=new Map();
  flatA.forEach(n=>{
    const k=n.name.toLowerCase().trim()+'::'+n._depth;
    if(mapA.has(k)){const x=mapA.get(k);x.qty+=n.qty||1}
    else mapA.set(k,{...n,qty:n.qty||1});
  });
  flatB.forEach(n=>{
    const k=n.name.toLowerCase().trim()+'::'+n._depth;
    if(mapB.has(k)){const x=mapB.get(k);x.qty+=n.qty||1}
    else mapB.set(k,{...n,qty:n.qty||1});
  });

  // Kategorize et — seviyeye göre sırala
  const matched=[],qtyDiff=[],onlyA=[],onlyB=[];
  for(const[k,a]of mapA){
    if(!mapB.has(k)){onlyA.push(a)}
    else{
      const b=mapB.get(k);
      if(a.qty===b.qty){matched.push({a,b})}
      else{qtyDiff.push({a,b})}
    }
  }
  for(const[k,b]of mapB){if(!mapA.has(k)){onlyB.push(b)}}

  matched.sort((x,y)=>x.a._depth-y.a._depth);
  qtyDiff.sort((x,y)=>x.a._depth-y.a._depth);
  onlyA.sort((x,y)=>x._depth-y._depth);
  onlyB.sort((x,y)=>x._depth-y._depth);

  const totalA=mapA.size, totalB=mapB.size;
  const matchPct=Math.round(matched.length/Math.max(totalA,1)*100);
  const qtyPct=Math.round(qtyDiff.length/Math.max(totalA,1)*100);

  const opts=others.map(s=>`<option value="${s.id}" ${s.id===selId?'selected':''}>${s.icon} ${s.name}</option>`).join('');

  const rowA=(items,cls,badge,showQty)=>items.map(({a,b})=>{
    const n=a;
    return `<div class="cmp-row ${cls}" style="padding-left:${8+n._depth*12}px">
      <span class="cmp-badge ${badge}">${badge==='ok'?'✓':badge==='qty'?'≠':badge==='rem'?'−':'+'}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${n.name}">${n.name}</span>
      <span class="cmp-pn">${n.partNo||''} ${showQty?'×'+n.qty:''}</span>
    </div>`;
  }).join('');

  const rowB=(items,cls,badge)=>items.map(n=>`<div class="cmp-row ${cls}" style="padding-left:${8+n._depth*12}px">
    <span class="cmp-badge ${badge}">${badge==='ok'?'✓':badge==='qty'?'≠':badge==='add'?'+':'−'}</span>
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${n.name}">${n.name}</span>
    <span class="cmp-pn">${n.partNo||''} ×${n.qty}</span>
  </div>`).join('');

  const rowQtyB=qtyDiff.map(({a,b})=>`<div class="cmp-row qty-diff" style="padding-left:${8+b._depth*12}px">
    <span class="cmp-badge qty">≠</span>
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${b.name}">${b.name}</span>
    <span class="cmp-pn" style="color:var(--warn)">×${b.qty} <span style="color:var(--tx4)">(A:×${a.qty})</span></span>
  </div>`).join('');

  container.innerHTML=`
    <div style="display:flex;flex-direction:column;height:100%">
    <div class="cmp-summary" style="flex-wrap:wrap;gap:8px 16px">
      <span style="font-weight:600">Karşılaştır:</span>
      <span style="color:var(--ac2)">${sys.icon} ${sys.name}</span>
      <span style="color:var(--tx3)">↔</span>
      <select class="cmp-select" onchange="S.compareTarget=this.value;renderTab()">${opts}</select>
      <div class="tool-spacer"></div>
      <div class="cmp-stat"><div class="cmp-dot" style="background:var(--ok)"></div><span style="color:var(--ok)">${matched.length} tam eşleşme (${matchPct}%)</span></div>
      <div class="cmp-stat"><div class="cmp-dot" style="background:var(--warn)"></div><span style="color:var(--warn)">${qtyDiff.length} adet farklı (${qtyPct}%)</span></div>
      <div class="cmp-stat"><div class="cmp-dot" style="background:var(--err)"></div><span style="color:var(--err)">${onlyA.length} yalnızca A'da</span></div>
      <div class="cmp-stat"><div class="cmp-dot" style="background:#818cf8"></div><span style="color:#a5b4fc">${onlyB.length} yalnızca B'de</span></div>
    </div>

    <!-- İstatistik kartları -->
    ${(()=>{
      const f=S.compareFilter;
      const card=(key,bg,border,labelColor,label,val,sub)=>{
        const active=f===key;
        return `<div onclick="S.compareFilter=S.compareFilter==='${key}'?null:'${key}';renderTab()" style="flex:1;min-width:120px;background:${active?bg.replace('.08','.22'):bg};border:2px solid ${active?border:border.replace(',.2)',',0.15)')};border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .12s;user-select:none">
          <div style="font-size:9px;color:${labelColor};text-transform:uppercase;letter-spacing:1px">${label}${active?' ▸':''}</div>
          <div style="font-size:22px;font-weight:700;color:${labelColor==='var(--tx3)'?'var(--tx)':labelColor}">${val}</div>
          <div style="font-size:9px;color:var(--tx3)">${sub}</div>
        </div>`;
      };
      return `<div style="display:flex;gap:8px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--brd);flex-wrap:wrap">
        ${card(null,'var(--sf)','var(--brd)','var(--tx3)','Tümü',totalA+'+'+totalB,'tıkla: filtreyi kaldır')}
        ${card('match','rgba(16,185,129,.08)','rgba(16,185,129,.2)','var(--ok)','Tam Eşleşme',matched.length,'ad + adet birebir aynı')}
        ${card('qty','rgba(245,158,11,.08)','rgba(245,158,11,.2)','var(--warn)','Adet Farklı',qtyDiff.length,'ad aynı, miktar değişmiş')}
        ${card('onlyA','rgba(239,68,68,.08)','rgba(239,68,68,.2)','var(--err)','Yalnızca A',onlyA.length,"B'de bulunmuyor")}
        ${card('onlyB','rgba(99,102,241,.08)','rgba(99,102,241,.2)','#a5b4fc','Yalnızca B',onlyB.length,"A'da bulunmuyor")}
        <div style="flex:1;min-width:120px;background:var(--sf);border:1px solid var(--brd);border-radius:8px;padding:10px 14px">
          <div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px">Eşleşme Oranı</div>
          <div style="font-size:22px;font-weight:700;color:${matchPct>=80?'var(--ok)':matchPct>=50?'var(--warn)':'var(--err)'}">${matchPct}%</div>
          <div style="font-size:9px;color:var(--tx3)">tam eşleşen / toplam A</div>
        </div>
      </div>`;
    })()}

    ${(()=>{
      const f=S.compareFilter;
      const showMatch=!f||f==='match';
      const showQty=!f||f==='qty';
      const showOnlyA=!f||f==='onlyA';
      const showOnlyB=!f||f==='onlyB';
      const filterLabel=f==='match'?'Tam Eşleşme':f==='qty'?'Adet Farklı':f==='onlyA'?'Yalnızca A':f==='onlyB'?'Yalnızca B':'Tümü';
      const countA=(showMatch?matched.length:0)+(showQty?qtyDiff.length:0)+(showOnlyA?onlyA.length:0);
      const countB=(showMatch?matched.length:0)+(showQty?qtyDiff.length:0)+(showOnlyB?onlyB.length:0);
      return `<div class="cmp-layout" style="flex:1;overflow:hidden">
        <div class="cmp-side">
          <div class="cmp-side-hdr">${sys.icon} ${sys.name} <span style="color:var(--tx3);font-size:9px">(${countA} parça gösteriliyor)</span></div>
          ${showMatch?matched.map(({a})=>`<div class="cmp-row match" style="padding-left:${8+a._depth*12}px"><span class="cmp-badge ok" style="background:rgba(16,185,129,.15);color:var(--ok)">✓</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</span><span class="cmp-pn">×${a.qty}</span></div>`).join(''):''}
          ${showQty?qtyDiff.map(({a})=>`<div class="cmp-row qty-diff" style="padding-left:${8+a._depth*12}px"><span class="cmp-badge qty" style="background:rgba(245,158,11,.15);color:var(--warn)">≠</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</span><span class="cmp-pn" style="color:var(--warn)">×${a.qty}</span></div>`).join(''):''}
          ${showOnlyA?onlyA.map(n=>`<div class="cmp-row removed" style="padding-left:${8+n._depth*12}px"><span class="cmp-badge rem" style="background:rgba(239,68,68,.15);color:var(--err)">−</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.name}</span><span class="cmp-pn">×${n.qty}</span></div>`).join(''):''}
          ${countA===0?'<div style="padding:20px;text-align:center;color:var(--tx3);font-size:11px">Bu kategoride kayıt yok</div>':''}
        </div>
        <div class="cmp-side" style="border-right:none">
          <div class="cmp-side-hdr">${target.icon} ${target.name} <span style="color:var(--tx3);font-size:9px">(${countB} parça gösteriliyor)</span></div>
          ${showMatch?matched.map(({b})=>`<div class="cmp-row match" style="padding-left:${8+b._depth*12}px"><span class="cmp-badge ok" style="background:rgba(16,185,129,.15);color:var(--ok)">✓</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.name}</span><span class="cmp-pn">×${b.qty}</span></div>`).join(''):''}
          ${showQty?qtyDiff.map(({b,a})=>`<div class="cmp-row qty-diff" style="padding-left:${8+b._depth*12}px"><span class="cmp-badge qty" style="background:rgba(245,158,11,.15);color:var(--warn)">≠</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.name}</span><span class="cmp-pn" style="color:var(--warn)">×${b.qty} <span style="color:var(--tx4);font-size:8px">(A:×${a.qty})</span></span></div>`).join(''):''}
          ${showOnlyB?onlyB.map(n=>`<div class="cmp-row added" style="padding-left:${8+n._depth*12}px"><span class="cmp-badge add" style="background:rgba(99,102,241,.15);color:#a5b4fc">+</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.name}</span><span class="cmp-pn">×${n.qty}</span></div>`).join(''):''}
          ${countB===0?'<div style="padding:20px;text-align:center;color:var(--tx3);font-size:11px">Bu kategoride kayıt yok</div>':''}
        </div>
      </div>`;
    })()}
    </div>`;
}
function flattenBOM(nodes,parentPath,depth=0){
  const result=[];
  for(const n of(nodes||[])){
    const path=parentPath?parentPath+'/'+n.name:n.name;
    result.push({id:n.id,name:n.name,partNo:n.partNo||'',serialNo:n.serialNo||'',qty:n.qty||1,jiraKey:n.jiraKey||'',_path:path,_depth:depth});
    if(n.children?.length)result.push(...flattenBOM(n.children,path,depth+1));
  }
  return result;
}
function bomKey(n){return (n.partNo||'')+':'+(n.name||'').toLowerCase()}

// ═══════ DASHBOARD ═══════
function renderDashboard(container){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  const flat=flattenBOM(sys.children,'');
  const total=flat.length;
  const totalQty=flat.reduce((s,n)=>s+(n.qty||1),0);
  const withJira=flat.filter(n=>n.jiraKey).length;
  const noJira=flat.filter(n=>!n.jiraKey);
  const maxDepth=flat.reduce((m,n)=>Math.max(m,n._depth),0)+1;

  // Group by depth level
  const byDepth={};
  flat.forEach(n=>{const lbl=['Alt Sistem','Bileşen','Parça','Alt Parça'][n._depth]||`Seviye ${n._depth}`;byDepth[lbl]=(byDepth[lbl]||0)+1});

  // Top qty items
  const topQty=[...flat].sort((a,b)=>b.qty-a.qty).slice(0,8);

  // Parts with children count (sub-systems)
  const subSystems=flat.filter(n=>{const node=find(sys.children,n.id);return node&&node.children&&node.children.length>0});

  container.innerHTML=`<div class="dash-grid">
    <div class="dash-card"><div class="dash-card-title">Toplam Parça</div><div class="dash-big">${total}</div><div class="dash-sub">${totalQty} adet (toplam miktar)</div></div>
    <div class="dash-card"><div class="dash-card-title">Derinlik</div><div class="dash-big">${maxDepth}</div><div class="dash-sub">seviye ağaç derinliği</div></div>
    <div class="dash-card"><div class="dash-card-title">Jira Takibi</div><div class="dash-big" style="color:${withJira===total?'var(--ok)':'var(--warn)'}">${Math.round(withJira/total*100)||0}%</div><div class="dash-sub">${withJira}/${total} parçada Jira key var</div></div>
    <div class="dash-card"><div class="dash-card-title">Alt Sistem Sayısı</div><div class="dash-big">${sys.children.length}</div><div class="dash-sub">${subSystems.length} iç içe alt sistem</div></div>

    <div class="dash-card" style="grid-column:span 2"><div class="dash-card-title">Seviye Dağılımı</div>
      ${Object.entries(byDepth).map(([lbl,count])=>{const pct=Math.round(count/total*100);return`<div class="dash-bar"><span class="dash-bar-label">${lbl}</span><div class="dash-bar-track"><div class="dash-bar-fill" style="width:${pct}%;background:var(--ac)"></div></div><span class="dash-bar-val">${count}</span></div>`}).join('')}
    </div>

    <div class="dash-card"><div class="dash-card-title">En Yüksek Adetli Parçalar</div>
      ${topQty.map(n=>`<div class="dash-list-item"><span style="flex:1">${n.name}</span><span style="color:var(--warn);font-family:'JetBrains Mono',monospace">×${n.qty}</span></div>`).join('')}
    </div>

    <div class="dash-card"><div class="dash-card-title">Jira Key Eksik (${noJira.length})</div>
      ${noJira.length===0?'<div style="color:var(--ok);font-size:11px;padding:8px">Tüm parçalarda Jira key mevcut</div>':
      noJira.slice(0,10).map(n=>`<div class="dash-list-item"><div class="dash-warn-dot"></div><span style="flex:1">${n.name}</span><span class="cmp-pn">${n.partNo||'—'}</span></div>`).join('')+(noJira.length>10?`<div style="font-size:9px;color:var(--tx4);padding-top:4px">...ve ${noJira.length-10} parça daha</div>`:'')}
    </div>
  </div>`;
}

// ═══════ AUTO-BACKUP ═══════
let _backupTimer=null;
const _origPersist=persist;
persist=async function(){
  await window.api.saveData({systems:S.systems,revisions:S.revisions});
  // Schedule backup 30s after last save
  if(_backupTimer)clearTimeout(_backupTimer);
  _backupTimer=setTimeout(async()=>{
    try{await window.api.saveData({systems:S.systems,revisions:S.revisions,_backup:true})}catch(e){}
  },30000);
};

// ── KEYBOARD ──
document.addEventListener("keydown",e=>{if(e.ctrlKey&&e.key==="s"){e.preventDefault();persist();toast("Kaydedildi")}if(e.ctrlKey&&e.key==="f"&&S.tab==='tree'){e.preventDefault();const el=document.getElementById('treeSearch');if(el)el.focus()}if(e.ctrlKey&&e.key==="a"&&S.tab==='tree'){e.preventDefault();selectAllVisible()}if(e.key==="Delete"&&S.multiSel.length>0){bulkDelete()}else if(e.key==="Delete"&&S.selNode){delNode(S.selNode)}if(e.key==="Escape"){if(S.multiSel.length>0){clearMultiSel()}else if(S.searchQuery){S.searchQuery='';S.searchHits=[];S.searchIdx=0;renderTab()}else{closeModal();closeRP()}}});

function selectAllVisible(){
  const sys=S.systems.find(s=>s.id===S.selSys);if(!sys)return;
  S.multiSel=[];
  const walk=ns=>{for(const n of ns){S.multiSel.push(n.id);if(S.expanded[n.id]&&n.children?.length)walk(n.children)}};
  walk(sys.children);renderToolbar();renderTab();
}

init();
